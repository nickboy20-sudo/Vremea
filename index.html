<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prognoză Meteo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js" defer></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:   #030610;
    --bg2:  #060c1a;
    --bg3:  #0b1225;
    --card: rgba(255,255,255,0.045);
    --card-hover: rgba(255,255,255,0.075);
    --border: rgba(255,255,255,0.09);
    --border2: rgba(255,255,255,0.16);
    --border-glow: rgba(99,160,255,0.25);
    --text: #eef0ff;
    --text2: rgba(238,240,255,0.6);
    --text3: rgba(238,240,255,0.3);
    --gold: #fbbf24;
    --gold2: #f59e0b;
    --teal: #2dd4bf;
    --teal2: #14b8a6;
    --blue: #60a5fa;
    --blue2: #3b82f6;
    --rain: #93c5fd;
    --accent: #c084fc;
    --danger: #f87171;
    --font-display: 'Space Grotesk', sans-serif;
    --font-data: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --r: 16px;
    --r2: 22px;
    --r3: 28px;
    --bg-suggestions: #06091a;
    --bg-suggestions-hover: rgba(96,165,250,0.12);
    --rain-bar-high: rgba(147,197,253,0.8);
    --rain-bar-mid: rgba(147,197,253,0.5);
    --rain-bar-low: rgba(147,197,253,0.28);
    --blur-sm: 14px;
    --blur-lg: 20px;
    --shadow: 0 12px 40px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.4);
    --shadow-sm: 0 4px 16px rgba(0,0,0,0.4);
    --inner-glow: inset 0 1px 0 rgba(255,255,255,0.07), inset 0 -1px 0 rgba(0,0,0,0.2);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-data);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Noise texture ─── */
  .noise {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    background-size: 256px;
    mix-blend-mode: overlay;
  }

  /* ─── Atmospheric orbs ─── */
  .glow-orb {
    position: fixed; border-radius: 50%; filter: blur(130px); pointer-events: none; z-index: 0;
    transition: transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .glow-orb.a { width: 600px; height: 600px; top: -250px; left: -150px; background: radial-gradient(circle, rgba(59,130,246,0.14) 0%, rgba(37,99,235,0.06) 60%, transparent 100%); }
  .glow-orb.b { width: 500px; height: 500px; bottom: 50px; right: -150px; background: radial-gradient(circle, rgba(45,212,191,0.1) 0%, rgba(20,184,166,0.04) 60%, transparent 100%); }
  .glow-orb.c { width: 350px; height: 350px; top: 45%; left: 42%; background: radial-gradient(circle, rgba(251,191,36,0.06) 0%, transparent 70%); }

  @media (max-width: 640px) {
    :root { --blur-sm: 8px; --blur-lg: 12px; }
    .glow-orb { filter: blur(60px); }
    .glow-orb.a { width: 300px; height: 300px; }
    .glow-orb.b { width: 260px; height: 260px; }
    .glow-orb.c { width: 200px; height: 200px; }
  }
  @media (max-width: 400px) { .noise { display: none; } }
  @media (prefers-reduced-motion: reduce) { .noise { display: none; } .glow-orb { filter: blur(50px); } }
  body.reduce-motion .noise { display: none; }
  body.reduce-motion .glow-orb { filter: blur(50px); }

  /* ─── App layout ─── */
  .app {
    position: relative; z-index: 1;
    max-width: 1100px; margin: 0 auto;
    padding: 48px 28px 90px;
  }

  /* ═══════════════════════════════════════════════
     SEARCH BAR
  ═══════════════════════════════════════════════ */
  .search-wrap {
    position: relative; margin-bottom: 36px;
    animation: fadeUp 0.5s ease both;
    isolation: isolate; z-index: 200;
  }
  .search-inner {
    position: relative; display: flex; align-items: center;
  }
  .top-bar {
    position: absolute; top: -40px; right: 0;
    display: flex; gap: 6px;
  }
  .search-icon {
    position: absolute; left: 18px;
    color: var(--text3); pointer-events: none; z-index: 1;
    display: flex; align-items: center;
  }
  .search-input {
    width: 100%; padding: 15px 130px 15px 50px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(var(--blur-sm));
    -webkit-backdrop-filter: blur(var(--blur-sm));
    border: 1px solid var(--border2);
    border-radius: var(--r3);
    color: var(--text); font-size: 15px; font-family: var(--font-data);
    font-weight: 400; letter-spacing: 0.2px;
    outline: none; transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    box-shadow: var(--inner-glow), var(--shadow-sm);
  }
  .search-input::placeholder { color: var(--text3); }
  .search-input:focus {
    border-color: var(--border-glow);
    background: rgba(255,255,255,0.07);
    box-shadow: var(--inner-glow), 0 0 0 3px rgba(99,160,255,0.1), var(--shadow-sm);
  }
  .search-clear {
    position: absolute; right: 110px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--text3); cursor: pointer;
    padding: 6px; border-radius: 50%; display: none;
    transition: color 0.15s, background 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .search-clear:hover { color: var(--text); background: rgba(255,255,255,0.08); }
  .theme-btn {
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text2); cursor: pointer;
    padding: 7px 10px; font-size: 13px;
    transition: all 0.18s; display: flex; align-items: center; justify-content: center;
  }
  .theme-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--border2); color: var(--text); }
  .gps-btn {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; background: rgba(45,212,191,0.1);
    border: 1px solid rgba(45,212,191,0.3); border-radius: 18px;
    color: var(--teal); font-family: var(--font-data);
    font-size: 12px; font-weight: 500; cursor: pointer;
    transition: background 0.18s, border-color 0.18s, transform 0.15s;
    white-space: nowrap; letter-spacing: 0.3px;
  }
  .gps-btn:hover { background: rgba(45,212,191,0.18); border-color: rgba(45,212,191,0.5); transform: translateY(-50%) scale(1.04); }
  .gps-btn:active { transform: translateY(-50%) scale(0.97); }
  .gps-btn.loading { opacity: 0.7; pointer-events: none; }
  .gps-btn .gps-icon { display: flex; align-items: center; line-height: 1; transition: transform 0.4s; }
  .gps-btn.loading .gps-icon { animation: spin 0.8s linear infinite; }
  @media (max-width: 400px) {
    .gps-btn span.gps-label { display: none; }
    .search-input { padding-right: 60px; }
    .search-clear { right: 54px; }
  }

  /* Suggestions */
  .search-suggestions {
    position: absolute; top: calc(100% + 10px); left: 0; right: 0;
    background: rgba(6,9,26,0.97);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(99,160,255,0.25); border-radius: var(--r2);
    overflow: hidden; z-index: 9999;
    box-shadow: 0 20px 50px rgba(0,0,0,0.9), 0 5px 15px rgba(0,0,0,0.5);
    display: none; animation: suggFadeIn 0.2s ease-out both;
  }
  @keyframes suggFadeIn { from { opacity:0; transform:translateY(-8px) scale(0.99); } to { opacity:1; transform:translateY(0) scale(1); } }
  .search-suggestions.open { display: contents; }
  .suggestion-item {
    padding: 12px 18px; cursor: pointer;
    display: flex; align-items: center; gap: 12px;
    transition: background 0.12s; position: relative;
  }
  .suggestion-item + .suggestion-item::before {
    content:''; position:absolute; top:0; left:18px; right:18px; height:1px;
    background: rgba(255,255,255,0.05);
  }
  .suggestion-item:hover, .suggestion-item.focused { background: var(--bg-suggestions-hover); }
  .suggestion-pin-wrap {
    width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
    background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center;
    transition: background 0.12s;
  }
  .suggestion-item:hover .suggestion-pin-wrap, .suggestion-item.focused .suggestion-pin-wrap { background: rgba(96,165,250,0.2); }
  .suggestion-pin { color: var(--text3); display: flex; }
  .suggestion-item:hover .suggestion-pin, .suggestion-item.focused .suggestion-pin { color: var(--blue); }
  .suggestion-text { flex:1; min-width:0; }
  .suggestion-name { font-size:14px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .suggestion-region { font-size:11px; color:var(--text3); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .suggestion-meta {
    font-size:11px; color:rgba(96,165,250,0.7);
    background:rgba(96,165,250,0.08); border:1px solid rgba(96,165,250,0.15);
    border-radius:20px; padding:2px 9px; flex-shrink:0; white-space:nowrap;
    font-family:var(--font-mono);
  }
  .search-loading { padding:16px 20px; color:var(--text3); font-size:13px; display:flex; align-items:center; gap:10px; }
  .search-loading .mini-spin { width:14px; height:14px; border:1.5px solid rgba(96,165,250,0.2); border-top-color:var(--blue); border-radius:50%; animation:spin 0.7s linear infinite; flex-shrink:0; }
  .search-no-results { padding:16px 20px; color:var(--text3); font-size:13px; display:flex; align-items:center; gap:10px; }

  /* ═══════════════════════════════════════════════
     HEADER — Location + Temperature
  ═══════════════════════════════════════════════ */
  .header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 40px; animation: fadeUp 0.6s ease both;
  }
  .location-head { display: flex; align-items: center; gap: 10px; }
  .location-name {
    font-family: var(--font-display);
    font-size: 54px; font-weight: 700; letter-spacing: -2px;
    line-height: 1; color: var(--text);
    text-shadow: 0 2px 20px rgba(96,165,250,0.15);
  }
  .location-sub {
    font-size: 12px; color: var(--text2); margin-top: 8px;
    font-weight: 400; letter-spacing: 2.5px; text-transform: uppercase;
    opacity: 0.7;
  }
  .now-temp { text-align: right; }
  .current-temp {
    font-family: var(--font-display); font-size: 88px; font-weight: 700;
    line-height: 1; letter-spacing: -4px;
    background: linear-gradient(135deg, #eef0ff 30%, var(--gold) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 30px rgba(251,191,36,0.2));
  }
  .current-icon { text-align: right; margin-bottom: 4px; }
  .current-cond { font-size: 13px; color: var(--text2); text-align: right; margin-top: 6px; letter-spacing: 0.3px; }

  /* ═══════════════════════════════════════════════
     FAVORITES
  ═══════════════════════════════════════════════ */
  .favorites-row {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 10px; min-height: 20px;
  }
  .fav-chip {
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 20px; color: var(--text2); font-size: 12px;
    padding: 5px 12px; cursor: pointer; font-family: var(--font-data);
    transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
  }
  .fav-chip:hover { background: rgba(96,165,250,0.1); border-color: rgba(96,165,250,0.3); color: var(--text); }
  .fav-chip.active { background: rgba(96,165,250,0.15); border-color: rgba(96,165,250,0.4); color: var(--blue); }
  .fav-chip .rm { color: var(--text3); font-size: 14px; cursor: pointer; transition: color 0.15s; }
  .fav-chip .rm:hover { color: var(--danger); }
  .fav-star {
    background: none; border: none; cursor: pointer; font-size: 22px;
    color: var(--text3); transition: color 0.2s, transform 0.2s;
    padding: 2px 4px; line-height: 1;
  }
  .fav-star:hover { color: var(--gold); transform: scale(1.2); }
  .fav-star.saved { color: var(--gold); text-shadow: 0 0 12px rgba(251,191,36,0.5); }

  /* ═══════════════════════════════════════════════
     ALERT BANNER
  ═══════════════════════════════════════════════ */
  .alert-banner {
    display: none; flex-direction: column; gap: 6px;
    margin-bottom: 20px;
  }
  .alert-banner.show { display: flex; }
  .alert-item {
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.25);
    border-radius: 12px; padding: 10px 16px;
    font-size: 13px; color: rgba(248,113,113,0.9);
    letter-spacing: 0.2px; line-height: 1.5;
    box-shadow: 0 0 20px rgba(248,113,113,0.05);
  }

  /* ═══════════════════════════════════════════════
     CARDS — base glass style
  ═══════════════════════════════════════════════ */
  .card-glass {
    background: var(--card);
    backdrop-filter: blur(var(--blur-lg)) saturate(1.4);
    -webkit-backdrop-filter: blur(var(--blur-lg)) saturate(1.4);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    box-shadow: var(--shadow), var(--inner-glow);
    position: relative; overflow: hidden;
  }
  .card-glass::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.12) 50%, transparent 100%);
  }

  /* ═══════════════════════════════════════════════
     METRICS GRID
  ═══════════════════════════════════════════════ */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px; margin-bottom: 24px;
    animation: fadeUp 0.6s 0.08s ease both;
  }
  @media (max-width: 640px) { .metrics-grid { grid-template-columns: repeat(2,1fr); gap:10px; } }
  @media (max-width: 400px) { .metrics-grid { grid-template-columns: 1fr 1fr; } }

  .metric-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: 18px 18px 16px;
    box-shadow: var(--shadow-sm), var(--inner-glow);
    transition: background 0.2s, border-color 0.2s, transform 0.2s;
    position: relative; overflow: hidden;
  }
  .metric-card::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, transparent 60%);
    pointer-events: none;
  }
  .metric-card:hover { background: var(--card-hover); border-color: var(--border2); transform: translateY(-2px); }
  .metric-label {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text3); margin-bottom: 10px; font-weight: 500;
    display: flex; align-items: center; gap: 6px;
  }
  .metric-label svg { opacity: 0.5; }
  .metric-value {
    font-family: var(--font-display); font-size: 32px; font-weight: 700;
    color: var(--text); line-height: 1; letter-spacing: -1px;
  }
  .metric-value span { font-size: 14px; color: var(--text3); font-weight: 400; letter-spacing: 0; margin-left: 2px; }
  .metric-sub { font-size: 11px; color: var(--text2); margin-top: 6px; }
  .uv-bar { height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; margin-top: 10px; overflow: hidden; }
  .uv-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }

  /* ═══════════════════════════════════════════════
     OUTFIT CARD
  ═══════════════════════════════════════════════ */
  .outfit-card {
    display: flex; align-items: center; gap: 18px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r2); padding: 18px 22px;
    margin-bottom: 24px; animation: fadeUp 0.6s 0.1s ease both;
    box-shadow: var(--shadow-sm), var(--inner-glow);
  }
  .outfit-emoji {
    font-size: 36px; width: 56px; height: 56px; flex-shrink: 0;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 14px; display: flex; align-items: center; justify-content: center;
    box-shadow: var(--inner-glow);
  }
  .outfit-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 5px; }
  .outfit-text { font-size: 14px; color: var(--text2); line-height: 1.5; }
  .outfit-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .outfit-tag {
    font-size: 11px; color: var(--text2);
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px 10px;
  }

  /* ═══════════════════════════════════════════════
     SECTION LABELS
  ═══════════════════════════════════════════════ */
  .section-label {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--text3); margin-bottom: 14px; margin-top: 4px;
    font-weight: 500;
  }

  /* ═══════════════════════════════════════════════
     BEST WINDOW
  ═══════════════════════════════════════════════ */
  .best-window {
    background: rgba(45,212,191,0.07); border: 1px solid rgba(45,212,191,0.2);
    border-radius: 12px; padding: 11px 16px; margin-bottom: 14px;
    font-size: 13px; color: rgba(45,212,191,0.9); line-height: 1.5;
  }
  .best-window strong { color: var(--teal); }

  /* ═══════════════════════════════════════════════
     HOURLY STRIP
  ═══════════════════════════════════════════════ */
  .hourly-scroll {
    display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px;
    margin-bottom: 24px; scroll-snap-type: x mandatory;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.08) transparent;
  }
  .hourly-scroll::-webkit-scrollbar { height: 4px; }
  .hourly-scroll::-webkit-scrollbar-track { background: transparent; }
  .hourly-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
  .hour-card {
    flex-shrink: 0; scroll-snap-align: start;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px; padding: 12px 14px;
    text-align: center; cursor: pointer; min-width: 68px;
    transition: background 0.18s, border-color 0.18s, transform 0.15s;
    box-shadow: var(--shadow-sm);
  }
  .hour-card:hover { background: var(--card-hover); border-color: var(--border2); transform: translateY(-2px); }
  .hour-card.active { background: rgba(96,165,250,0.12); border-color: rgba(96,165,250,0.35); }
  .hour-card.now { background: rgba(96,165,250,0.14); border-color: rgba(96,165,250,0.4); }
  .hour-time { font-size: 11px; color: var(--text3); font-family: var(--font-mono); font-weight: 400; }
  .hour-card.now .hour-time { color: var(--blue); font-weight: 500; }
  .hour-icon { font-size: 24px; margin: 8px 0 6px; line-height: 1; display: flex; justify-content: center; }
  .hour-temp { font-family: var(--font-display); font-size: 17px; font-weight: 600; color: var(--text); }
  .hour-feel { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .hour-prec { font-size: 10px; color: var(--rain); margin-top: 2px; min-height: 14px; }
  .hour-day-sep {
    flex-shrink: 0; align-self: center; color: var(--text3); font-size: 16px;
    padding: 0 4px; opacity: 0.5;
  }

  /* ═══════════════════════════════════════════════
     WEEK SUMMARY
  ═══════════════════════════════════════════════ */
  .week-summary-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r2); padding: 20px 22px;
    margin-bottom: 24px; animation: fadeUp 0.6s 0.15s ease both;
    box-shadow: var(--shadow-sm), var(--inner-glow);
  }
  .week-summary-title {
    font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--text3); margin-bottom: 14px; font-weight: 500;
  }
  .week-summary-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
  @media (max-width: 600px) { .week-summary-grid { grid-template-columns: repeat(2,1fr); } }
  .week-summary-item { }
  .week-summary-label {
    font-size: 11px; color: var(--text3); margin-bottom: 5px;
    display: flex; align-items: center; gap: 5px;
  }
  .wsi-icon { font-size: 13px; line-height: 1; }
  .week-summary-value {
    font-family: var(--font-display); font-size: 20px; font-weight: 700;
    line-height: 1.1; letter-spacing: -0.5px;
  }
  .week-summary-value.hot { color: var(--gold); }
  .week-summary-value.cold { color: #93c5fd; }
  .week-summary-value.rain { color: var(--rain); }
  .week-summary-value.chance { color: var(--teal); }
  .week-summary-day { font-size: 10px; color: var(--text3); margin-top: 3px; text-transform: uppercase; letter-spacing: 1px; }

  /* ═══════════════════════════════════════════════
     10-DAY GRID
  ═══════════════════════════════════════════════ */
  .days-grid {
    display: flex; flex-direction: column; gap: 6px;
    margin-bottom: 24px; animation: fadeUp 0.6s 0.18s ease both;
  }
  .day-card {
    display: grid; grid-template-columns: 100px 50px 1fr 80px;
    align-items: center; gap: 12px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 13px 18px;
    cursor: pointer; transition: background 0.18s, border-color 0.18s, transform 0.15s;
    box-shadow: var(--shadow-sm);
  }
  .day-card:hover { background: var(--card-hover); border-color: var(--border2); transform: translateX(3px); }
  .day-card.active { background: rgba(96,165,250,0.1); border-color: rgba(96,165,250,0.3); }
  .day-label-col { }
  .day-name { font-size: 14px; font-weight: 600; color: var(--text); display: block; }
  .day-date { font-size: 11px; color: var(--text3); font-family: var(--font-mono); }
  .day-icon { font-size: 26px; line-height: 1; display: flex; }
  .day-desc { font-size: 12px; color: var(--text2); }
  .day-prec { font-size: 12px; color: var(--rain); }
  .day-prec.no-rain { color: transparent; }
  .day-temps { text-align: right; }
  .day-low { font-family: var(--font-display); font-size: 16px; font-weight: 400; color: var(--text2); }
  .day-high { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--text); margin-left: 6px; }
  @media (max-width: 600px) {
    .day-card { grid-template-columns: 80px 40px 1fr 70px; gap: 8px; padding: 11px 14px; }
    .day-name { font-size: 13px; }
  }

  /* ═══════════════════════════════════════════════
     PRECIP TOTAL CARD
  ═══════════════════════════════════════════════ */
  .precip-total-card {
    display: grid; grid-template-columns: auto 1fr auto;
    align-items: center; gap: 18px;
    background: rgba(96,165,250,0.05);
    border: 1px solid rgba(96,165,250,0.18);
    border-radius: var(--r2); padding: 20px 22px;
    margin-bottom: 24px; animation: fadeUp 0.6s 0.2s ease both;
    box-shadow: var(--shadow-sm), var(--inner-glow);
  }
  .precip-total-icon { font-size: 32px; width: 52px; height: 52px; background: rgba(96,165,250,0.08); border: 1px solid rgba(96,165,250,0.18); border-radius: 14px; display: flex; align-items: center; justify-content: center; }
  .precip-total-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; }
  .precip-total-value { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--text); line-height: 1; }
  .precip-total-value span { font-size: 14px; color: var(--text3); font-weight: 400; margin-left: 2px; }
  .precip-total-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .precip-total-breakdown { }
  .precip-rainy-days { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
  .precip-rainy-days strong { color: var(--text); }
  .precip-bar-wrap { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; margin-bottom: 5px; }
  .precip-bar-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--teal)); border-radius: 2px; transition: width 1.2s ease; }
  .precip-bar-label { font-size: 10px; color: var(--text3); }
  @media (max-width: 600px) { .precip-total-card { grid-template-columns: auto 1fr; } }

  /* ═══════════════════════════════════════════════
     CHART CARDS
  ═══════════════════════════════════════════════ */
  .hourly-chart-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r2); padding: 22px 22px 16px;
    margin-bottom: 24px; animation: fadeUp 0.6s 0.25s ease both;
    box-shadow: var(--shadow-sm), var(--inner-glow);
  }
  .hourly-chart-wrap { position: relative; width: 100%; height: 160px; }
  .charts-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    margin-bottom: 24px; animation: fadeUp 0.6s 0.27s ease both;
  }
  @media (max-width: 700px) { .charts-row { grid-template-columns: 1fr; } }
  .chart-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r2); padding: 20px 18px 14px;
    box-shadow: var(--shadow-sm), var(--inner-glow);
  }
  .chart-title, .hourly-chart-title {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text3); margin-bottom: 14px; font-weight: 500;
  }
  .chart-wrap { position: relative; width: 100%; height: 180px; }

  /* ═══════════════════════════════════════════════
     WIND CHART CARD
  ═══════════════════════════════════════════════ */
  .wind-chart-card {
    background: linear-gradient(135deg, rgba(45,212,191,0.07) 0%, rgba(20,184,166,0.03) 100%);
    border: 1px solid rgba(45,212,191,0.2); border-radius: var(--r2);
    box-shadow: var(--shadow-sm), var(--inner-glow);
    padding: 22px 22px 16px; margin-bottom: 24px;
    animation: fadeUp 0.6s 0.3s ease both;
    position: relative; overflow: hidden;
  }
  .wind-chart-card::before {
    content: ''; position: absolute; top: -50px; right: -50px;
    width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(45,212,191,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .wind-chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
  .wind-chart-subtitle { font-size: 10px; color: var(--text3); letter-spacing: 0.5px; margin-top: 3px; }
  .wind-now-badge {
    display: flex; align-items: center; gap: 12px;
    background: rgba(45,212,191,0.08); border: 1px solid rgba(45,212,191,0.22);
    border-radius: 14px; padding: 10px 16px;
  }
  .wind-compass { font-size: 22px; line-height: 1; color: var(--teal); display: inline-block; filter: drop-shadow(0 0 8px rgba(45,212,191,0.5)); transition: transform 0.5s ease; }
  .wind-now-val { font-family: var(--font-mono); font-size: 24px; font-weight: 400; color: var(--teal); line-height: 1; }
  .wind-now-val span { font-size: 12px; color: rgba(45,212,191,0.6); margin-left: 3px; }
  .wind-now-dir { font-size: 10px; color: var(--text3); margin-top: 2px; letter-spacing: 1.5px; text-transform: uppercase; }
  .wind-chart-wrap { position: relative; width: 100%; height: 180px; }

  /* ═══════════════════════════════════════════════
     SUN ARC
  ═══════════════════════════════════════════════ */
  .sun-section {
    background: linear-gradient(135deg, rgba(251,191,36,0.07) 0%, rgba(245,158,11,0.03) 100%);
    border: 1px solid rgba(251,191,36,0.2);
    border-radius: var(--r2);
    box-shadow: var(--shadow-sm), var(--inner-glow);
    padding: 28px 32px; margin-bottom: 24px;
    animation: fadeUp 0.6s 0.32s ease both;
    display: grid; grid-template-columns: 1fr auto 1fr; gap: 20px; align-items: center;
    position: relative; overflow: hidden;
  }
  .sun-section::before {
    content: ''; position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
    width: 300px; height: 200px;
    background: radial-gradient(circle, rgba(251,191,36,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .sun-info { display: flex; flex-direction: column; }
  .sun-label { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }
  .sun-time { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--gold); letter-spacing: -0.5px; line-height: 1; }
  .sun-duration { font-size: 11px; color: var(--text3); margin-top: 6px; letter-spacing: 1px; }
  .sun-arc-wrap { display: flex; justify-content: center; }
  .arc-svg .arc-path { filter: drop-shadow(0 0 6px rgba(251,191,36,0.35)); }
  .arc-svg .arc-track { opacity: 0.12; }
  .sun-icon-svg { filter: drop-shadow(0 0 10px rgba(251,191,36,0.8)); }
  @media (max-width: 600px) {
    .sun-section { grid-template-columns: 1fr 1fr; grid-template-rows: auto auto; padding: 20px 18px; gap: 12px; }
    .sun-arc-wrap { grid-column: 1 / -1; order: -1; }
    .sun-time { font-size: 22px; }
  }

  /* ═══════════════════════════════════════════════
     WINDY RADAR
  ═══════════════════════════════════════════════ */
  .windy-section { margin-bottom: 24px; animation: fadeUp 0.6s 0.35s ease both; }
  .windy-card {
    background: var(--card); border: 1px solid var(--border);
    backdrop-filter: blur(var(--blur-lg)) saturate(1.2); -webkit-backdrop-filter: blur(var(--blur-lg)) saturate(1.2);
    border-radius: var(--r2); box-shadow: var(--shadow), var(--inner-glow); overflow: hidden; position: relative;
  }
  .windy-card-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 22px; border-bottom: 1px solid var(--border); }
  .windy-card-title { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--text3); display: flex; align-items: center; gap: 10px; }
  .windy-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--teal); box-shadow: 0 0 10px var(--teal); animation: pulse-dot 2s ease infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
  .windy-overlay-btns { display: flex; gap: 6px; }
  .windy-layer-btn {
    padding: 5px 12px; border-radius: 20px; font-size: 11px; font-family: var(--font-data);
    letter-spacing: 0.5px; cursor: pointer; border: 1px solid var(--border);
    background: var(--card); color: var(--text2); transition: all 0.18s;
  }
  .windy-layer-btn:hover { background: var(--card-hover); color: var(--text); }
  .windy-layer-btn.active { background: rgba(45,212,191,0.12); border-color: rgba(45,212,191,0.35); color: var(--teal); }
  .windy-frame-wrap { position: relative; width: 100%; height: 480px; }
  .windy-frame-wrap iframe { width: 100%; height: 100%; border: none; display: block; border-radius: 0 0 var(--r2) var(--r2); }
  .windy-loader { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg2); gap: 16px; border-radius: 0 0 var(--r2) var(--r2); transition: opacity 0.4s; pointer-events: none; }
  .windy-loader.hidden { opacity: 0; }
  .windy-loader-text { font-size: 12px; color: var(--text2); letter-spacing: 2px; text-transform: uppercase; }

  /* ═══════════════════════════════════════════════
     LOADING / ERROR
  ═══════════════════════════════════════════════ */
  .loading { display: flex; align-items: center; justify-content: center; height: 300px; flex-direction: column; gap: 18px; }
  .spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
  .loading-text { font-size: 12px; color: var(--text2); letter-spacing: 2px; text-transform: uppercase; }
  .error-msg { color: var(--danger); font-size: 14px; padding: 24px; text-align: center; }

  /* ═══════════════════════════════════════════════
     LIGHT / HIGH-CONTRAST MODES
  ═══════════════════════════════════════════════ */
  body.light {
    --bg: #e8ecf6;
    --bg2: #dde3f0;
    --bg3: #d0d8ec;
    --card: rgba(255,255,255,0.7);
    --card-hover: rgba(255,255,255,0.85);
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #111827;
    --text2: rgba(17,24,39,0.65);
    --text3: rgba(17,24,39,0.38);
  }
  body.high-contrast #weather-bg { opacity: 0.3 !important; }

  /* ═══════════════════════════════════════════════
     ANIMATIONS
  ═══════════════════════════════════════════════ */
  @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  @keyframes pulse-ring { 0%{transform:scale(0.8);opacity:0.8} 100%{transform:scale(1.6);opacity:0} }

  /* ═══════════════════════════════════════════════
     SVG WEATHER ICON ANIMATIONS
  ═══════════════════════════════════════════════ */
  @keyframes ray-pulse { 0%,100%{opacity:0.7;transform:scale(1)} 50%{opacity:1;transform:scale(1.12)} }
  @keyframes cloud-drift { 0%,100%{transform:translateX(0)} 50%{transform:translateX(3px)} }
  @keyframes rain-drip { 0%{transform:translateY(-4px);opacity:0} 30%{opacity:1} 100%{transform:translateY(12px);opacity:0} }
  @keyframes snow-spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
  @keyframes bolt-flash { 0%,90%,100%{opacity:0} 92%{opacity:1} 94%{opacity:0.5} 96%{opacity:0.9} 98%{opacity:0} }
  @keyframes fog-drift { 0%,100%{transform:translateX(0);opacity:0.6} 50%{transform:translateX(5px);opacity:1} }
  @keyframes moon-glow { 0%,100%{filter:drop-shadow(0 0 4px rgba(148,163,184,0.6))} 50%{filter:drop-shadow(0 0 10px rgba(148,163,184,0.9))} }
  @keyframes sun-rotate { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
  @keyframes sun-center-pulse { 0%,100%{r:9px} 50%{r:10px} }

  /* ═══════════════════════════════════════════════
     WEATHER BACKGROUNDS (same logic, enhanced visuals)
  ═══════════════════════════════════════════════ */
  #weather-bg {
    position: fixed; inset: 0; z-index: 0;
    transition: background 1.5s ease, opacity 0.8s ease;
    pointer-events: none;
    will-change: transform;
  }

  /* SUNNY DAY */
  #weather-bg.bg-sunny {
    background: linear-gradient(180deg, #0a1628 0%, #0f2240 25%, #1a3a60 55%, #254d7a 80%, #2a5a90 100%);
  }
  .sun-bg-orb {
    position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(251,191,36,0.15) 0%, rgba(251,191,36,0.05) 40%, transparent 70%);
    pointer-events: none;
  }
  .sun-glow-ring {
    position: absolute; top: 5%; left: 50%; transform: translateX(-50%);
    width: 260px; height: 260px; border-radius: 50%;
    background: radial-gradient(circle, rgba(251,191,36,0.12) 0%, rgba(251,191,36,0.04) 50%, transparent 70%);
    animation: ray-pulse 4s ease infinite;
    pointer-events: none;
  }
  .sun-bg-rays {
    position: absolute; top: 0; left: 0; width: 100%; height: 60%;
    background: conic-gradient(from 0deg at 50% 0%, rgba(251,191,36,0.03) 0deg, transparent 20deg, rgba(251,191,36,0.03) 40deg, transparent 60deg, rgba(251,191,36,0.03) 80deg, transparent 100deg, rgba(251,191,36,0.03) 120deg, transparent 140deg, rgba(251,191,36,0.03) 160deg, transparent 180deg, rgba(251,191,36,0.03) 200deg, transparent 220deg, rgba(251,191,36,0.03) 240deg, transparent 260deg, rgba(251,191,36,0.03) 280deg, transparent 300deg, rgba(251,191,36,0.03) 320deg, transparent 340deg, rgba(251,191,36,0.03) 360deg);
    pointer-events: none;
  }

  /* SUNNY NIGHT */
  #weather-bg.bg-sunny.night {
    background: linear-gradient(180deg, #020408 0%, #04080f 25%, #060c18 55%, #081020 80%, #0b1428 100%);
  }
  .stars-container { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
  .star {
    position: absolute; background: white; border-radius: 50%;
    animation: star-twinkle ease infinite;
  }
  @keyframes star-twinkle { 0%,100%{opacity:0.2;transform:scale(1)} 50%{opacity:1;transform:scale(1.3)} }
  .moon-glow {
    position: absolute; top: 8%; right: 15%;
    width: 120px; height: 120px; border-radius: 50%;
    background: radial-gradient(circle, rgba(200,220,255,0.12) 0%, transparent 70%);
    animation: moon-glow 4s ease infinite; pointer-events: none;
  }

  /* PARTLY CLOUDY */
  #weather-bg.bg-partly-cloudy {
    background: linear-gradient(180deg, #0d1e35 0%, #152840 25%, #1c3550 55%, #234468 80%, #2a5280 100%);
  }
  #weather-bg.bg-partly-cloudy.night {
    background: linear-gradient(180deg, #030610 0%, #060c18 30%, #0a1220 60%, #0e1828 85%, #121e30 100%);
  }
  .cloud-shape {
    position: absolute; border-radius: 50%; pointer-events: none;
    background: rgba(255,255,255,0.06); filter: blur(25px);
    animation: cloud-drift ease-in-out infinite;
  }

  /* OVERCAST */
  #weather-bg.bg-overcast {
    background: linear-gradient(180deg, #0d1520 0%, #121d2e 25%, #182538 55%, #1d2e45 80%, #223550 100%);
  }
  #weather-bg.bg-overcast.night {
    background: linear-gradient(180deg, #05080e 0%, #080c15 30%, #0b101e 60%, #0e1428 85%, #111830 100%);
  }

  /* FOG */
  #weather-bg.bg-fog {
    background: linear-gradient(180deg, #151c28 0%, #1c2535 25%, #232e42 55%, #2a3650 80%, #303e5a 100%);
  }
  #weather-bg.bg-fog.night {
    background: linear-gradient(180deg, #080c12 0%, #0c1018 30%, #101520 60%, #141a28 85%, #181f30 100%);
  }
  .fog-layer {
    position: absolute; width: 100%; pointer-events: none;
    background: linear-gradient(90deg, transparent, rgba(200,210,230,0.06), rgba(210,220,240,0.08), rgba(200,210,230,0.05), transparent);
    border-radius: 40px; filter: blur(12px);
    animation: fog-drift ease-in-out infinite;
  }

  /* RAIN */
  #weather-bg.bg-rain {
    background: linear-gradient(180deg, #060e1a 0%, #0a1628 25%, #0f2035 55%, #142840 80%, #192f50 100%);
  }
  .rain-container { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
  .rain-drop {
    position: absolute; top: -10%; width: 1.5px;
    background: linear-gradient(180deg, transparent 0%, rgba(147,197,253,0.6) 50%, rgba(167,210,255,0.4) 100%);
    border-radius: 1px; animation: rain-fall linear infinite;
  }
  @keyframes rain-fall { 0%{top:-10%;opacity:0} 5%{opacity:0.8} 92%{opacity:0.5} 100%{top:110%;transform:translateX(-18px);opacity:0} }
  #weather-bg.bg-rain.night {
    background: linear-gradient(180deg, #020408 0%, #040810 25%, #060c18 55%, #080f20 80%, #0a1228 100%);
  }
  .rain-drop.night-drop { background: linear-gradient(180deg, transparent 0%, rgba(180,200,255,0.4) 50%, rgba(200,215,255,0.3) 100%); }
  .rain-splash { position: absolute; bottom: 0; width: 100%; height: 6px; background: linear-gradient(180deg, rgba(100,160,255,0) 0%, rgba(100,160,255,0.05) 100%); animation: splash-pulse 1.5s ease-in-out infinite; pointer-events: none; }
  @keyframes splash-pulse { 0%,100%{opacity:0.3} 50%{opacity:0.8} }
  .pavement-reflection { position: absolute; bottom: 0; left: 0; right: 0; height: 20%; background: linear-gradient(180deg, transparent, rgba(80,120,200,0.07)); animation: reflection-shimmer 3s ease-in-out infinite; pointer-events: none; }
  @keyframes reflection-shimmer { 0%,100%{opacity:0.3} 50%{opacity:0.8} }

  /* SNOW */
  #weather-bg.bg-snow {
    background: linear-gradient(180deg, #5a7898 0%, #7898b8 25%, #a0b8cc 55%, #c8d8e6 80%, #e0ecf6 100%);
  }
  #weather-bg.bg-snow.night {
    background: linear-gradient(180deg, #08101e 0%, #101828 30%, #182030 60%, #1e2838 85%, #243040 100%);
  }
  .snow-container { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
  .snow-flake {
    position: absolute; top: -5%; border-radius: 50%;
    background: rgba(255,255,255,0.9); animation: snow-fall linear infinite;
    filter: blur(0.3px); box-shadow: 0 0 3px rgba(255,255,255,0.6);
  }
  @keyframes snow-fall { 0%{top:-5%;transform:translateX(0) rotate(0deg) scale(1);opacity:0} 8%{opacity:1} 90%{opacity:0.8} 100%{top:110%;transform:translateX(var(--sx,40px)) rotate(720deg) scale(0.8);opacity:0} }
  .snow-flake.night-flake { background: rgba(200,220,255,0.85); box-shadow: 0 0 5px rgba(180,210,255,0.7); }
  .ice-crystal { position: absolute; width: 3px; height: 3px; background: rgba(200,230,255,0.9); clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%); animation: crystal-spin ease-in-out infinite; pointer-events: none; filter: drop-shadow(0 0 3px rgba(180,220,255,0.8)); }
  @keyframes crystal-spin { 0%,100%{transform:rotate(0deg) scale(1);opacity:0} 10%{opacity:1} 50%{transform:rotate(180deg) scale(1.2);opacity:0.8} 90%{opacity:0.6} }
  .winter-aurora { position: absolute; width: 100%; height: 50%; top: 0; background: linear-gradient(180deg, rgba(60,100,200,0.06) 0%, rgba(80,160,220,0.04) 40%, transparent 100%); filter: blur(18px); animation: aurora-wave 20s ease-in-out infinite; pointer-events: none; }
  @keyframes aurora-wave { 0%,100%{opacity:0.4;transform:skewX(0deg)} 33%{opacity:0.9;transform:skewX(3deg)} 66%{opacity:0.6;transform:skewX(-2deg)} }

  /* STORM */
  #weather-bg.bg-storm {
    background: linear-gradient(180deg, #030508 0%, #06080f 30%, #090c18 60%, #0c1020 100%);
  }
  .lightning-flash { position: absolute; inset: 0; opacity: 0; animation: lightning-strike 11s ease infinite; pointer-events: none; }

function esc(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function nowLocalISO() {
  const now = new Date();
  const tz = state.tz || 'UTC';
  const parts = new Intl.DateTimeFormat('en-CA', { timeZone: tz, year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false }).formatToParts(now);
  const get = t => parts.find(p=>p.type===t)?.value ?? '00';
  const dateStr = `${get('year')}-${get('month')}-${get('day')}`;

  return { now, dateStr, hourStr, currentHourStr: `${dateStr}T${hourStr}` };

function icon(code) { return WMO_ICON[code] || SVG.thermometer; }
function iconForTime(code, isDay) { return isDay ? (WMO_ICON[code] || SVG.thermometer) : (WMO_ICON_NIGHT[code] || WMO_ICON[code] || SVG.thermometer); }
function desc(code) { return WMO[code] || '—'; }

function getHourIsDay(data, timeStr) {
  const dateStr = timeStr.slice(0,10);
  const dayIdx = data.daily.time.indexOf(dateStr);
  if (dayIdx < 0) return true;
  const rise = data.daily.sunrise[dayIdx];
  const set  = data.daily.sunset[dayIdx];
  return timeStr >= rise && timeStr < set;
}

// ── Search / Geocoding ──
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
const searchSugg  = document.getElementById('searchSuggestions');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  searchClear.style.display = q ? 'flex' : 'none';
  clearTimeout(searchTimeout);
  if (q.length < 2) { closeSuggestions(); return; }
  showSuggestionsLoading();
  searchTimeout = setTimeout(() => geocode(q), 300);
});

searchInput.addEventListener('keydown', e => {
  const items = searchSugg.querySelectorAll('.suggestion-item');
  if (e.key === 'ArrowDown') { e.preventDefault(); focusedSuggestion = Math.min(focusedSuggestion+1, items.length-1); updateSuggestionFocus(items); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); focusedSuggestion = Math.max(focusedSuggestion-1, 0); updateSuggestionFocus(items); }
  else if (e.key === 'Enter') { if (focusedSuggestion >= 0 && items[focusedSuggestion]) items[focusedSuggestion].click(); }
  else if (e.key === 'Escape') { closeSuggestions(); searchInput.blur(); }
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.style.display = 'none';
  closeSuggestions();
  searchInput.focus();
});

document.addEventListener('click', e => {
  if (!document.getElementById('searchWrap').contains(e.target)) closeSuggestions();
});

function updateSuggestionFocus(items) {
  items.forEach((el,i) => el.classList.toggle('focused', i===focusedSuggestion));
}

function showSuggestionsLoading() {
  searchSugg.innerHTML = `<div class="search-loading"><div class="mini-spin"></div> Se caută…</div>`;
  searchSugg.classList.add('open');
}

function closeSuggestions() {
  searchSugg.classList.remove('open');
  searchSugg.innerHTML = '';
  focusedSuggestion = -1;
}

async function useGPSLocation() {
  const btn = document.getElementById('gpsBtn');
  if (!navigator.geolocation) {
    btn.style.color = '#f87171';
    btn.querySelector('.gps-label').textContent = 'Indisponibil';
    setTimeout(() => { btn.style.color=''; btn.querySelector('.gps-label').textContent='Locația mea'; }, 2500);
    return;
  }
  btn.classList.add('loading');
  btn.querySelector('.gps-label').textContent = 'Se caută…';
  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      try {
        const r = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ro`);
        const geo = await r.json();
        const city = geo.city || geo.locality || geo.principalSubdivision || 'Locația mea';
        const country = geo.countryName || '';
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Europe/Bucharest';
        setState({ lat, lon, city, country, tz });
        searchInput.value = city + (country ? `, ${country}` : '');
        searchClear.style.display = 'flex';
        closeSuggestions();
        btn.classList.remove('loading');
        btn.querySelector('.gps-label').textContent = 'Găsit!';
        btn.style.color = 'var(--teal)';
        setTimeout(() => { btn.querySelector('.gps-label').textContent='Locația mea'; btn.style.color=''; }, 1800);
        loadWeather();
      } catch(e) {
        const fallbackCity = `${lat.toFixed(2)}°N, ${lon.toFixed(2)}°E`;
        setState({ lat, lon, city: fallbackCity, country: '', tz: Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC' });
        searchInput.value = state.city;
        searchClear.style.display = 'flex';
        btn.classList.remove('loading');
        btn.querySelector('.gps-label').textContent = 'Locația mea';
        loadWeather();
      }
    },
    (err) => {
      btn.classList.remove('loading');
      btn.querySelector('.gps-label').textContent = err.code===1?'Acces refuzat':err.code===2?'Indisponibil':'Eroare GPS';
      btn.style.color = '#f87171';
      setTimeout(() => { btn.querySelector('.gps-label').textContent='Locația mea'; btn.style.color=''; }, 3000);
    },
    { timeout: 10000, enableHighAccuracy: true }
  );
}

async function geocode(query) {
  if (geocodeCache.has(query)) { renderSuggestions(geocodeCache.get(query)); return; }
  try {
    const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=6&language=ro&format=json`);
    const data = await r.json();
    const results = data.results || [];
    geocodeCache.set(query, results);
    renderSuggestions(results);
  } catch(e) {
    searchSugg.innerHTML = `<div class="search-no-results">Serviciul de geocodare nu este disponibil.</div>`;
  }
}

function renderSuggestions(results) {
  if (!results.length) {
    searchSugg.innerHTML = `<div class="search-no-results">Nicio locație găsită.</div>`;
    searchSugg.classList.add('open'); return;
  }
  focusedSuggestion = -1;
  searchSugg.innerHTML = results.map((r,i) => {
    const region = [r.admin1, r.country].filter(Boolean).join(', ');
    const pop = r.population ? `${r.population>=1000000 ? (r.population/1000000).toFixed(1)+'M' : Math.round(r.population/1000)+'k'}` : '';
    return `<div class="suggestion-item" data-idx="${i}"
      data-lat="${r.latitude}" data-lon="${r.longitude}"
      data-city="${r.name}" data-country="${r.country||''}"
      data-tz="${r.timezone||'UTC'}">
      <div class="suggestion-pin-wrap"><span class="suggestion-pin">${SVG.pinIcon}</span></div>
      <div class="suggestion-text">
        <div class="suggestion-name">${esc(r.name)}</div>
        ${region ? `<div class="suggestion-region">${esc(region)}</div>` : ''}
      </div>
      ${pop ? `<span class="suggestion-meta">${pop}</span>` : ''}
    </div>`;
  }).join('');
  searchSugg.classList.add('open');
  searchSugg.querySelectorAll('.suggestion-item').forEach(el => {
    el.addEventListener('click', () => {
      setState({ lat: parseFloat(el.dataset.lat), lon: parseFloat(el.dataset.lon), city: el.dataset.city, country: el.dataset.country, tz: el.dataset.tz });
      searchInput.value = state.city + (state.country ? `, ${state.country}` : '');
      searchClear.style.display = 'flex';
      closeSuggestions();
      loadWeather();
    });
  });
}

// ── Weather API ──
async function fetchWeather() {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${state.lat}&longitude=${state.lon}` +
    `&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weathercode,is_day,windspeed_10m,winddirection_10m,windgusts_10m,pressure_msl,uv_index` +
    `&hourly=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weathercode,windspeed_10m,winddirection_10m,windgusts_10m,uv_index,visibility,pressure_msl` +
    `&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,sunrise,sunset,wind_speed_10m_max` +
    `&timezone=${encodeURIComponent(state.tz)}&forecast_days=10`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const data = await r.json();
  data._fetchedAt = new Date().toISOString();
  return data;
}

function loadWeather() {
  document.getElementById('app').innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">Se încarcă datele meteo…</div></div>`;
  fetchWeather()
    .then(data => render(data))
    .catch(err => {
      document.getElementById('app').innerHTML = `<div class="error-msg">Nu s-au putut încărca datele meteo.<br><small>${err.message}</small></div>`;
    });
}

// ── Helpers ──
function formatTime(iso) {
  if (!iso) return '—';
  const t = iso.slice(11,16);
  return t;
}

function daylight(rise, set) {
  if (!rise || !set) return '';
  const r = new Date(rise), s = new Date(set);
  const diff = Math.round((s-r)/60000);
  return `${Math.floor(diff/60)}h ${diff%60}min lumină`;
}

function windDirLabel(deg) {
  if (deg == null) return '';
  const dirs = ['N','NE','E','SE','S','SV','V','NV'];
  return dirs[Math.round(deg/45)%8];
}

function shortDay(iso) {
  const d = new Date(iso+'T12:00:00Z');
  return d.toLocaleDateString('ro-RO',{weekday:'short'});
}

function shortDate(iso) {
  const d = new Date(iso+'T12:00:00Z');
  return d.toLocaleDateString('ro-RO',{day:'numeric',month:'short'});
}

function drawSunArc(riseIso, setIso) {
  const W = 220, H = 90;
  const now = new Date();
  const rise = new Date(riseIso);
  const set = new Date(setIso);
  const total = set - rise;
  const elapsed = now - rise;
  const progress = Math.max(0, Math.min(1, elapsed / total));
  const sunX = progress * W;
  const sunY = H - Math.sin(Math.PI * progress) * H;

  const trackD = `M 0 ${H} Q ${W/2} 0 ${W} ${H}`;
  const isDone = progress >= 1;
  const isNight = progress <= 0;

  return `<svg class="arc-svg" width="${W}" height="${H+8}" viewBox="0 0 ${W} ${H+8}">
    <defs>
      <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>

}

function getHourlyForDay(data, dayIndex) {
  const { dateStr: today } = nowLocalISO();
  const targetDate = data.daily.time[dayIndex];
  const baseIdx = data.hourly.time.findIndex(t => t.startsWith(targetDate));
  if (baseIdx < 0) return [];
  const hours = [];
  for (let i = 0; i < 24; i++) {
    const idx = baseIdx + i;
    if (idx >= data.hourly.time.length) break;
    const t = data.hourly.time[idx];
    if (!t.startsWith(targetDate)) break;
    const isDay = getHourIsDay(data, t);
    hours.push({
      t,
      hour: t.slice(11,16),
      temp: Math.round(data.hourly.temperature_2m[idx]),
      feel: Math.round(data.hourly.apparent_temperature?.[idx] ?? data.hourly.temperature_2m[idx]),
      code: data.hourly.weathercode[idx],
      prec: +(data.hourly.precipitation?.[idx] ?? 0).toFixed(1),
      wind: Math.round(data.hourly.windspeed_10m?.[idx] ?? 0),
      uv: data.hourly.uv_index?.[idx] ?? 0,
      isDay,
    });
  }
  return hours;
}

function getHourlyFromNow(data, count = 24) {
  const { currentHourStr, dateStr: today } = nowLocalISO();
  let nowIdx = data.hourly.time.findIndex(t => t.startsWith(currentHourStr));
  if (nowIdx < 0) nowIdx = 0;
  const hours = [];
  let prevDate = null;
  for (let i = 0; i < count; i++) {
    const idx = nowIdx + i;
    if (idx >= data.hourly.time.length) break;
    const t = data.hourly.time[idx];
    const date = t.slice(0,10);
    const isDay = getHourIsDay(data, t);
    hours.push({
      t,
      hour: t.slice(11,16),
      temp: Math.round(data.hourly.temperature_2m[idx]),
      feel: Math.round(data.hourly.apparent_temperature?.[idx] ?? data.hourly.temperature_2m[idx]),
      code: data.hourly.weathercode[idx],
      prec: +(data.hourly.precipitation?.[idx] ?? 0).toFixed(1),
      wind: Math.round(data.hourly.windspeed_10m?.[idx] ?? 0),
      uv: data.hourly.uv_index?.[idx] ?? 0,
      isNow: i === 0,
      isDay,
      newDay: prevDate !== null && date !== prevDate,
    });
    prevDate = date;
  }
  return hours;
}

function buildWeekSummaryCard(data) {
  const d = data.daily;
  const n = d.time.length;
  const dayLabel = (i) => i===0?'azi':shortDay(d.time[i]);
  let hotIdx=0,coldIdx=0,rainIdx=0,chanceIdx=0;
  for (let i=1;i<n;i++) {
    if (d.temperature_2m_max[i]>d.temperature_2m_max[hotIdx]) hotIdx=i;
    if (d.temperature_2m_min[i]<d.temperature_2m_min[coldIdx]) coldIdx=i;
    if ((d.precipitation_sum[i]||0)>(d.precipitation_sum[rainIdx]||0)) rainIdx=i;
    if ((d.precipitation_probability_max?.[i]||0)>(d.precipitation_probability_max?.[chanceIdx]||0)) chanceIdx=i;
  }
  const rainMax = +(d.precipitation_sum[rainIdx]||0).toFixed(1);
  const chanceMax = d.precipitation_probability_max?Math.round(d.precipitation_probability_max[chanceIdx]||0):null;
  const items = [
    { icon:'☀️',label:'Cel mai cald',value:`${Math.round(d.temperature_2m_max[hotIdx])}°C`,cls:'hot',day:dayLabel(hotIdx) },
    { icon:'❄️',label:'Cel mai frig',value:`${Math.round(d.temperature_2m_min[coldIdx])}°C`,cls:'cold',day:dayLabel(coldIdx) },
    { icon:'🌧️',label:'Cea mai ploioasă',value:`${rainMax} mm`,cls:'rain',day:dayLabel(rainIdx) },
  ];
  if (chanceMax!==null) items.push({icon:'💧',label:'Max. șanse ploaie',value:`${chanceMax}%`,cls:'chance',day:dayLabel(chanceIdx)});
  return `
    <div class="week-summary-card">
      <div class="week-summary-title">Rezumat săptămână</div>
      <div class="week-summary-grid">
        ${items.map(it=>`
          <div class="week-summary-item">
            <div class="week-summary-label"><span class="wsi-icon">${it.icon}</span>${it.label}</div>

    </div>`;
}

function destroyChart(ref) { if (ref) { try { ref.destroy(); } catch(e){} } }

function getRemainingPrecipPerDay(data) {
  const { dateStr, currentHourStr } = nowLocalISO();
  return data.daily.time.map((day, di) => {
    const startOfDay = data.hourly.time.findIndex(t => t.startsWith(day));
    if (startOfDay < 0) return 0;
    let sum = 0;
    for (let i = startOfDay; i < startOfDay+24 && i < data.hourly.time.length; i++) {
      if (!data.hourly.time[i].startsWith(day)) break;
      if (day === dateStr && data.hourly.time[i] < currentHourStr) continue;
      sum += data.hourly.precipitation?.[i] ?? 0;
    }
    return +sum.toFixed(1);
  });
}

function render(data) {
  setState({ data });
  const d = data.daily;
  const cw = data.current || data.current_weather;
  if (cw) {
    if (cw.windspeed_10m!==undefined) cw.windspeed=cw.windspeed_10m;
    if (cw.winddirection_10m!==undefined) cw.winddirection=cw.winddirection_10m;
    if (cw.temperature_2m!==undefined) cw.temperature=cw.temperature_2m;
    if (cw.apparent_temperature!==undefined) cw.apparent=cw.apparent_temperature;
    if (cw.relative_humidity_2m!==undefined) cw.humidity=cw.relative_humidity_2m;
    if (cw.pressure_msl!==undefined) cw.pressure=cw.pressure_msl;
    if (cw.uv_index!==undefined) cw.uv=cw.uv_index;
    if (cw.windgusts_10m!==undefined) cw.gust=cw.windgusts_10m;
  }
  const todayHours = getHourlyFromNow(data);
  updateWeatherBg(cw.weathercode??d.weathercode[0], cw.is_day??1, d.sunrise?.[0], d.sunset?.[0]);

  const feels = cw.apparent ?? cw.temperature;
  const humidity = cw.humidity ?? (data.hourly.relative_humidity_2m?data.hourly.relative_humidity_2m[0]:null);
  const pressure = cw.pressure ?? 1013;
  const uv = cw.uv ?? 0;
  const visibilityRaw = data.hourly.visibility?data.hourly.visibility[0]:null;
  const visibility = visibilityRaw!=null?Math.round(visibilityRaw/1000):10;
  const visLabel = visibility<1?'ceață densă':visibility<4?'vizibilitate redusă':visibility<10?'moderată':'bună';
  const gust = cw.gust ?? Math.round((cw.windspeed||0)*1.4);

  let pressureTrend = 'stabilă';
  if (data.hourly.pressure_msl) {
    const { currentHourStr } = nowLocalISO();
    const nowIdx = data.hourly.time.findIndex(t=>t.startsWith(currentHourStr));
    if (nowIdx>=3) {
      const past = data.hourly.pressure_msl.slice(Math.max(0,nowIdx-3),nowIdx);
      const fut  = data.hourly.pressure_msl.slice(nowIdx,nowIdx+3);
      const avgPast = past.reduce((a,b)=>a+b,0)/past.length;
      const avgFut  = fut.reduce((a,b)=>a+b,0)/fut.length;
      const diff = avgFut-avgPast;
      pressureTrend = diff>1.5?'↑ în creștere':diff<-1.5?'↓ în scădere':'stabilă';
    }
  }

  const uvLabel = uv<3?'Scăzut':uv<6?'Moderat':uv<8?'Ridicat':uv<11?'Foarte ridicat':'Extrem';

    </div>
    <div class="metric-card">
      <div class="metric-label">${SVG.gauge} Presiune</div>
      <div class="metric-value">${Math.round(pressure)}<span>hPa</span></div>
      <div class="metric-sub">${pressureTrend}</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">${SVG.sun16} UV Index</div>
      <div class="metric-value">${uv?.toFixed?uv.toFixed(1):uv}<span></span></div>
      <div class="metric-sub">${uvLabel}</div>
      <div class="uv-bar"><div class="uv-fill" style="width:${Math.min(100,uv/11*100)}%;background:${uvColor}"></div></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">${SVG.eye16} Vizibilitate</div>
      <div class="metric-value">${visibility}<span>km</span></div>
      <div class="metric-sub">${visLabel}</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">${SVG.wind16} Rafale</div>
      <div class="metric-value">${Math.round(gust)}<span>km/h</span></div>
      <div class="metric-sub">${windDirLabel(cw.winddirection)}</div>
    </div>
  </div>`;

  const temp = Math.round(cw.temperature);
  let outfit='', tags=[], outfitEmoji='👕';

// ── Performance scaling ──
const PERF = (() => {
  const w = window.innerWidth || 1024;
  const reducedMotion = window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const lowCPU = (navigator.hardwareConcurrency||8)<=4;
  const canHover = window.matchMedia&&window.matchMedia('(hover: hover) and (pointer: fine)').matches;
  let scale=1;
  if (w<=400) scale=0.35;
  else if (w<=640) scale=0.5;
  else if (w<=900) scale=0.75;
  if (lowCPU) scale*=0.8;
  const fancy = !reducedMotion&&scale>=0.75;
  return { scale, reducedMotion, canHover, fancy };
})();

function pc(n) {
  if (PERF.reducedMotion) return Math.max(1,Math.round(n*0.15));
  if (PERF.scale>=1) return n;
  return Math.max(Math.min(n,3),Math.round(n*PERF.scale));
}

if (PERF.fancy) document.body.classList.add('bg-drift');

if (PERF.fancy&&PERF.canHover) {
  let rafPending=false,mx=0,my=0;
  window.addEventListener('mousemove',(e)=>{
    mx=(e.clientX/window.innerWidth)-0.5;
    my=(e.clientY/window.innerHeight)-0.5;
    if (rafPending) return;
    rafPending=true;
    requestAnimationFrame(()=>{
      const bg=document.getElementById('weather-bg');
      if (bg) bg.style.transform=`translate(${mx*-16}px,${my*-12}px) scale(1.05)`;
      rafPending=false;
    });
  },{passive:true});
}

function getWeatherBgClass(code, isDay) {
  if ([95,96,99].includes(code)) return 'bg-storm';
  if ([71,73,75,77,85,86].includes(code)) return 'bg-snow';
  if ([51,53,55,61,63,65,80,81,82].includes(code)) return 'bg-rain';
  if ([45,48].includes(code)) return 'bg-fog';
  if (code===3) return 'bg-overcast';
  if (code===2) return 'bg-partly-cloudy';
  if (code===0||code===1) return 'bg-sunny';
  return 'bg-overcast';
}

function buildRain(count, isNight) {
  let html='<div class="rain-container">';
  for (let i=0;i<count;i++) {
    const left=Math.random()*110-5;
    const dur=0.4+Math.random()*0.7;
    const delay=Math.random()*3;
    const h=50+Math.random()*100;
    const nightCls=isNight?' night-drop':'';
    html+=`<div class="rain-drop${nightCls}" style="left:${left}%;height:${h}px;animation-duration:${dur}s;animation-delay:-${delay}s;opacity:${0.4+Math.random()*0.5}"></div>`;
  }
  return html+'<div class="rain-splash"></div></div>';
}

function buildStormRain(count) {
  let html='';
  for (let i=0;i<count;i++) {
    const left=Math.random()*115-8;
    const dur=0.3+Math.random()*0.5;
    const delay=Math.random()*2;
    const h=80+Math.random()*120;
    html+=`<div class="rain-drop" style="left:${left}%;height:${h}px;animation-duration:${dur}s;animation-delay:-${delay}s;opacity:${0.3+Math.random()*0.5};width:1px"></div>`;
  }
  return html;
}

}

function buildHail(count) {

function buildStormDay() {

    html+=`<div class="storm-cloud" style="width:${w}px;height:${w*0.4}px;top:${-w*0.2+i*20}px;left:${i*22-10}%;animation-duration:${18+i*5}s"></div>`;

    const w=220+i*90;
    html+=`<div class="storm-cloud" style="width:${w}px;height:${w*0.4}px;top:${-w*0.2+i*18}px;left:${i*20-15}%;animation-duration:${20+i*4}s"></div>`;

function updateWeatherBg(code, isDay, sunrise, sunset) {
  const bg = document.getElementById('weather-bg');
  if (!bg) return;
  const cls = getWeatherBgClass(code, isDay);
  const nightCls = !isDay ? ' night' : '';
  bg.className = `${cls}${nightCls}`;
  bg.style.opacity='1';

  if (bg._currentClass===cls+nightCls) return;
  bg._currentClass = cls+nightCls;

  let inner='';
  if (cls==='bg-sunny') {
    inner = isDay ? buildSunDay() : buildStars(pc(100))+'<div class="moon-glow"></div>';
  } else if (cls==='bg-partly-cloudy') {
    inner = isDay ? buildPartlyCloudyDay() : buildPartlyCloudyNight();
  } else if (cls==='bg-overcast') {
    inner = isDay ? buildOvercastDay() : buildOvercastNight();
  } else if (cls==='bg-fog') {
    inner = isDay ? buildFogDay() : buildFogNight();
  } else if (cls==='bg-rain') {
    inner = buildRain(pc(120), !isDay);
    if (!isDay) inner+='<div class="pavement-reflection"></div>';
  } else if (cls==='bg-snow') {
    inner = buildSnow(pc(80), !isDay);
  } else if (cls==='bg-storm') {
    inner = isDay ? buildStormDay() : buildStormNight();
  } else if (cls==='bg-hail') {
    inner = buildHail(pc(60));
  }
  bg.innerHTML = inner;
}

function findBestWindow(hours) {
  if (!hours||hours.length<3) return null;
  let best=null,bestScore=1e9;
  for (let i=0;i<=hours.length-3;i++) {
    const slice=hours.slice(i,i+3);
    const prec=slice.reduce((a,h)=>a+h.prec,0);
    const wind=slice.reduce((a,h)=>a+h.wind,0)/3;
    const temp=slice.reduce((a,h)=>a+h.temp,0)/3;
    const score=prec*10+wind*0.5-(temp>=18&&temp<=26?5:0);
    if (score<bestScore) { bestScore=score; best={start:slice[0].hour,end:slice[2].hour,temp:Math.round(temp),prec:prec.toFixed(1)}; }
  }
  return best;
}

function selectHour(t) {
  state.selectedHour=t;
  const hours=state.selectedDay===0?getHourlyFromNow(state.data):getHourlyForDay(state.data,state.selectedDay);
  document.querySelector('.hourly-scroll').innerHTML=buildHourlyRow(hours);
  const h=hours.find(x=>x.t===t);
  if (h) {
    const cwEl=document.querySelector('.current-temp');
    if (cwEl) cwEl.childNodes[0].nodeValue=h.temp+'°';
    const condEl=document.querySelector('.current-cond');
    if (condEl) condEl.textContent=desc(h.code)+` · resimțite ${h.feel}° · vânt ${h.wind} km/h`;
  }
}

function checkAlerts(hours, cw){
  const banner=document.getElementById('alertBanner');
  if (!banner) return;
  const msgs=[];
  if ((cw.windspeed||0)>60) msgs.push('🌬️ Vânt extrem de puternic acum ('+Math.round(cw.windspeed)+' km/h)');
  else if ((cw.windspeed||0)>40) msgs.push('💨 Vânt puternic acum ('+Math.round(cw.windspeed)+' km/h)');
  const gustNow=cw.gust??Math.round((cw.windspeed||0)*1.4);
  if (gustNow>80) msgs.push('💨 Rafale foarte puternice ('+Math.round(gustNow)+' km/h) — evitați deplasările');
  const heavyRainHours=hours.filter(h=>h.prec>=5);
  if (heavyRainHours.length>=3) msgs.push(`🌧️ Ploaie torențială în ${heavyRainHours.length} ore din următoarele 24h`);
  else if (heavyRainHours.length) msgs.push(`🌧️ Ploaie intensă în ${heavyRainHours.length} ore din următoarele 24h`);
  const stormCodes=[95,96,99];
  if (hours.some(h=>stormCodes.includes(h.code))) msgs.push('⛈️ Risc de furtună cu descărcări electrice în următoarele ore');
  const snowCodes=[71,73,75,77,85,86];
  if (hours.some(h=>snowCodes.includes(h.code))) msgs.push('❄️ Ninsoare așteptată — conduceți cu precauție');
  const tempMin=Math.min(...hours.map(h=>h.temp));
  const tempMax=Math.max(...hours.map(h=>h.temp));
  if (tempMin<=-10) msgs.push('🥶 Ger extrem așteptat ('+tempMin+'°C) — riscul de degerături este ridicat');
  else if (tempMin<=0) msgs.push('❄️ Temperaturi sub 0°C așteptate — pericol de gheață pe căi rutiere');
  if (tempMax>=38) msgs.push('🔥 Caniculă severă ('+tempMax+'°C) — hidratare și evitarea expunerii la soare obligatorii');
  else if (tempMax>=33) msgs.push('☀️ Temperaturi ridicate așteptate ('+tempMax+'°C) — hidratați-vă');
  const uvMax=Math.max(...hours.map(h=>h.uv||0));
  if (uvMax>=11) msgs.push('☀️ UV extrem ('+uvMax.toFixed(1)+') — evitați expunerea între 11:00–16:00');
  else if (uvMax>=8) msgs.push('🧴 UV foarte ridicat ('+uvMax.toFixed(1)+') — folosiți protecție solară SPF 50+');
  const fogCodes=[45,48];
  if (hours.slice(0,6).some(h=>fogCodes.includes(h.code))) msgs.push('🌫️ Ceață în următoarele ore — vizibilitate redusă pe drum');
  if (cw.pressure&&state.data?.hourly?.pressure_msl) {
    const hPres=state.data.hourly.pressure_msl;
    if (hPres.length>=6) {
      const drop=hPres[0]-hPres[5];
      if (drop>5) msgs.push('📉 Presiunea atmosferică scade rapid — vremea se va deteriora');
    }
  }
  if (msgs.length) {
    banner.innerHTML=msgs.map(m=>`<div class="alert-item">${m}</div>`).join('');
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
    banner.innerHTML='';
  }
}

let clockInterval=null;
function startLiveClock(){
  if (clockInterval) clearInterval(clockInterval);
  const el=document.getElementById('liveClock');
  if (!el) return;
  const tick=()=>{ try{el.textContent=new Intl.DateTimeFormat('ro-RO',{hour:'2-digit',minute:'2-digit',timeZone:state.tz}).format(new Date());}catch(e){el.textContent=new Date().toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'});} };
  tick(); clockInterval=setInterval(tick,30000);
}

// Theme toggle
(function(){
  const saved=localStorage.getItem('vremea_theme')||'dark';
  if (saved==='light') document.body.classList.add('light');
  if (saved==='reduce') document.body.classList.add('reduce-motion');
  document.addEventListener('click',e=>{
    if (e.target.closest('#themeBtn')){
      const body=document.body;
      if (!body.classList.contains('light')&&!body.classList.contains('reduce-motion')){
        body.classList.add('light'); localStorage.setItem('vremea_theme','light');
      } else if (body.classList.contains('light')){
        body.classList.remove('light'); body.classList.add('reduce-motion'); localStorage.setItem('vremea_theme','reduce');
      } else {
        body.classList.remove('reduce-motion'); localStorage.setItem('vremea_theme','dark');
      }
    }
  });
})();

// Parallax
document.addEventListener('mousemove',e=>{
  const x=e.clientX/window.innerWidth-0.5;
  const y=e.clientY/window.innerHeight-0.5;
  document.querySelectorAll('.glow-orb').forEach((el,i)=>{
    el.style.transform=`translate(${x*(22+i*12)}px,${y*(22+i*12)}px)`;
  });
});

document.addEventListener('DOMContentLoaded',()=>{setTimeout(renderFavorites,100);});

document.addEventListener('click',e=>{
  if (e.target.closest('#clarityBtn')){
    document.body.classList.toggle('high-contrast');
    localStorage.setItem('vremea_clarity',document.body.classList.contains('high-contrast')?'1':'0');
  }
});
if (localStorage.getItem('vremea_clarity')==='1') document.body.classList.add('high-contrast');

// ── Boot ──
loadWeather();
setInterval(loadWeather, 10*60*1000);
document.addEventListener('visibilitychange',()=>{
  if (document.visibilityState==='visible'){
    const last=state.data?._fetchedAt?new Date(state.data._fetchedAt).getTime():0;
    if (Date.now()-last>120000) loadWeather();
  }
});
</script>
</body>
</html>
