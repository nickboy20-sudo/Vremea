// ── Performance scaling for dynamic backgrounds ──
// Fewer animated particles on small screens / low-end devices / reduced-motion
// so the weather background paints faster and stays smooth.
const PERF = (() => {
  const w = window.innerWidth || 1024;
  const reducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const lowCPU = (navigator.hardwareConcurrency || 8) <= 4;
  const canHover = window.matchMedia && window.matchMedia('(hover: hover) and (pointer: fine)').matches;
  let scale = 1;
  if (w <= 400) scale = 0.35;
  else if (w <= 640) scale = 0.5;
  else if (w <= 900) scale = 0.75;
  if (lowCPU) scale *= 0.8;
  // "fancy" gates optional atmospheric flourishes (aurora, parallax) that add
  // beauty but aren't essential — skip them on small/low-power/reduced-motion.
  const fancy = !reducedMotion && scale >= 0.75;
  return { scale, reducedMotion, canHover, fancy };
})();
// Scales a particle count down on constrained devices, keeping a sane floor.
function pc(n) {
  if (PERF.reducedMotion) return Math.max(1, Math.round(n * 0.15));
  if (PERF.scale >= 1) return n;
  return Math.max(Math.min(n, 3), Math.round(n * PERF.scale));
}

// Enable the slow "living sky" drift only on devices that can afford the repaint cost.
if (PERF.fancy) document.body.classList.add('bg-drift');

// Subtle pointer parallax on the weather background for depth — desktop/mouse only.
if (PERF.fancy && PERF.canHover) {
  let rafPending = false, mx = 0, my = 0;
  window.addEventListener('mousemove', (e) => {
    mx = (e.clientX / window.innerWidth) - 0.5;
    my = (e.clientY / window.innerHeight) - 0.5;
    if (rafPending) return;
    rafPending = true;
    requestAnimationFrame(() => {
      const bg = document.getElementById('weather-bg');
      if (bg) bg.style.transform = `translate(${mx * -16}px, ${my * -12}px) scale(1.05)`;
      rafPending = false;
    });
  }, { passive: true });
}

function getWeatherBgClass(code, isDay) {
  if ([95,96,99].includes(code)) return 'bg-storm';
  if ([71,73,75,77,85,86].includes(code)) return 'bg-snow';
  if ([51,53,55,61,63,65,80,81,82].includes(code)) return 'bg-rain';
  if ([45,48].includes(code)) return 'bg-fog';
  if (code === 3) return 'bg-overcast';
  if (code === 2) return 'bg-partly-cloudy';
  if (code === 0 || code === 1) return 'bg-sunny';
  return 'bg-overcast';
}

function updateWeatherBg(code, isDay, sunrise, sunset) {
  const bg = document.getElementById('weather-bg');
  const cls = getWeatherBgClass(code, isDay);

  // Golden hour: within ~35 min of sunrise (dawn) or sunset (dusk) — warm color wash.
  let extraCls = isDay ? '' : ' night';
  if (sunrise && sunset) {
    const now = Date.now();
    const riseT = new Date(sunrise).getTime();
    const setT  = new Date(sunset).getTime();
    const WINDOW = 35 * 60 * 1000;
    if (!isNaN(riseT) && Math.abs(now - riseT) < WINDOW) extraCls += ' golden';
    else if (!isNaN(setT) && Math.abs(now - setT) < WINDOW) extraCls += ' golden dusk';
  }
  bg.className = cls + extraCls;

  const bgMap = {
    'bg-sunny':         isDay ? '#0a2e8a' : '#03060f',
    'bg-partly-cloudy': isDay ? '#0d3a7a' : '#030d1f',
    'bg-overcast':      isDay ? '#2a3540' : '#080b10',
    'bg-fog':           isDay ? '#5a6570' : '#18202a',
    'bg-rain':          isDay ? '#081525' : '#04080f',
    'bg-snow':          isDay ? '#5a7898' : '#08101e',
    'bg-storm':         isDay ? '#050810' : '#020306',
  };
  const bodyColor = bgMap[cls] || '#07091a';
  document.documentElement.style.background = bodyColor;
  document.body.style.background = bodyColor;

  let inner = '';

  if (cls === 'bg-sunny') {
    inner = isDay
      ? buildSunDay()
      : ('<div class="moon-orb"></div><div class="moon-halo"></div>'
        + (PERF.fancy ? '<div class="aurora-ribbon"></div>' : '')
        + buildStars(pc(90)));
  } else if (cls === 'bg-partly-cloudy') {
    inner = isDay ? buildPartlyCloudyDay() : buildPartlyCloudyNight();
  } else if (cls === 'bg-overcast') {
    inner = isDay ? buildOvercastDay() : buildOvercastNight();
  } else if (cls === 'bg-fog') {
    inner = isDay ? buildFogDay() : buildFogNight();
  } else if (cls === 'bg-rain') {
    inner = (isDay
      ? buildOvercastDay()
      : buildOvercastNight())
      + buildRain(pc(85), !isDay)
      + (isDay ? '' : '<div class="pavement-reflection"></div>')
      + '<div class="rain-splash"></div>';
  } else if (cls === 'bg-snow') {
    inner = (isDay
      ? buildOvercastDay()
      : '<div class="winter-aurora"></div>' + buildOvercastNight())
      + buildSnow(pc(65), !isDay);
  } else if (cls === 'bg-storm') {
    inner = isDay ? buildStormDay() : buildStormNight();
  }

  bg.innerHTML = inner;
}

function findBestWindow(hours) {
  if (!hours || hours.length < 3) return null;
  let best = null, bestScore = 1e9;
  for (let i=0;i<=hours.length-3;i++) {
    const slice = hours.slice(i,i+3);
    const prec = slice.reduce((a,h)=>a+h.prec,0);
    const wind = slice.reduce((a,h)=>a+h.wind,0)/3;
    const temp = slice.reduce((a,h)=>a+h.temp,0)/3;
    const score = prec*10 + wind*0.5 - (temp>=18 && temp<=26 ? 5 : 0);
    if (score < bestScore) { bestScore = score; best = { start: slice[0].hour, end: slice[2].hour, temp: Math.round(temp), prec: prec.toFixed(1) }; }
  }
  return best;
}

function selectHour(t) {
  state.selectedHour = t;
  const hours = state.selectedDay === 0 ? getHourlyFromNow(state.data) : getHourlyForDay(state.data, state.selectedDay);
  document.querySelector('.hourly-scroll').innerHTML = buildHourlyRow(hours);
  const h = hours.find(x => x.t === t);
  if (h) {
    const cwEl = document.querySelector('.current-temp');
    if (cwEl) cwEl.childNodes[0].nodeValue = h.temp + '°';
    const condEl = document.querySelector('.current-cond');
    if (condEl) condEl.textContent = desc(h.code) + ` · resimțite ${h.feel}° · vânt ${h.wind} km/h`;
  }
}

const FAV_KEY = 'vremea_favs_v2';
function getFavorites(){ try { return JSON.parse(localStorage.getItem(FAV_KEY)||'[]'); } catch(e){ return []; } }
function saveFavorites(f){ localStorage.setItem(FAV_KEY, JSON.stringify(f)); }
function isFavorite(city, lat, lon){ return getFavorites().some(x => Math.abs(x.lat-lat)<0.05 && Math.abs(x.lon-lon)<0.05); }
function toggleFavorite(){
  const favs = getFavorites();
  const idx = favs.findIndex(x => Math.abs(x.lat-state.lat)<0.05 && Math.abs(x.lon-state.lon)<0.05);
  if (idx >= 0) { favs.splice(idx,1); } else { favs.unshift({ city: state.city, country: state.country, lat: state.lat, lon: state.lon, tz: state.tz }); }
  saveFavorites(favs.slice(0,6));
  renderFavorites();
  const btn = document.querySelector('.fav-star');
  if (btn) { const saved = isFavorite(state.city, state.lat, state.lon); btn.textContent = saved ? '★' : '☆'; btn.classList.toggle('saved', saved); }
}
function renderFavorites(){
  const row = document.getElementById('favoritesRow');
  if (!row) return;
  const favs = getFavorites();
  if (!favs.length) { row.innerHTML = '<span style="font-size:11px;color:var(--text3)">Salvează locații cu ★</span>'; return; }
  row.innerHTML = favs.map(f => {
    const active = Math.abs(f.lat-state.lat)<0.05 && Math.abs(f.lon-state.lon)<0.05;
    return `<button class="fav-chip ${active?'active':''}" onclick="goFavorite(${f.lat},${f.lon},'${f.city.replace(/'/g,"\\'")}','${(f.country||'').replace(/'/g,"\\'")}','${f.tz}')">${esc(f.city)}<span class="rm" onclick="event.stopPropagation();removeFavorite(${f.lat},${f.lon})">×</span></button>`;
  }).join('');
}
function goFavorite(lat,lon,city,country,tz){ setState({lat,lon,city,country,tz}); searchInput.value = city + (country?`, ${country}`:''); searchClear.style.display='block'; loadWeather(); }
function removeFavorite(lat,lon){ const favs = getFavorites().filter(x=> Math.abs(x.lat-lat)>=0.05 || Math.abs(x.lon-lon)>=0.05); saveFavorites(favs); renderFavorites(); }

function checkAlerts(hours, cw){
  const banner = document.getElementById('alertBanner');
  if (!banner) return;
  const msgs = [];

  // Vânt periculos (acum)
  if ((cw.windspeed||0) > 60) msgs.push('🌬️ Vânt extrem de puternic acum (' + Math.round(cw.windspeed) + ' km/h)');
  else if ((cw.windspeed||0) > 40) msgs.push('💨 Vânt puternic acum (' + Math.round(cw.windspeed) + ' km/h)');

  // Rafale periculoase
  const gustNow = cw.gust ?? Math.round((cw.windspeed||0)*1.4);
  if (gustNow > 80) msgs.push('💨 Rafale foarte puternice (' + Math.round(gustNow) + ' km/h) — evitați deplasările');

  // Ploaie intensă
  const heavyRainHours = hours.filter(h=>h.prec>=5);
  if (heavyRainHours.length >= 3) msgs.push(`🌧️ Ploaie torențială în ${heavyRainHours.length} ore din următoarele 24h`);
  else if (heavyRainHours.length) msgs.push(`🌧️ Ploaie intensă în ${heavyRainHours.length} ore din următoarele 24h`);

  // Furtună
  const stormCodes = [95,96,99];
  if (hours.some(h=>stormCodes.includes(h.code))) msgs.push('⛈️ Risc de furtună cu descărcări electrice în următoarele ore');

  // Ninsoare
  const snowCodes = [71,73,75,77,85,86];
  if (hours.some(h=>snowCodes.includes(h.code))) msgs.push('❄️ Ninsoare așteptată — conduceți cu precauție');

  // Temperaturi extreme
  const tempMin = Math.min(...hours.map(h=>h.temp));
  const tempMax = Math.max(...hours.map(h=>h.temp));
  if (tempMin <= -10) msgs.push('🥶 Ger extrem așteptat (' + tempMin + '°C) — riscul de degerături este ridicat');
  else if (tempMin <= 0) msgs.push('❄️ Temperaturi sub 0°C așteptate — pericol de gheață pe căi rutiere');
  if (tempMax >= 38) msgs.push('🔥 Caniculă severă (' + tempMax + '°C) — hidratare și evitarea expunerii la soare obligatorii');
  else if (tempMax >= 33) msgs.push('☀️ Temperaturi ridicate așteptate (' + tempMax + '°C) — hidratați-vă');

  // UV periculos
  const uvMax = Math.max(...hours.map(h=>h.uv||0));
  if (uvMax >= 11) msgs.push('☀️ UV extrem (' + uvMax.toFixed(1) + ') — evitați expunerea între 11:00–16:00');
  else if (uvMax >= 8) msgs.push('🧴 UV foarte ridicat (' + uvMax.toFixed(1) + ') — folosiți protecție solară SPF 50+');

  // Vizibilitate redusă
  const fogCodes = [45,48];
  if (hours.slice(0,6).some(h=>fogCodes.includes(h.code))) msgs.push('🌫️ Ceață în următoarele ore — vizibilitate redusă pe drum');

  // Presiune în scădere rapidă (semn de deteriorare a vremii)
  if (cw.pressure && state.data?.hourly?.pressure_msl) {
    const hPres = state.data.hourly.pressure_msl;
    if (hPres.length >= 6) {
      const drop = hPres[0] - hPres[5];
      if (drop > 5) msgs.push('📉 Presiunea atmosferică scade rapid — vremea se va deteriora');
    }
  }

  if (msgs.length) {
    banner.innerHTML = msgs.map(m => `<div class="alert-item">${m}</div>`).join('');
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
    banner.innerHTML = '';
  }
}

let clockInterval = null;
function startLiveClock(){
  if (clockInterval) clearInterval(clockInterval);
  const el = document.getElementById('liveClock');
  if (!el) return;
  const tick = ()=>{ try { el.textContent = new Intl.DateTimeFormat('ro-RO',{hour:'2-digit',minute:'2-digit', timeZone: state.tz}).format(new Date()); } catch(e){ el.textContent = new Date().toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'}); } };
  tick(); clockInterval = setInterval(tick, 30000);
}

    if (e.target.closest('#themeBtn')){
      const body = document.body;
      if (!body.classList.contains('light') && !body.classList.contains('reduce-motion')){
        body.classList.add('light'); localStorage.setItem('vremea_theme','light');
      } else if (body.classList.contains('light')){
        body.classList.remove('light'); body.classList.add('reduce-motion'); localStorage.setItem('vremea_theme','reduce');
      } else {
        body.classList.remove('reduce-motion'); localStorage.setItem('vremea_theme','dark');
      }
    }
  });
})();

// Parallax subtle
document.addEventListener('mousemove', e=>{
  const x = e.clientX / window.innerWidth - 0.5;
  const y = e.clientY / window.innerHeight - 0.5;
  document.querySelectorAll('.glow-orb').forEach((el,i)=>{
    el.style.transform = `translate(${x*(20+i*10)}px, ${y*(20+i*10)}px)`;
  });
});

// init favorites row on first load
document.addEventListener('DOMContentLoaded', ()=>{ setTimeout(renderFavorites, 100); });


// Claritate toggle - reduce background intensity
document.addEventListener('click', e=>{
  if (e.target.closest('#clarityBtn')){
    document.body.classList.toggle('high-contrast');
    localStorage.setItem('vremea_clarity', document.body.classList.contains('high-contrast') ? '1' : '0');
  }
});
// restore
if (localStorage.getItem('vremea_clarity') === '1') document.body.classList.add('high-contrast');

// ── Boot ──
loadWeather();

// auto-refresh la fiecare 10 minute
setInterval(loadWeather, 10 * 60 * 1000);

// reîncarcă când revii în tab
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    // evită refresh dacă datele sunt mai noi de 2 minute
    const last = state.data?._fetchedAt ? new Date(state.data._fetchedAt).getTime() : 0;
    if (Date.now() - last > 120000) loadWeather();
  }
});
</script>
</body>
</html>
