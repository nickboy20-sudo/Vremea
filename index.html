<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prognoză Meteo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Mono:wght@300;400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js" defer></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #07091a;
    --bg2: #0d1028;
    --bg3: #131630;
    --card: rgba(255,255,255,0.06);
    --card-hover: rgba(255,255,255,0.10);
    --border: rgba(255,255,255,0.12);
    --border2: rgba(255,255,255,0.18);
    --text: #e8eaf6;
    --text2: rgba(232,234,246,0.65);
    --text3: rgba(232,234,246,0.35);
    --gold: #f5c842;
    --gold2: #e8a820;
    --teal: #38d9c4;
    --teal2: #20b8a6;
    --blue: #5b9cf6;
    --rain: #7eb8f7;
    --accent: #c084fc;
    --font-display: 'Cormorant Garamond', serif;
    --font-data: 'Outfit', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --r: 16px;
    --r2: 24px;
    --bg-suggestions: #0a0c1f;
    --bg-suggestions-hover: rgba(91,156,246,0.15);
    --rain-bar-high: rgba(120,180,250,0.8);
    --rain-bar-mid: rgba(120,180,250,0.55);
    --rain-bar-low: rgba(120,180,250,0.3);
    --blur-sm: 12px;
    --blur-lg: 16px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-data);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  .noise {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 256px;
  }

  .glow-orb {
    position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0;
  }
  .glow-orb.a { width: 500px; height: 500px; top: -200px; left: -100px; background: rgba(91,156,246,0.12); }
  .glow-orb.b { width: 400px; height: 400px; bottom: 100px; right: -100px; background: rgba(56,217,196,0.09); }
  .glow-orb.c { width: 300px; height: 300px; top: 40%; left: 40%; background: rgba(245,200,66,0.05); }

  /* ── Lightweight mode: mobile & reduced-motion get cheaper blurs/backgrounds ── */
  @media (max-width: 640px) {
    :root { --blur-sm: 8px; --blur-lg: 10px; }
    .glow-orb { filter: blur(50px); }
    .glow-orb.a { width: 280px; height: 280px; }
    .glow-orb.b { width: 230px; height: 230px; }
    .glow-orb.c { width: 180px; height: 180px; }
  }
  @media (max-width: 400px) {
    .noise { display: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    .noise { display: none; }
    .glow-orb { filter: blur(40px); }
  }
  body.reduce-motion .noise { display: none; }
  body.reduce-motion .glow-orb { filter: blur(40px); }

  .app {
    position: relative; z-index: 1;
    max-width: 1100px; margin: 0 auto;
    padding: 48px 28px 90px;
  }

  /* ── Search Bar ── */
  .search-wrap {
    position: relative;
    margin-bottom: 32px;
    animation: fadeUp 0.5s ease both;
    isolation: isolate;
    z-index: 200;
  }
  .search-inner {
    position: relative;
    display: flex; align-items: center;
  }
  .search-icon {
    position: absolute; left: 16px;
    color: var(--text3); font-size: 16px;
    pointer-events: none; z-index: 1;
  }
  .search-input {
    backdrop-filter: blur(var(--blur-sm));
    -webkit-backdrop-filter: blur(var(--blur-sm));
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    backdrop-filter: blur(var(--blur-lg)) saturate(1.2);
    -webkit-backdrop-filter: blur(var(--blur-lg)) saturate(1.2);
    border-radius: 50px;
    padding: 14px 100px 14px 48px;
    color: var(--text);
    font-family: var(--font-data);
    font-size: 15px;
    font-weight: 400;
    outline: none;
    transition: border-color 0.25s, background 0.25s, box-shadow 0.25s, transform 0.2s;
    letter-spacing: 0.3px;
  }
  .search-input::placeholder { color: var(--text3); }
  .search-input:focus {
    border-color: rgba(91,156,246,0.5);
    background: rgba(91,156,246,0.06);
    box-shadow: 0 0 0 3px rgba(91,156,246,0.1);
  }
  .search-clear {
    position: absolute; right: 54px;
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 18px; line-height: 1;
    padding: 4px; border-radius: 50%;
    transition: color 0.15s;
    display: none;
  }
  .search-clear:hover { color: var(--text); }

  .gps-btn {
    position: absolute; right: 8px;
    display: flex; align-items: center; gap: 5px;
    background: rgba(56,217,196,0.1);
    border: 1px solid rgba(56,217,196,0.3);
    border-radius: 50px;
    padding: 6px 12px;
    color: var(--teal);
    font-family: var(--font-data);
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s, transform 0.15s;
    white-space: nowrap;
    letter-spacing: 0.3px;
  }
  .gps-btn:hover {
    background: rgba(56,217,196,0.2);
    border-color: rgba(56,217,196,0.55);
    transform: scale(1.04);
  }
  .gps-btn:active { transform: scale(0.97); }
  .gps-btn.loading {
    opacity: 0.7; pointer-events: none;
  }
  .gps-btn .gps-icon {
    font-size: 14px; line-height: 1;
    transition: transform 0.4s;
  }
  .gps-btn.loading .gps-icon {
    animation: spin 0.8s linear infinite;
  }
  @media (max-width: 400px) {
    .gps-btn span.gps-label { display: none; }
    .search-input {
    backdrop-filter: blur(var(--blur-sm));
    -webkit-backdrop-filter: blur(var(--blur-sm)); padding-right: 56px; }
    .search-clear { right: 50px; }
  }
  .search-suggestions {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    right: 0;
    background: var(--bg-suggestions);
    border: 1px solid rgba(91, 156, 246, 0.3);
    border-radius: 16px;
    overflow: hidden;
    z-index: 9999;
    box-shadow:
      0 15px 35px rgba(0,0,0,0.8),
      0 5px 15px rgba(0,0,0,0.5);
    display: none;
    animation: suggFadeIn 0.2s ease-out both;
  }
  @keyframes suggFadeIn {
    from { opacity: 0; transform: translateY(-6px) scale(0.99); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .search-suggestions.open { display: contents; }

  .suggestion-item {
    padding: 11px 16px;
    cursor: pointer;
    display: flex; align-items: center; gap: 12px;
    transition: background 0.12s;
    position: relative;
  }
  .suggestion-item + .suggestion-item::before {
    content: '';
    position: absolute; top: 0; left: 16px; right: 16px;
    height: 1px;
    background: rgba(255,255,255,0.07);
  }
  .suggestion-item:hover, .suggestion-item.focused {
    background: var(--bg-suggestions-hover);
  }
  .suggestion-item:hover .suggestion-pin-wrap,
  .suggestion-item.focused .suggestion-pin-wrap { background: rgba(91,156,246,0.25); }
  .suggestion-item:hover .suggestion-pin,
  .suggestion-item.focused .suggestion-pin { color: var(--blue); }

  .suggestion-pin-wrap {
    width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
    background: rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s;
  }
  .suggestion-pin { color: var(--text2); font-size: 14px; line-height: 1; }

  .suggestion-text { flex: 1; min-width: 0; }
  .suggestion-name {
    font-size: 14px; font-weight: 500; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .suggestion-region {
    font-size: 11px; color: var(--text3); margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .suggestion-meta {
    font-size: 11px; color: rgba(91,156,246,0.6);
    background: rgba(91,156,246,0.1);
    border: 1px solid rgba(91,156,246,0.15);
    border-radius: 20px;
    padding: 2px 9px;
    flex-shrink: 0; white-space: nowrap;
    font-family: var(--font-mono);
  }

  .search-loading {
    padding: 16px 20px; color: var(--text3); font-size: 13px;
    display: flex; align-items: center; gap: 10px;
    letter-spacing: 0.3px;
  }
  .search-loading .mini-spin {
    width: 14px; height: 14px; border: 1.5px solid rgba(91,156,246,0.2);
    border-top-color: var(--blue); border-radius: 50%;
    animation: spin 0.7s linear infinite; flex-shrink: 0;
  }
  .search-no-results {
    padding: 16px 20px; color: var(--text3); font-size: 13px;
    display: flex; align-items: center; gap: 10px;
  }
  .search-no-results::before { content: '🔍'; font-size: 15px; }

  /* ── Header ── */
  .header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 40px;
    animation: fadeUp 0.6s ease both;
  }
  .location-name {
    font-family: var(--font-display);
    font-size: 52px; font-weight: 300; letter-spacing: -1px;
    line-height: 1; color: var(--text);
  }
  .location-sub {
    font-size: 13px; color: var(--text2); margin-top: 6px;
    font-weight: 300; letter-spacing: 2px; text-transform: uppercase;
  }
  .now-temp { text-align: right; }
  .current-temp {
    font-family: var(--font-data);
    font-size: 80px; font-weight: 300; line-height: 1;
    background: linear-gradient(135deg, #f5f7ff, var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .current-cond { font-size: 14px; color: var(--text2); text-align: right; margin-top: 4px; }
  .current-icon {font-size: 48px; line-height: 1;text-align: right; margin-bottom: 4px; filter: drop-shadow(0 0 12px rgba(255,255,255,0.2));}

  /* ── Sun arc ── */
  .sun-section {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r2);
    box-shadow: 0 8px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.05); padding: 28px 32px;
    margin-bottom: 24px;
    animation: fadeUp 0.6s 0.1s ease both;
    display: grid; grid-template-columns: 1fr auto 1fr; gap: 20px; align-items: center;
  }
  .sun-info { display: flex; flex-direction: column; }
  .sun-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; }
  .sun-time { font-family: var(--font-mono); font-size: 28px; font-weight: 300; color: var(--gold); }
  .sun-duration { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .sun-arc-wrap { display: flex; justify-content: center; }
  svg.arc-svg { overflow: visible; }

  /* ── Hourly ── */
  .section-label {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--text3); margin-bottom: 12px; padding-left: 2px;
  }
  .hourly-scroll {
    display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 24px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    animation: fadeUp 0.6s 0.15s ease both;
  }
  .hour-card {
    flex-shrink: 0;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r); padding: 12px 10px;
    text-align: center; min-width: 60px;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    cursor: default;
  }
  .hour-card.active { background: rgba(91,156,246,0.15); border-color: rgba(91,156,246,0.4); }
  .hour-card.now { border-color: rgba(245,200,66,0.5); background: rgba(245,200,66,0.08); }
  .hour-card.now .hour-time { color: var(--gold); font-weight: 500; }
  .hour-card:hover { background: var(--card-hover); transform: translateY(-2px); }
  .hour-day-sep {
    flex-shrink: 0; align-self: center;
    color: var(--text3); font-size: 18px; line-height: 1;
    padding: 0 2px; user-select: none;
  }
  .hour-time { font-size: 11px; color: var(--text3); margin-bottom: 8px; font-family: var(--font-mono); }
  .hour-icon { font-size: 18px; margin-bottom: 6px; line-height: 1; }
  .hour-temp { font-size: 15px; font-weight: 500; }
  .hour-prec { font-size: 10px; color: var(--rain); margin-top: 4px; }

  /* ── 10-day forecast list ── */
  .days-grid {
    display: flex; flex-direction: column; gap: 0;
    margin-bottom: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    overflow: hidden;
    backdrop-filter: blur(var(--blur-lg));
    -webkit-backdrop-filter: blur(var(--blur-lg));
    animation: fadeUp 0.6s 0.2s ease both;
  }
  .day-card {
    display: grid;
    grid-template-columns: 100px 36px 1fr auto auto;
    align-items: center;
    gap: 12px;
    padding: 13px 20px;
    cursor: pointer;
    transition: background 0.18s;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .day-card:last-child { border-bottom: none; }
  .day-card:hover { background: var(--card-hover); }
  .day-card.active {
    background: rgba(91,156,246,0.10);
  }
  .day-card.active::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--blue);
    border-radius: 0 2px 2px 0;
  }
  .day-label-col {
    display: flex; flex-direction: column; gap: 1px;
  }
  .day-name {
    font-size: 13px; font-weight: 500; color: var(--text);
    text-transform: capitalize;
  }
  .day-card.active .day-name { color: var(--blue); }
  .day-date { font-size: 11px; color: var(--text3); }
  .day-icon { font-size: 24px; line-height: 1; text-align: center; }
  .day-desc { font-size: 13px; color: var(--text2); }
  .day-prec {
    font-size: 14px; color: white;
    text-align: right; min-width: 52px;
    opacity: 0.85;
  }
  .day-prec:empty, .day-prec.no-rain { color: transparent; }
  .day-temps {
    display: flex; gap: 8px; align-items: baseline;
    min-width: 72px; justify-content: flex-end;
  }
  .day-low { font-size: 13px; color: var(--text3); }
  .day-high { font-size: 15px; font-weight: 600; color: var(--text); }
  @media (max-width: 520px) {
    .day-card {
      grid-template-columns: 80px 30px 1fr auto;
      gap: 8px; padding: 11px 14px;
    }
    .day-desc { display: none; }
    .day-prec { min-width: 44px; font-size: 11px; }
    .day-temps { min-width: 60px; }
  }

  /* ── Total Precipitation Card ── */
  .precip-total-card {
    background: linear-gradient(135deg, rgba(126,184,247,0.08) 0%, rgba(91,156,246,0.05) 100%);
    border: 1px solid rgba(126,184,247,0.2);
    border-radius: var(--r2);
    box-shadow: 0 8px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.05);
    padding: 20px 28px;
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 24px;
    animation: fadeUp 0.6s 0.22s ease both;
    position: relative; overflow: hidden;
  }
  .precip-total-card::before {
    content: '';
    position: absolute; top: -30px; right: -30px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(126,184,247,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .precip-total-icon {
    font-size: 42px; line-height: 1; flex-shrink: 0;
    filter: drop-shadow(0 0 12px rgba(126,184,247,0.5));
  }
  .precip-total-info { flex: 1; }
  .precip-total-label {
    font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase;
    color: rgba(126,184,247,0.6); margin-bottom: 4px;
  }
  .precip-total-value {
    font-family: var(--font-display);
    font-size: 48px; font-weight: 300; line-height: 1;
    color: #a8d4fc;
  }
  .precip-total-value span { font-size: 22px; color: rgba(168,212,252,0.6); margin-left: 4px; }
  .precip-total-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .precip-total-breakdown {
    display: flex; flex-direction: column; gap: 4px; flex-shrink: 0;
    align-items: flex-end;
  }
  .precip-rainy-days {
    font-size: 13px; color: var(--rain);
    display: flex; align-items: center; gap: 6px;
  }
  .precip-rainy-days strong { font-size: 22px; font-weight: 500; font-family: var(--font-mono); }
  .precip-bar-wrap {
    width: 160px; height: 6px; background: rgba(255,255,255,0.06);
    border-radius: 3px; overflow: hidden; margin-top: 6px;
  }
  .precip-bar-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, #5b9cf6, #7eb8f7);
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }
  .precip-bar-label { font-size: 10px; color: var(--text3); margin-top: 3px; }
  @media (max-width: 600px) {
    .precip-total-card { flex-wrap: wrap; gap: 16px; }
    .precip-total-breakdown { align-items: flex-start; }
    .precip-bar-wrap { width: 100%; }
  }

  /* ── Week Summary Card ── */
  .week-summary-card {
    background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    box-shadow: 0 8px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.05);
    backdrop-filter: blur(var(--blur-lg)) saturate(1.2);
    -webkit-backdrop-filter: blur(var(--blur-lg)) saturate(1.2);
    padding: 22px 24px 20px;
    margin-bottom: 24px;
    animation: fadeUp 0.6s 0.2s ease both;
    position: relative; overflow: hidden;
  }
  .week-summary-card::before {
    content: '';
    position: absolute; top: -40px; left: -40px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(245,200,66,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .week-summary-title {
    font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--text3); margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .week-summary-title::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }
  .week-summary-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  .week-summary-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 14px 16px;
    position: relative;
    transition: background 0.2s ease, border-color 0.2s ease;
  }
  .week-summary-item:hover {
    background: var(--card-hover);
    border-color: var(--border2);
  }
  .week-summary-label {
    font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--text2); margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap;
  }
  .week-summary-label .wsi-icon { font-size: 13px; }
  .week-summary-value {
    font-family: var(--font-mono);
    font-size: 24px; font-weight: 400; color: var(--text);
    line-height: 1.1; margin-bottom: 6px;
  }
  .week-summary-value.hot { color: var(--gold); }
  .week-summary-value.cold { color: var(--blue); }
  .week-summary-value.rain { color: var(--rain); }
  .week-summary-value.chance { color: var(--teal); }
  .week-summary-day {
    font-size: 12px; color: var(--text3);
  }
  @media (max-width: 700px) {
    .week-summary-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 420px) {
    .week-summary-card { padding: 18px 16px; }
    .week-summary-value { font-size: 21px; }
  }

  /* ── Charts ── */
  .charts-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;
    animation: fadeUp 0.6s 0.25s ease both;
  }
  @media (max-width: 700px) { .charts-row { grid-template-columns: 1fr; } }
  .chart-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r2);
    box-shadow: 0 8px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.05); padding: 20px 20px 14px;
  }
  .chart-title {
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text3); margin-bottom: 16px;
  }
  .chart-wrap { position: relative; width: 100%; height: 180px; }

  /* ── Wind Chart Card ── */
.wind-chart-card {
  background: linear-gradient(135deg, rgba(56,217,196,0.06) 0%, rgba(32,184,166,0.03) 100%);
  border: 1px solid rgba(56,217,196,0.2);
  border-radius: var(--r2);
    box-shadow: 0 8px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.05); padding: 20px 20px 14px;
  margin-bottom: 24px;
  animation: fadeUp 0.6s 0.28s ease both;
  position: relative; overflow: hidden;
}
.wind-chart-card::before {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 180px; height: 180px;
  background: radial-gradient(circle, rgba(56,217,196,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.wind-chart-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
}
.wind-chart-subtitle {
  font-size: 10px; color: var(--text3); letter-spacing: 0.5px; margin-top: 2px;
}
.wind-now-badge {
  display: flex; align-items: center; gap: 10px;
  background: rgba(56,217,196,0.1); border: 1px solid rgba(56,217,196,0.25);
  border-radius: 12px; padding: 8px 14px;
}
.wind-compass {
  font-size: 22px; line-height: 1; color: var(--teal); display: inline-block;
  filter: drop-shadow(0 0 6px rgba(56,217,196,0.5));
  transition: transform 0.5s ease;
}
.wind-now-val {
  font-family: var(--font-mono); font-size: 22px; font-weight: 300;
  color: var(--teal); line-height: 1;
}
.wind-now-val span { font-size: 12px; color: rgba(56,217,196,0.6); margin-left: 2px; }
.wind-now-dir { font-size: 11px; color: var(--text3); margin-top: 2px;
  letter-spacing: 1px; text-transform: uppercase; }
.wind-chart-wrap { position: relative; width: 100%; height: 180px; }

  /* ── Hourly detail chart ── */
  .hourly-chart-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r2);
    box-shadow: 0 8px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.05); padding: 20px 20px 14px;
    margin-bottom: 24px;
    animation: fadeUp 0.6s 0.3s ease both;
  }
  .hourly-chart-wrap { position: relative; width: 100%; height: 160px; }

  /* ── Windy Radar Map ── */
  .windy-section {
    margin-bottom: 24px;
    animation: fadeUp 0.6s 0.35s ease both;
  }
  .windy-card {
    background: var(--card);
    border: 1px solid var(--border);
    backdrop-filter: blur(var(--blur-lg)) saturate(1.2);
    -webkit-backdrop-filter: blur(var(--blur-lg)) saturate(1.2);
    border-radius: var(--r2);
    box-shadow: 0 8px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.05);
    overflow: hidden;
    position: relative;
  }
  .windy-card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .windy-card-title {
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--text3);
    display: flex; align-items: center; gap: 8px;
  }
  .windy-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 8px var(--teal);
    animation: pulse-dot 2s ease infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  .windy-overlay-btns {
    display: flex; gap: 6px;
  }
  .windy-layer-btn {
    padding: 5px 12px; border-radius: 20px;
    font-size: 11px; font-family: var(--font-data); letter-spacing: 0.5px;
    cursor: pointer; border: 1px solid var(--border);
    background: var(--card); color: var(--text2);
    transition: all 0.18s;
  }
  .windy-layer-btn:hover { background: var(--card-hover); color: var(--text); }
  .windy-layer-btn.active {
    background: rgba(56,217,196,0.15); border-color: rgba(56,217,196,0.4);
    color: var(--teal);
  }
  .windy-frame-wrap {
    position: relative;
    width: 100%; height: 480px;
  }
  .windy-frame-wrap iframe {
    width: 100%; height: 100%;
    border: none; display: block;
    border-radius: 0 0 var(--r2) var(--r2);
  }
  .windy-loader {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--bg2); gap: 14px;
    border-radius: 0 0 var(--r2) var(--r2);
    transition: opacity 0.4s;
    pointer-events: none;
  }
  .windy-loader.hidden { opacity: 0; }
  .windy-loader .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite; }
  .windy-loader-text { font-size: 13px; color: var(--text2); letter-spacing: 1px; }

  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 300px; flex-direction: column; gap: 16px;
  }
  .spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
  .loading-text { font-size: 13px; color: var(--text2); letter-spacing: 1px; }
  .error-msg { color: #f87171; font-size: 14px; padding: 24px; text-align: center; }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    .app { padding: 20px 14px 60px; }
    .header { flex-direction: column; gap: 12px; margin-bottom: 24px; }
    .location-name { font-size: 38px; }
    .now-temp { text-align: left; display: flex; align-items: baseline; gap: 12px; }
    .current-temp { font-size: 56px; }
    .current-cond { text-align: left; margin-top: 0; }
    .sun-section {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      padding: 20px 18px;
      gap: 12px;
    }
    .sun-arc-wrap {
      grid-column: 1 / -1;
      order: -1;
    }
    .sun-arc-wrap svg { width: 100% !important; height: auto !important; }
    .sun-info:first-child { align-items: flex-start !important; }
    .sun-info:last-child { align-items: flex-end !important; }
    .sun-time { font-size: 22px; }
    .hourly-scroll { gap: 6px; }
    .hour-card { min-width: 52px; padding: 10px 7px; }
    .precip-total-card { flex-direction: column; gap: 14px; padding: 18px; }
    .precip-total-icon { font-size: 34px; }
    .precip-total-value { font-size: 38px; }
    .precip-total-breakdown { align-items: flex-start; width: 100%; }
    .precip-bar-wrap { width: 100%; }
    .charts-row { grid-template-columns: 1fr; }
    .windy-frame-wrap { height: 320px; }
    .windy-card-header { flex-direction: column; align-items: flex-start; gap: 10px; padding: 14px 16px; }
    .windy-overlay-btns { flex-wrap: wrap; gap: 6px; }
    .windy-layer-btn { padding: 6px 12px; font-size: 12px; }
    .search-input {
    backdrop-filter: blur(var(--blur-sm));
    -webkit-backdrop-filter: blur(var(--blur-sm)); font-size: 16px; } /* prevent iOS zoom */
  }
  @media (max-width: 380px) {
    .app { padding: 16px 10px 50px; }
    .location-name { font-size: 32px; }
    .current-temp { font-size: 46px; }
    .day-card { padding: 10px 8px; }
    .hour-card { min-width: 46px; padding: 8px 5px; }
    .windy-frame-wrap { height: 260px; }
    .week-summary-grid { gap: 10px; }
    .week-summary-item { padding: 12px 12px; }
  }
  html, body { max-width: 100vw; }
  img, svg, canvas, iframe { max-width: 100%; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ══════════════════════════════════════════
     WEATHER BACKGROUND SYSTEM
     Fiecare stare zi/noapte are animații unice
  ══════════════════════════════════════════ */

  #weather-bg {
    position: fixed; inset: 0; z-index: 0;
    transition: background 2.5s ease, transform 0.6s cubic-bezier(.16,.84,.44,1);
    overflow: hidden;
    transform: translate(0,0) scale(1.05);
    will-change: transform;
  }
  #weather-bg::after {
    content: '';
    position: absolute; inset: 0; z-index: 2;
    background:
      radial-gradient(ellipse at 50% 28%, transparent 0%, rgba(0,0,0,0.14) 65%, rgba(0,0,0,0.46) 100%),
      linear-gradient(180deg, rgba(0,0,0,0.34) 0%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
  }
  /* Warm color-grade wash for sunrise/sunset — toggled via .golden class */
  #weather-bg::before {
    content: '';
    position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(180deg, rgba(255,150,60,0.32) 0%, rgba(255,95,80,0.16) 32%, transparent 62%);
    opacity: 0;
    transition: opacity 3s ease;
    pointer-events: none;
  }
  #weather-bg.golden::before { opacity: 1; }
  #weather-bg.golden.dusk::before {
    background: linear-gradient(180deg, rgba(255,120,70,0.36) 0%, rgba(170,70,130,0.2) 34%, transparent 65%);
  }

  /* Living sky — very slow gradient drift for a breathing, immersive feel.
     Only enabled on capable devices (see PERF.fancy in JS) since animating
     background-position repaints rather than just compositing. */
  body.bg-drift #weather-bg.bg-sunny, body.bg-drift #weather-bg.bg-sunny.night,
  body.bg-drift #weather-bg.bg-partly-cloudy, body.bg-drift #weather-bg.bg-partly-cloudy.night,
  body.bg-drift #weather-bg.bg-overcast, body.bg-drift #weather-bg.bg-overcast.night,
  body.bg-drift #weather-bg.bg-fog, body.bg-drift #weather-bg.bg-fog.night,
  body.bg-drift #weather-bg.bg-snow, body.bg-drift #weather-bg.bg-snow.night,
  body.bg-drift #weather-bg.bg-rain, body.bg-drift #weather-bg.bg-rain.night {
    background-size: 145% 145%;
    animation: sky-drift 55s ease-in-out infinite alternate;
  }
  @keyframes sky-drift {
    0%   { background-position: 25% 10%; }
    50%  { background-position: 60% 40%; }
    100% { background-position: 40% 0%; }
  }

  .aurora-ribbon {
    position: absolute; top: -8%; left: -10%; width: 120%; height: 50%;
    background: linear-gradient(115deg,
      transparent 0%, rgba(70,225,175,0.16) 22%, rgba(110,190,255,0.18) 42%,
      rgba(170,120,255,0.14) 62%, transparent 82%);
    filter: blur(38px);
    mix-blend-mode: screen;
    animation: aurora-flow 16s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes aurora-flow {
    0%   { transform: translateX(-6%) skewY(-2deg); opacity: 0.55; }
    50%  { transform: translateX(6%) skewY(2deg);   opacity: 0.9; }
    100% { transform: translateX(-3%) skewY(-1deg); opacity: 0.65; }
  }


  /* ─────────────────────────────────────────
     1. SENIN ZI (cod 0, 1)
     Soare pulsând, raze calorice, cer albastru viu
  ───────────────────────────────────────── */
  #weather-bg.bg-sunny {
    background: linear-gradient(175deg, #0a2e8a 0%, #1158cc 25%, #2176e8 55%, #3d9de4 80%, #5cc8f0 100%);
  }
  /* Corona solară exterioară */
  .sun-corona {
    position: absolute;
    width: 340px; height: 340px; border-radius: 50%;
    top: -60px; right: 8%;
    background: radial-gradient(circle, rgba(255,235,100,0.18) 0%, rgba(255,200,40,0.1) 40%, rgba(255,160,0,0.04) 70%, transparent 85%);
    animation: corona-pulse 7s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes corona-pulse {
    0%,100%{transform:scale(1) rotate(0deg);opacity:0.7}
    33%{transform:scale(1.12) rotate(60deg);opacity:1}
    66%{transform:scale(0.96) rotate(120deg);opacity:0.85}
  }
  .sun-orb {
    position: absolute;
    width: 160px; height: 160px; border-radius: 50%;
    top: 20px; right: calc(8% + 90px);
    background: radial-gradient(circle, #fffbe0 0%, #ffe566 30%, rgba(255,190,20,0.6) 60%, transparent 82%);
    filter: blur(3px);
    animation: sun-pulse 5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes sun-pulse {
    0%,100%{transform:scale(1);filter:blur(3px)}
    50%{transform:scale(1.1);filter:blur(2px)}
  }
  /* Raze diagonale */
  .sun-ray {
    position: absolute;
    width: 3px;
    background: linear-gradient(to bottom, rgba(255,240,100,0.5), transparent);
    transform-origin: bottom center;
    border-radius: 2px;
    pointer-events: none;
    animation: ray-spin 20s linear infinite;
  }
  @keyframes ray-spin {
    from{transform:rotate(var(--r)) scaleY(1)}
    50%{transform:rotate(calc(var(--r) + 180deg)) scaleY(0.7)}
    to{transform:rotate(calc(var(--r) + 360deg)) scaleY(1)}
  }
  /* Particule de căldură ce se ridică */
  .heat-particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,220,80,0.15);
    animation: heat-rise linear infinite;
    pointer-events: none;
  }
  @keyframes heat-rise {
    0%{transform:translateY(0) scale(1);opacity:0}
    15%{opacity:0.6}
    80%{opacity:0.2}
    100%{transform:translateY(-80vh) scale(2.5);opacity:0}
  }

  /* ─────────────────────────────────────────
     2. SENIN NOAPTE (cod 0, 1 + night)
     Lună detaliată, stele cu scânteiere, Calea Lactee
  ───────────────────────────────────────── */
  #weather-bg.bg-sunny.night {
    background: radial-gradient(ellipse at 30% 0%, #0e1533 0%, #060b1e 50%, #02040d 100%);
  }
  .moon-orb {
    position: absolute;
    width: 100px; height: 100px; border-radius: 50%;
    top: 50px; right: 13%;
    background: radial-gradient(circle at 35% 35%, #f8f4e8 0%, #e8dfc0 35%, #c8b880 65%, rgba(180,160,80,0.3) 85%, transparent 100%);
    box-shadow: 0 0 30px rgba(240,230,180,0.25), 0 0 80px rgba(200,190,130,0.1);
    animation: moon-bob 12s ease-in-out infinite;
    pointer-events: none;
  }
  /* Umbra lunii (cratera) */
  .moon-orb::before {
    content:'';
    position:absolute;
    width:18px;height:18px;border-radius:50%;
    top:22px;left:55px;
    background: rgba(150,130,60,0.35);
    box-shadow: -12px 8px 0 rgba(150,130,60,0.2), 8px 20px 0 6px rgba(150,130,60,0.15);
  }
  @keyframes moon-bob {
    0%,100%{transform:translateY(0) rotate(-3deg)}
    50%{transform:translateY(-12px) rotate(3deg)}
  }
  .moon-halo {
    position: absolute;
    width: 200px; height: 200px; border-radius: 50%;
    top: 0px; right: calc(13% - 50px);
    border: 1px solid rgba(220,210,160,0.1);
    box-shadow: 0 0 60px rgba(220,210,160,0.08);
    animation: halo-pulse 8s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes halo-pulse {
    0%,100%{opacity:0.4;transform:scale(1)}
    50%{opacity:0.9;transform:scale(1.06)}
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: star-twinkle ease-in-out infinite;
  }
  @keyframes star-twinkle {
    0%,100%{opacity:0.15;transform:scale(0.8)}
    50%{opacity:1;transform:scale(1.3)}
  }
  /* Calea Lactee */
  .milky-way {
    position: absolute;
    width: 160%; height: 40%;
    top: 5%; left: -30%;
    background: linear-gradient(105deg, transparent 0%, rgba(180,200,255,0.03) 20%, rgba(200,210,255,0.06) 45%, rgba(180,200,255,0.03) 70%, transparent 100%);
    transform: rotate(-20deg);
    filter: blur(8px);
    animation: milky-drift 40s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes milky-drift {
    0%,100%{opacity:0.6;transform:rotate(-20deg) translateX(0)}
    50%{opacity:1;transform:rotate(-20deg) translateX(2%)}
  }
  /* Stele căzătoare */
  .shooting-star {
    position: absolute;
    width: 80px; height: 1.5px;
    background: linear-gradient(90deg, rgba(255,255,255,0.8), transparent);
    border-radius: 1px;
    opacity: 0;
    animation: shoot linear infinite;
    pointer-events: none;
  }
  @keyframes shoot {
    0%{opacity:0;transform:translateX(0) translateY(0)}
    5%{opacity:1}
    40%{opacity:0;transform:translateX(200px) translateY(100px)}
    100%{opacity:0;transform:translateX(200px) translateY(100px)}
  }

  /* ─────────────────────────────────────────
     3. PARȚIAL NOROS ZI (cod 2)
     Soare parțial ascuns, nori stratificați voluminoși
  ───────────────────────────────────────── */
  #weather-bg.bg-partly-cloudy {
    background: linear-gradient(180deg, #0d3a7a 0%, #1a5aa0 30%, #3078be 65%, #5298cc 100%);
  }
  .cloud-puff {
    position: absolute;
    border-radius: 50%;
    filter: blur(22px);
    animation: puff-drift linear infinite;
    pointer-events: none;
  }
  @keyframes puff-drift {
    0%{transform:translateX(-120px)}
    100%{transform:translateX(calc(100vw + 120px))}
  }
  /* Razele ce se filtrează prin nori */
  .sun-shaft {
    position: absolute;
    width: 60px;
    top: 0;
    background: linear-gradient(180deg, rgba(255,230,120,0.2) 0%, rgba(255,210,80,0.05) 60%, transparent 100%);
    transform-origin: top center;
    animation: shaft-sway 8s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes shaft-sway {
    0%,100%{opacity:0.6;transform:skewX(-5deg) scaleY(1)}
    50%{opacity:1;transform:skewX(5deg) scaleY(1.1)}
  }

  /* ─────────────────────────────────────────
     4. PARȚIAL NOROS NOAPTE (cod 2 + night)
     Lună care apare/dispare prin nori, atmosferă misterioasă
  ───────────────────────────────────────── */
  #weather-bg.bg-partly-cloudy.night {
    background: linear-gradient(180deg, #030d1f 0%, #060e20 30%, #0a1428 65%, #101a2e 100%);
  }
  .night-cloud {
    position: absolute;
    border-radius: 50%;
    filter: blur(28px);
    animation: night-cloud-drift linear infinite;
    pointer-events: none;
  }
  @keyframes night-cloud-drift {
    0%{transform:translateX(-150px)}
    100%{transform:translateX(calc(100vw + 150px))}
  }
  /* Moonlight peaking through */
  .moon-peek {
    position: absolute;
    width: 80px; height: 80px; border-radius: 50%;
    top: 40px; right: 15%;
    background: radial-gradient(circle, rgba(220,230,255,0.7) 0%, rgba(180,200,240,0.3) 50%, transparent 80%);
    filter: blur(4px);
    animation: moon-peek-anim 14s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes moon-peek-anim {
    0%,100%{opacity:0.3;filter:blur(8px)}
    40%,60%{opacity:0.9;filter:blur(2px)}
  }

  /* ─────────────────────────────────────────
     5. ACOPERIT ZI (cod 3)
     Nori grei suprapuși, lumină difuză albă-cenușie
  ───────────────────────────────────────── */
  #weather-bg.bg-overcast {
    background: linear-gradient(180deg, #2a3540 0%, #3c4e5a 30%, #566a78 65%, #7a9098 100%);
  }
  .overcast-layer {
    position: absolute;
    left: -5%; width: 110%;
    background: radial-gradient(ellipse 80% 50% at 50% 50%, rgba(200,215,225,0.18) 0%, transparent 70%);
    filter: blur(20px);
    animation: overcast-drift linear infinite;
    pointer-events: none;
  }
  @keyframes overcast-drift {
    0%{transform:translateX(-5%);opacity:0.3}
    30%{opacity:0.8}
    70%{opacity:0.5}
    100%{transform:translateX(5%);opacity:0.3}
  }

  /* ─────────────────────────────────────────
     6. ACOPERIT NOAPTE (cod 3 + night)
     Nori negri, lumini reflectate de jos
  ───────────────────────────────────────── */
  #weather-bg.bg-overcast.night {
    background: linear-gradient(180deg, #080b10 0%, #0e141c 35%, #141c26 70%, #1c2230 100%);
  }
  .city-glow {
    position: absolute;
    bottom: -10%; left: 50%;
    transform: translateX(-50%);
    width: 100%; height: 45%;
    background: radial-gradient(ellipse at 50% 100%, rgba(255,160,60,0.06) 0%, rgba(255,100,20,0.03) 40%, transparent 70%);
    filter: blur(30px);
    animation: city-glow-pulse 10s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes city-glow-pulse {
    0%,100%{opacity:0.6}
    50%{opacity:1}
  }
  .dark-cloud {
    position: absolute;
    border-radius: 50%;
    filter: blur(30px);
    animation: dark-cloud-move linear infinite;
    pointer-events: none;
  }
  @keyframes dark-cloud-move {
    0%{transform:translateX(-100px)}
    100%{transform:translateX(calc(100vw + 100px))}
  }

  /* ─────────────────────────────────────────
     7. CEAȚĂ ZI (cod 45, 48)
     Straturi dense de ceață ce plutesc lent, vizibilitate redusă
  ───────────────────────────────────────── */
  #weather-bg.bg-fog {
    background: linear-gradient(180deg, #5a6570 0%, #788490 30%, #9aa4ae 60%, #c0cad2 85%, #dce4ea 100%);
  }
  .fog-band {
    position: absolute;
    left: -15%; width: 130%;
    border-radius: 50%;
    background: linear-gradient(90deg, transparent, rgba(240,245,248,0.2) 20%, rgba(250,252,254,0.35) 50%, rgba(240,245,248,0.2) 80%, transparent);
    filter: blur(30px);
    animation: fog-wave ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes fog-wave {
    0%{transform:translateX(-8%) scaleX(1);opacity:0.4}
    100%{transform:translateX(8%) scaleX(1.05);opacity:0.9}
  }
  /* Picuri de apă condensată */
  .fog-drop {
    position: absolute;
    border-radius: 50%;
    background: rgba(220,235,245,0.4);
    filter: blur(1px);
    animation: fog-drop-float ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes fog-drop-float {
    0%,100%{transform:translateY(0) translateX(0);opacity:0.3}
    33%{transform:translateY(-15px) translateX(8px);opacity:0.7}
    66%{transform:translateY(5px) translateX(-5px);opacity:0.5}
  }

  /* ─────────────────────────────────────────
     8. CEAȚĂ NOAPTE (cod 45, 48 + night)
     Ceață nocturnă cu lumini difuze galbene
  ───────────────────────────────────────── */
  #weather-bg.bg-fog.night {
    background: linear-gradient(180deg, #18202a 0%, #262e36 35%, #343e48 65%, #424e58 100%);
  }
  .fog-night-band {
    position: absolute;
    left: -15%; width: 130%;
    border-radius: 50%;
    background: linear-gradient(90deg, transparent, rgba(180,190,200,0.12) 25%, rgba(200,210,215,0.2) 50%, rgba(180,190,200,0.12) 75%, transparent);
    filter: blur(35px);
    animation: fog-night-drift ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes fog-night-drift {
    0%{transform:translateX(-10%) scaleY(1);opacity:0.35}
    100%{transform:translateX(10%) scaleY(1.1);opacity:0.8}
  }
  .street-glow {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,200,80,0.15) 0%, transparent 70%);
    filter: blur(20px);
    animation: street-flicker 6s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes street-flicker {
    0%,100%{opacity:0.5}
    25%{opacity:0.8}
    50%{opacity:0.6}
    75%{opacity:0.9}
  }

  /* ─────────────────────────────────────────
     9. PLOAIE ZI (cod 51-65, 80-82)
     Ploaie diagonală, stropi, bălți ce se formează
  ───────────────────────────────────────── */
  #weather-bg.bg-rain {
    background: linear-gradient(180deg, #081525 0%, #0e2035 25%, #142840 55%, #1c3250 80%, #243a60 100%);
  }
  .rain-container {
    position: absolute; inset: 0; overflow: hidden; pointer-events: none;
  }
  .rain-drop {
    position: absolute;
    top: -10%;
    width: 1px;
    background: linear-gradient(180deg, transparent 0%, rgba(160,210,255,0.7) 50%, rgba(180,220,255,0.5) 100%);
    border-radius: 1px;
    animation: rain-fall linear infinite;
  }
  @keyframes rain-fall {
    0%{top:-10%;transform:translateX(0);opacity:0}
    5%{opacity:0.8}
    92%{opacity:0.6}
    100%{top:110%;transform:translateX(-20px);opacity:0}
  }
  /* Stropi pe "suprafață" */
  .rain-splash {
    position: absolute;
    bottom: 0; width: 100%; height: 6px;
    background: linear-gradient(180deg, rgba(120,180,255,0.0) 0%, rgba(120,180,255,0.06) 100%);
    animation: splash-pulse 1.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes splash-pulse {
    0%,100%{opacity:0.3}
    50%{opacity:0.8}
  }

  /* ─────────────────────────────────────────
     10. PLOAIE NOAPTE (cod 51-65, 80-82 + night)
     Ploaie argintie nocturnă, reflexii pe stradă
  ───────────────────────────────────────── */
  #weather-bg.bg-rain.night {
    background: linear-gradient(180deg, #04080f 0%, #070e18 25%, #0b1422 55%, #0e1828 80%, #121e30 100%);
  }
  .rain-drop.night-drop {
    background: linear-gradient(180deg, transparent 0%, rgba(180,200,255,0.5) 50%, rgba(200,215,255,0.35) 100%);
  }
  /* Reflexie pe pavaj */
  .pavement-reflection {
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 20%;
    background: linear-gradient(180deg, transparent, rgba(80,120,200,0.08));
    animation: reflection-shimmer 3s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes reflection-shimmer {
    0%,100%{opacity:0.4}
    50%{opacity:0.9}
  }

  /* ─────────────────────────────────────────
     11. NINSOARE ZI (cod 71-77, 85-86)
     Fulgi mari și mici, vânt de iarnă, cer alb-albăstriu
  ───────────────────────────────────────── */
  #weather-bg.bg-snow {
    background: linear-gradient(180deg, #5a7898 0%, #7898b8 25%, #a0b8cc 55%, #c8d8e6 80%, #e6eff6 100%);
  }
  .snow-container {
    position: absolute; inset: 0; overflow: hidden; pointer-events: none;
  }
  .snow-flake {
    position: absolute;
    top: -5%;
    border-radius: 50%;
    background: rgba(255,255,255,0.92);
    animation: snow-fall linear infinite;
    filter: blur(0.4px);
    box-shadow: 0 0 2px rgba(255,255,255,0.6);
  }
  @keyframes snow-fall {
    0%{top:-5%;transform:translateX(0) rotate(0deg) scale(1);opacity:0}
    8%{opacity:1}
    90%{opacity:0.8}
    100%{top:110%;transform:translateX(var(--sx,40px)) rotate(720deg) scale(0.8);opacity:0}
  }
  /* Scânteieri de cristal de gheață */
  .ice-crystal {
    position: absolute;
    width: 3px; height: 3px;
    background: rgba(200,230,255,0.9);
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    animation: crystal-spin ease-in-out infinite;
    pointer-events: none;
    filter: drop-shadow(0 0 3px rgba(180,220,255,0.8));
  }
  @keyframes crystal-spin {
    0%,100%{transform:rotate(0deg) scale(1);opacity:0}
    10%{opacity:1}
    50%{transform:rotate(180deg) scale(1.2);opacity:0.8}
    90%{opacity:0.6}
  }

  /* ─────────────────────────────────────────
     12. NINSOARE NOAPTE (cod 71-77, 85-86 + night)
     Fulgi luminoși pe fundal albastru-navy profund
  ───────────────────────────────────────── */
  #weather-bg.bg-snow.night {
    background: linear-gradient(180deg, #08101e 0%, #101828 30%, #182030 60%, #1e2838 85%, #243040 100%);
  }
  .snow-flake.night-flake {
    background: rgba(200,220,255,0.85);
    box-shadow: 0 0 4px rgba(180,210,255,0.7);
  }
  /* Neon de iarnă */
  .winter-aurora {
    position: absolute;
    width: 100%; height: 50%;
    top: 0;
    background: linear-gradient(180deg, rgba(60,100,200,0.06) 0%, rgba(80,160,220,0.04) 40%, transparent 100%);
    filter: blur(15px);
    animation: aurora-wave 20s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes aurora-wave {
    0%,100%{opacity:0.4;transform:skewX(0deg)}
    33%{opacity:0.9;transform:skewX(3deg)}
    66%{opacity:0.6;transform:skewX(-2deg)}
  }

  /* ─────────────────────────────────────────
     13. FURTUNĂ ZI (cod 95, 96, 99)
     Nori negri, ploaie torențială, fulgere dramatice, cerul verde
  ───────────────────────────────────────── */
  #weather-bg.bg-storm {
    background: linear-gradient(180deg, #050810 0%, #0a1020 30%, #0f1828 60%, #141f32 100%);
  }
  /* Flash al fulgerului – iluminare totală */
  .lightning-flash {
    position: absolute; inset: 0;
    opacity: 0;
    animation: lightning-strike 11s ease infinite;
    pointer-events: none;
    background: rgba(180,210,255,0.0);
  }
  @keyframes lightning-strike {
    0%,82%,100%{opacity:0;background:rgba(180,210,255,0)}
    83%{opacity:1;background:rgba(180,220,255,0.22)}
    84%{opacity:0;background:rgba(180,210,255,0)}
    85%{opacity:0.7;background:rgba(200,225,255,0.15)}
    86%,89%{opacity:0;background:rgba(180,210,255,0)}
    90%{opacity:0.4;background:rgba(180,210,255,0.08)}
    91%{opacity:0}
  }
  /* Fulger SVG ramificat */
  .lightning-bolt {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    opacity: 0;
    animation: bolt-flash 11s ease infinite;
    pointer-events: none;
  }
  @keyframes bolt-flash {
    0%,81%,86%,100%{opacity:0}
    82%,84%{opacity:1}
    83%{opacity:0.6}
  }
  /* Fulger secundar */
  .lightning-bolt2 {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    opacity: 0;
    animation: bolt2-flash 11s ease infinite;
    pointer-events: none;
  }
  @keyframes bolt2-flash {
    0%,88%,93%,100%{opacity:0}
    89%,91%{opacity:1}
    90%{opacity:0.5}
  }
  /* Nori de furtună denși */
  .storm-cloud {
    position: absolute;
    border-radius: 50%;
    filter: blur(24px);
    animation: storm-cloud-roll linear infinite;
    pointer-events: none;
  }
  @keyframes storm-cloud-roll {
    0%{transform:translateX(-80px) translateY(0)}
    50%{transform:translateX(calc(50vw)) translateY(15px)}
    100%{transform:translateX(calc(100vw + 80px)) translateY(0)}
  }
  /* Ploaie torențială în furtună */
  .storm-rain-drop {
    position: absolute;
    top: -10%;
    width: 1.5px;
    background: linear-gradient(180deg, transparent, rgba(140,190,255,0.65));
    border-radius: 1px;
    animation: storm-rain-fall linear infinite;
    pointer-events: none;
  }
  @keyframes storm-rain-fall {
    0%{top:-10%;transform:translateX(0);opacity:0}
    5%{opacity:1}
    100%{top:110%;transform:translateX(-30px);opacity:0.4}
  }

  /* ─────────────────────────────────────────
     14. FURTUNĂ NOAPTE (cod 95, 96, 99 + night)
     Fundal negru absolut, fulgere violete, grindină
  ───────────────────────────────────────── */
  #weather-bg.bg-storm.night {
    background: linear-gradient(180deg, #020306 0%, #04060e 30%, #060916 60%, #080c1c 100%);
  }
  .lightning-flash.night-storm {
    animation: night-lightning-strike 9s ease infinite;
  }
  @keyframes night-lightning-strike {
    0%,78%,100%{opacity:0;background:rgba(140,100,255,0)}
    79%{opacity:1;background:rgba(160,120,255,0.3)}
    80%{opacity:0;background:rgba(140,100,255,0)}
    81%{opacity:0.8;background:rgba(180,140,255,0.2)}
    82%,85%{opacity:0;background:rgba(140,100,255,0)}
    86%{opacity:0.35;background:rgba(140,100,255,0.1)}
    87%{opacity:0}
  }
  /* Grindină */
  .hail-drop {
    position: absolute;
    top: -5%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,220,255,0.95) 0%, rgba(180,200,240,0.5) 60%, transparent 100%);
    animation: hail-fall linear infinite;
    filter: blur(0.2px);
    pointer-events: none;
  }
  @keyframes hail-fall {
    0%{top:-5%;transform:translateX(0);opacity:0}
    5%{opacity:1}
    95%{opacity:0.9}
    100%{top:110%;transform:translateX(-15px);opacity:0}
  }

  /* ── V2: Metrics, Outfit, Favorites, Alerts ── */
  .top-bar { display:flex; gap:8px; align-items:center; position:absolute; left:8px; top:50%; transform:translateY(-50%); z-index:2; }
  .theme-btn {
    background: rgba(255,255,255,0.05); border:1px solid var(--border); color: var(--text2);
    border-radius: 50px; padding:6px 10px; font-size:12px; cursor:pointer; transition:.2s;
    font-family: var(--font-data);
  }
  .theme-btn:hover { background: var(--card-hover); color: var(--text); }
  .search-input {
    backdrop-filter: blur(var(--blur-sm));
    -webkit-backdrop-filter: blur(var(--blur-sm)); padding-left: 110px !important; }
  .search-icon { left: 84px !important; }

  .favorites-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; min-height: 24px; }
  .fav-chip {
    background: var(--card); border:1px solid var(--border); color: var(--text2);
    padding:5px 12px; border-radius: 50px; font-size:12px; cursor:pointer; transition:.15s;
  }
  .fav-chip:hover { background: var(--card-hover); color: var(--text); border-color: var(--border2); }
  .fav-chip.active { background: rgba(91,156,246,0.15); border-color: rgba(91,156,246,0.4); color: var(--text); }
  .fav-chip .rm { margin-left:6px; opacity:.5; }
  .fav-chip .rm:hover { opacity:1; }

  .fav-star {
    background:none; border:1px solid var(--border); color: var(--gold);
    border-radius: 50%; width:36px; height:36px; cursor:pointer; font-size:16px;
    transition:.2s; margin-left:10px; flex-shrink:0;
  }
  .fav-star:hover { background: rgba(245,200,66,0.1); transform:scale(1.08); }
  .fav-star.saved { background: rgba(245,200,66,0.15); }
  .location-head { display:flex; align-items:center; gap:4px; }

  .alert-banner {
    background: linear-gradient(135deg, rgba(245,200,66,0.1), rgba(248,113,113,0.08));
    border:1px solid rgba(245,200,66,0.25); border-radius: var(--r2);
    box-shadow: 0 8px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.05);
    padding:14px 18px; margin-bottom:20px; font-size:13px; color: var(--text2);

    flex-direction: column; gap: 6px;
  }
  .alert-banner.show { display:flex; }
  .alert-banner strong { color: var(--gold); }
  .alert-item {
    display: flex; align-items: center; gap: 8px;

    border-bottom: 1px solid rgba(245,200,66,0.1);
  }
  .alert-item:last-child { border-bottom: none; padding-bottom: 0; }
  .alert-item:first-child { padding-top: 0; }

  .metrics-grid {
    display:grid; grid-template-columns: repeat(6,1fr); gap:10px;
    margin-bottom:22px; animation: fadeUp .6s .05s ease both;
  }
  @media (max-width: 900px){ .metrics-grid{ grid-template-columns: repeat(3,1fr);} }
  @media (max-width: 520px){ .metrics-grid{ grid-template-columns: repeat(2,1fr);} }
  .metric-card {
    background: var(--card); border:1px solid var(--border); border-radius: var(--r);
    padding:14px 14px; min-height: 92px;
  }
  .metric-label { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text3); margin-bottom:6px; }
  .metric-value { font-size:22px; font-weight:500; }
  .metric-value span { font-size:12px; color: var(--text2); margin-left:2px; }
  .metric-sub { font-size:11px; color: var(--text2); margin-top:3px; }
  .uv-bar { height:5px; background: rgba(255,255,255,0.07); border-radius:3px; margin-top:8px; overflow:hidden; }
  .uv-fill { height:100%; border-radius:3px; transition: width .6s ease; }

  .outfit-card {
    background: linear-gradient(135deg, rgba(192,132,252,0.07), rgba(91,156,246,0.05));
    border:1px solid rgba(192,132,252,0.2); border-radius: var(--r2);
    box-shadow: 0 8px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.05);
    padding:18px 22px; margin-bottom:22px; display:flex; gap:16px; align-items:center;

  .outfit-emoji { font-size:34px; flex-shrink:0; }
  .outfit-title { font-size:11px; letter-spacing:2px; text-transform:uppercase; color: rgba(192,132,252,0.8); margin-bottom:4px; }
  .outfit-text { font-size:14px; color: var(--text); line-height:1.5; }
  .outfit-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
  .outfit-tag { font-size:11px; background: rgba(255,255,255,0.05); border:1px solid var(--border); padding:3px 9px; border-radius: 50px; color: var(--text2); }

  .best-window {
    background: rgba(56,217,196,0.09); border:1px solid rgba(56,217,196,0.18);
    border-radius: 12px; padding:10px 14px; font-size:12px; color: var(--text2);
    margin-bottom:14px;
  }
  .best-window strong { color: var(--teal); }

  .hour-card { cursor: pointer; }
  .hour-card.selected { background: rgba(192,132,252,0.13); border-color: rgba(192,132,252,0.4); }
  .hour-feel { font-size:10px; color: var(--text3); margin-top:2px; }

  .live-clock { font-family: var(--font-mono); font-size:12px; color: var(--text3); letter-spacing:1px; }

  /* Light theme */
  body.light {
    --bg: #eef2f8; --bg2: #e4e9f2; --bg3: #dde3ee;
    --card: rgba(255,255,255,0.72); --card-hover: rgba(255,255,255,0.88);
    --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.15);
    --text: #1a2035; --text2: rgba(26,32,53,0.62); --text3: rgba(26,32,53,0.45);
    --bg-suggestions: #ffffff; --bg-suggestions-hover: rgba(91,156,246,0.08);
  }
  body.light #weather-bg::after { background: linear-gradient(180deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.78) 100%); }
  body.light .current-temp { background: linear-gradient(135deg, #1a2035, #b07500); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

  @media (prefers-reduced-motion: reduce) {
    #weather-bg, #weather-bg * { animation: none !important; transform: none !important; }
    .aurora-ribbon { display: none; }
  }
  body.reduce-motion #weather-bg, body.reduce-motion #weather-bg * { animation: none !important; transform: none !important; }
  body.reduce-motion .aurora-ribbon { display: none; }
  body.high-contrast #weather-bg { opacity: 0.45; }
  body.high-contrast #weather-bg::after { background: linear-gradient(180deg, rgba(5,8,22,0.72) 0%, rgba(5,8,22,0.88) 100%) !important; }
  body.high-contrast.light #weather-bg { opacity: 0.35; }



  
  /* ── Readability / Android fixes v2.1a ── */
  html, body { overflow-x: hidden; }

  .hourly-scroll {
    scrollbar-width: none;
    -ms-overflow-style: none;

  /* Stronger text contrast on bright backgrounds */
  .current-temp, .location-name, .section-title {

  body.light .current-temp,
  body.light .location-name,
  body.light .section-title {

<body>
<div id="weather-bg"></div>
<div class="noise"></div>
<div class="glow-orb a"></div>
<div class="glow-orb b"></div>
<div class="glow-orb c"></div>

<div class="app" style="padding-bottom: 0;">
  <div class="search-wrap" id="searchWrap">
    <div class="search-inner">
      <div class="top-bar">
        <button class="theme-btn" id="themeBtn" title="Temă">🌓</button>
        <button class="theme-btn" id="clarityBtn" title="Claritate fundal">👁️</button>
      </div>
      <span class="search-icon">🔍</span>
      <input
        class="search-input"
        id="searchInput"
        type="text"
        placeholder="Caută un oraș sau localitate…"

        spellcheck="false"

        <span class="gps-icon">📍</span>

      </button>

</div>

<div class="app" id="app" style="padding-top: 0;">

    <div class="loading-text">Se încarcă datele meteo…</div>
  </div>
</div>

<script>
// ── State centralizat ──
const state = {
  lat: 44.4268, lon: 26.1025,
  tz: 'Europe/Bucharest',
  city: 'București', country: 'Romania',
  data: null,
  selectedDay: 0,
  selectedHour: null
};

function setState(patch) {
  Object.assign(state, patch);
}

// Alias-uri pentru compatibilitate cu funcțiile existente
// (accesate prin state.* peste tot în cod)
let precipChart = null, tempChart = null, hourlyChart = null, windChart = null;
let searchTimeout = null;
let focusedSuggestion = -1;

// ── Utilitare ──

// Escapare HTML pentru innerHTML sigur (previne XSS)
function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// Data/ora curentă formatată în fusul orar al locației căutate (nu al browserului)
function nowLocalISO() {
  const now = new Date();
  const tz = state.tz || 'UTC';
  // Extragem data și ora în fusul orar al locației folosind Intl
  const parts = new Intl.DateTimeFormat('en-CA', {
    timeZone: tz,
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', hour12: false
  }).formatToParts(now);
  const get = t => parts.find(p => p.type === t)?.value ?? '00';
  const dateStr = `${get('year')}-${get('month')}-${get('day')}`;
  const hourStr = get('hour') === '24' ? '00' : get('hour');
  return { now, dateStr, hourStr, currentHourStr: `${dateStr}T${hourStr}` };
}

// Praguri precipitații — fără magic numbers în cod
const PRECIP_THRESHOLDS = [
  { max: 0,        label: 'Perioadă secetoasă — nicio ploaie așteptată',   emoji: '🏜️' },
  { max: 10,       label: 'Precipitații foarte reduse așteptate',           emoji: '🌂' },
  { max: 30,       label: 'Precipitații ușoare în această perioadă',        emoji: '🌂' },
  { max: 60,       label: 'Precipitații moderate — ia umbrela cu tine',     emoji: '☔' },

// Determină dacă un slot orar este zi sau noapte folosind sunrise/sunset din zilele API
function getHourIsDay(data, timeStr) {
  const dateStr = timeStr.slice(0, 10);
  const dayIdx = data.daily.time.indexOf(dateStr);
  if (dayIdx < 0) return true; // fallback
  const rise = data.daily.sunrise[dayIdx]; // ex: "2025-05-19T06:04"
  const set  = data.daily.sunset[dayIdx];  // ex: "2025-05-19T20:38"
  return timeStr >= rise && timeStr < set;
}

// ── Search / Geocoding ──
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
const searchSugg  = document.getElementById('searchSuggestions');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  searchClear.style.display = q ? 'block' : 'none';
  clearTimeout(searchTimeout);
  if (q.length < 2) { closeSuggestions(); return; }
  showSuggestionsLoading();
  searchTimeout = setTimeout(() => geocode(q), 300);
});

searchInput.addEventListener('keydown', e => {
  const items = searchSugg.querySelectorAll('.suggestion-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    focusedSuggestion = Math.min(focusedSuggestion + 1, items.length - 1);
    updateSuggestionFocus(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    focusedSuggestion = Math.max(focusedSuggestion - 1, 0);
    updateSuggestionFocus(items);
  } else if (e.key === 'Enter') {
    if (focusedSuggestion >= 0 && items[focusedSuggestion]) {
      items[focusedSuggestion].click();
    }
  } else if (e.key === 'Escape') {
    closeSuggestions();
    searchInput.blur();
  }
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.style.display = 'none';
  closeSuggestions();
  searchInput.focus();
});

document.addEventListener('click', e => {
  if (!document.getElementById('searchWrap').contains(e.target)) closeSuggestions();
});

function updateSuggestionFocus(items) {
  items.forEach((el, i) => el.classList.toggle('focused', i === focusedSuggestion));
}

function showSuggestionsLoading() {
  searchSugg.innerHTML = `<div class="search-loading"><div class="mini-spin"></div> Se caută…</div>`;
  searchSugg.classList.add('open');
}

function closeSuggestions() {
  searchSugg.classList.remove('open');
  searchSugg.innerHTML = '';
  focusedSuggestion = -1;
}

async function useGPSLocation() {
  const btn = document.getElementById('gpsBtn');
  if (!navigator.geolocation) {
    btn.style.color = '#f87171';
    btn.querySelector('.gps-label').textContent = 'Indisponibil';
    setTimeout(() => {
      btn.style.color = '';
      btn.querySelector('.gps-label').textContent = 'Locația mea';
    }, 2500);
    return;
  }

  btn.classList.add('loading');
  btn.querySelector('.gps-icon').textContent = '⟳';
  btn.querySelector('.gps-label').textContent = 'Se caută…';

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      try {
        const r = await fetch(
          `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ro`
        );
        const geo = await r.json();
        const city = geo.city || geo.locality || geo.principalSubdivision || 'Locația mea';
        const country = geo.countryName || '';
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Europe/Bucharest';

        setState({ lat, lon, city, country, tz });

        searchInput.value = city + (country ? `, ${country}` : '');
        searchClear.style.display = 'block';
        closeSuggestions();

        btn.classList.remove('loading');
        btn.querySelector('.gps-icon').textContent = '✓';
        btn.querySelector('.gps-label').textContent = 'Găsit!';
        btn.style.color = 'var(--teal)';
        setTimeout(() => {
          btn.querySelector('.gps-icon').textContent = '📍';
          btn.querySelector('.gps-label').textContent = 'Locația mea';
          btn.style.color = '';
        }, 1800);

        loadWeather();
      } catch(e) {
        // Fallback: use coordinates directly without city name
        const fallbackCity = `${lat.toFixed(2)}°N, ${lon.toFixed(2)}°E`;
        setState({
          lat, lon,
          city: fallbackCity,
          country: '',
          tz: Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC'
        });
        searchInput.value = state.city;
        searchClear.style.display = 'block';
        btn.classList.remove('loading');
        btn.querySelector('.gps-icon').textContent = '📍';
        btn.querySelector('.gps-label').textContent = 'Locația mea';
        loadWeather();
      }
    },
    (err) => {
      btn.classList.remove('loading');
      btn.querySelector('.gps-icon').textContent = '⚠️';
      btn.querySelector('.gps-label').textContent =
        err.code === 1 ? 'Acces refuzat' :
        err.code === 2 ? 'Indisponibil' : 'Eroare GPS';
      btn.style.color = '#f87171';
      btn.style.borderColor = 'rgba(248,113,113,0.4)';
      setTimeout(() => {
        btn.querySelector('.gps-icon').textContent = '📍';
        btn.querySelector('.gps-label').textContent = 'Locația mea';
        btn.style.color = '';
        btn.style.borderColor = '';
      }, 3000);
    },
    { timeout: 10000, enableHighAccuracy: true }
  );
}

async function geocode(query) {
  if (geocodeCache.has(query)) {
    renderSuggestions(geocodeCache.get(query));
    return;
  }
  try {
    const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=6&language=ro&format=json`);
    const data = await r.json();
    const results = data.results || [];
    geocodeCache.set(query, results);
    renderSuggestions(results);
  } catch(e) {
    searchSugg.innerHTML = `<div class="search-no-results">Serviciul de geocodare nu este disponibil.</div>`;
  }
}

function renderSuggestions(results) {
  if (!results.length) {
    searchSugg.innerHTML = `<div class="search-no-results">Nicio locație găsită.</div>`;
    searchSugg.classList.add('open');
    return;
  }
  focusedSuggestion = -1;
  searchSugg.innerHTML = results.map((r, i) => {
    const region = [r.admin1, r.country].filter(Boolean).join(', ');
    const pop = r.population ? `${r.population >= 1000000 ? (r.population/1000000).toFixed(1)+'M' : Math.round(r.population/1000)+'k'}` : '';
    return `<div class="suggestion-item" data-idx="${i}"
      data-lat="${r.latitude}" data-lon="${r.longitude}"
      data-city="${r.name}" data-country="${r.country||''}"
      data-tz="${r.timezone||'UTC'}">
      <div class="suggestion-pin-wrap"><span class="suggestion-pin">📍</span></div>
      <div class="suggestion-text">
        <div class="suggestion-name">${esc(r.name)}</div>
        ${region ? `<div class="suggestion-region">${esc(region)}</div>` : ''}
      </div>
      ${pop ? `<span class="suggestion-meta">${pop}</span>` : ''}
    </div>`;
  }).join('');
  searchSugg.classList.add('open');

  searchSugg.querySelectorAll('.suggestion-item').forEach(el => {
    el.addEventListener('click', () => {
      setState({
        lat: parseFloat(el.dataset.lat),
        lon: parseFloat(el.dataset.lon),
        city: el.dataset.city,
        country: el.dataset.country,
        tz: el.dataset.tz
      });
      searchInput.value = state.city + (state.country ? `, ${state.country}` : '');
      searchClear.style.display = 'block';
      closeSuggestions();
      loadWeather();
    });
  });
}

// ── Weather API ──
async function fetchWeather() {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${state.lat}&longitude=${state.lon}` +
    `&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weathercode,is_day,windspeed_10m,winddirection_10m,windgusts_10m,pressure_msl,uv_index` +
    `&hourly=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weathercode,windspeed_10m,winddirection_10m,windgusts_10m,uv_index,visibility,pressure_msl` +
    `&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,sunrise,sunset,precipitation_hours,windspeed_10m_max,uv_index_max` +
    `&timezone=${encodeURIComponent(state.tz)}&forecast_days=10&timeformat=iso8601`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('API error');
  const data = await r.json();
  data._fetchedAt = new Date().toISOString();
  return data;
}

function loadWeather() {
  setState({ selectedDay: 0 });
  document.getElementById('app').innerHTML = `
    <div class="loading"><div class="spinner"></div><div class="loading-text">Se încarcă datele meteo…</div></div>`;
  fetchWeather()
    .then(render)
    .catch(err => {
      document.getElementById('app').innerHTML =
        `<div class="error-msg">Nu s-au putut încărca datele meteo.<br><small>${err.message}</small></div>`;
    });
}

// ── Helpers ──
function formatTime(iso) {
  return new Date(iso).toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
}
function daylight(rise, set) {
  const diff = (new Date(set) - new Date(rise)) / 60000;
  const h = Math.floor(diff/60), m = Math.round(diff%60);
  return `${h}h ${m}m lumină naturală`;
}

function windDirLabel(deg) {
  if (deg == null) return '—';
  const dirs = ['N','NE','E','SE','S','SV','V','NV'];
  return dirs[Math.round(deg / 45) % 8];
}

function shortDay(iso) {
  return new Date(iso).toLocaleDateString('ro-RO', {weekday:'short'});
}
function shortDate(iso) {
  return new Date(iso).toLocaleDateString('ro-RO', {day:'numeric', month:'short'});
}

function drawSunArc(riseIso, setIso) {
  const rise = new Date(riseIso), set = new Date(setIso), now = new Date();
  let prog = Math.max(0, Math.min(1, (now - rise) / (set - rise)));
  const W = 260, H = 110, cx = W/2, cy = H+10, R = 110;
  const a = Math.PI + prog * Math.PI;
  const sunX = cx + R * Math.cos(a), sunY = cy + R * Math.sin(a);
  const arcPath = `M ${cx-R} ${cy} A ${R} ${R} 0 0 1 ${cx+R} ${cy}`;
  return `
    <svg class="arc-svg" width="${W}" height="${H+8}" viewBox="0 0 ${W} ${H+8}">
      <defs>
        <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#f5c842" stop-opacity="0.2"/>
          <stop offset="50%" stop-color="#f5c842" stop-opacity="0.8"/>
          <stop offset="100%" stop-color="#f87c3a" stop-opacity="0.2"/>
        </linearGradient>
        <filter id="sunGlow">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <path d="${arcPath}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
      <path d="${arcPath}" fill="none" stroke="url(#arcGrad)" stroke-width="2" stroke-linecap="round"
        stroke-dasharray="${Math.PI*R}" stroke-dashoffset="${Math.PI*R*(1-prog)}"/>
      ${prog>0&&prog<1 ? `
        <circle cx="${sunX}" cy="${sunY}" r="8" fill="#f5c842" filter="url(#sunGlow)" opacity="0.9"/>
        <circle cx="${sunX}" cy="${sunY}" r="4" fill="#fff8e0"/>
      ` : ''}
      <line x1="${cx-R-8}" y1="${cy}" x2="${cx+R+8}" y2="${cy}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </svg>`;
}

function getHourlyForDay(data, dayIndex) {
  const dateStr = data.daily.time[dayIndex];
  return data.hourly.time
    .map((t, i) => ({ t, i }))
    .filter(({t}) => t.startsWith(dateStr))
    .map(({i, t}) => ({
      t,
      hour: data.hourly.time[i].slice(11,16),
      temp: Math.round(data.hourly.temperature_2m[i]),
      prec: +(data.hourly.precipitation[i]).toFixed(1),
      wind: +(data.hourly.windspeed_10m[i]||0).toFixed(1),
      wdir: data.hourly.winddirection_10m[i]||0,
      humidity: data.hourly.relative_humidity_2m ? data.hourly.relative_humidity_2m[i] : null,
      uv: data.hourly.uv_index ? data.hourly.uv_index[i] : null,
      pressure: null,
      visibility: data.hourly.visibility ? Math.round(data.hourly.visibility[i]/1000) : null,
      gust: data.hourly.windgusts_10m ? data.hourly.windgusts_10m[i] : null,
      code: data.hourly.weathercode[i],
      feel: Math.round(data.hourly.apparent_temperature[i]),
      isDay: getHourIsDay(data, data.hourly.time[i]),
      isNow: false
    }));
}

function getHourlyFromNow(data, count = 24) {
  const { now, currentHourStr } = nowLocalISO();

  let startIdx = data.hourly.time.findIndex(t => t.startsWith(currentHourStr));
  if (startIdx === -1) {
    startIdx = data.hourly.time.findIndex(t => new Date(t) >= now);
  }
  if (startIdx === -1) startIdx = 0;

  const result = [];
  for (let i = startIdx; i < startIdx + count && i < data.hourly.time.length; i++) {
    const prevDate = i > startIdx ? data.hourly.time[i-1].slice(0,10) : null;
    const thisDate = data.hourly.time[i].slice(0,10);
    result.push({
      t: data.hourly.time[i],
      hour: data.hourly.time[i].slice(11,16),
      temp: Math.round(data.hourly.temperature_2m[i]),
      prec: +(data.hourly.precipitation[i]).toFixed(1),
      wind: +(data.hourly.windspeed_10m[i]||0).toFixed(1),
      wdir: data.hourly.winddirection_10m[i]||0,
      humidity: data.hourly.relative_humidity_2m ? data.hourly.relative_humidity_2m[i] : null,
      uv: data.hourly.uv_index ? data.hourly.uv_index[i] : null,
      pressure: null,
      visibility: data.hourly.visibility ? Math.round(data.hourly.visibility[i]/1000) : null,
      gust: data.hourly.windgusts_10m ? data.hourly.windgusts_10m[i] : null,
      code: data.hourly.weathercode[i],
      feel: Math.round(data.hourly.apparent_temperature[i]),
      isDay: getHourIsDay(data, data.hourly.time[i]),
      isNow: i === startIdx,
      newDay: prevDate && thisDate !== prevDate ? thisDate : null
    });
  }
  return result;
}

  windChart = new Chart(ctx, {

        {
          label: 'Viteză vânt',
          data: vals,
          borderColor: '#38d9c4',

          backgroundColor: 'rgba(10,12,30,0.92)',

function buildPrecipTotalCard(data) {
  const sums = getRemainingPrecipPerDay(data);
  const total = +sums.reduce((a,b)=>a+b,0).toFixed(1);
  const rainyDays = sums.filter(v => v >= 0.1).length;
  const pct = Math.min(100, Math.round(total / 100 * 100));
  const threshold = PRECIP_THRESHOLDS.find(t => total <= t.max);
  const context = threshold.label;
  const emoji = threshold.emoji;

  return `
    <div class="precip-total-card">
      <div class="precip-total-icon">${emoji}</div>
      <div class="precip-total-info">
        <div class="precip-total-label">Precipitații rămase · 10 zile</div>
        <div class="precip-total-value">${total}<span>mm</span></div>
        <div class="precip-total-sub">${context}</div>
      </div>
      <div class="precip-total-breakdown">
        <div class="precip-rainy-days">
          <strong>${rainyDays}</strong> zi${rainyDays !== 1 ? 'le' : ''} ${rainyDays !== 1 ? 'ploioase' : 'ploioasă'}
        </div>
        <div class="precip-bar-wrap">
          <div class="precip-bar-fill" id="precipBarFill" style="width:0%"></div>
        </div>
        <div class="precip-bar-label">${pct}% dintr-o perioadă ploioasă intensă (100mm)</div>
      </div>
    </div>`;
}

function buildWeekSummaryCard(data) {
  const d = data.daily;
  const n = d.time.length;
  const dayLabel = (i) => i === 0 ? 'azi' : shortDay(d.time[i]);

  let hotIdx = 0, coldIdx = 0, rainIdx = 0, chanceIdx = 0;
  for (let i = 1; i < n; i++) {
    if (d.temperature_2m_max[i] > d.temperature_2m_max[hotIdx]) hotIdx = i;
    if (d.temperature_2m_min[i] < d.temperature_2m_min[coldIdx]) coldIdx = i;
    if ((d.precipitation_sum[i] || 0) > (d.precipitation_sum[rainIdx] || 0)) rainIdx = i;
    if ((d.precipitation_probability_max?.[i] || 0) > (d.precipitation_probability_max?.[chanceIdx] || 0)) chanceIdx = i;
  }

  const rainMax = +(d.precipitation_sum[rainIdx] || 0).toFixed(1);
  const chanceMax = d.precipitation_probability_max ? Math.round(d.precipitation_probability_max[chanceIdx] || 0) : null;

  const items = [
    { icon: '☀️', label: 'Cel mai cald', value: `${Math.round(d.temperature_2m_max[hotIdx])}°C`, cls: 'hot', day: dayLabel(hotIdx) },
    { icon: '❄️', label: 'Cel mai frig', value: `${Math.round(d.temperature_2m_min[coldIdx])}°C`, cls: 'cold', day: dayLabel(coldIdx) },
    { icon: '🌧️', label: 'Cea mai ploioasă', value: `${rainMax} mm`, cls: 'rain', day: dayLabel(rainIdx) },
  ];
  if (chanceMax !== null) {
    items.push({ icon: '💧', label: 'Max. șanse ploaie', value: `${chanceMax}%`, cls: 'chance', day: dayLabel(chanceIdx) });
  }

  return `
    <div class="week-summary-card">
      <div class="week-summary-title">Rezumat săptămână</div>
      <div class="week-summary-grid">
        ${items.map(it => `
          <div class="week-summary-item">
            <div class="week-summary-label"><span class="wsi-icon">${it.icon}</span>${it.label}</div>
            <div class="week-summary-value ${it.cls}">${it.value}</div>
            <div class="week-summary-day">${it.day}</div>
          </div>`).join('')}
      </div>
    </div>`;
}

function onRadarLoad() {
  const loader = document.getElementById('windyLoader');

}

function updateVentuskyMap() {
  const frame = document.getElementById('ventuskyFrame');
  if (!frame) return;
  const newSrc = `https://embed.ventusky.com/?p=${state.lat};${state.lon};7&l=radar`;
  if (frame.src !== newSrc) {
    // Arătăm loader-ul din nou cât se reîncarcă harta

    let loader = document.getElementById('windyLoader');
    if (!loader) {
      loader = document.createElement('div');
      loader.id = 'windyLoader';
      loader.className = 'windy-loader';
      loader.innerHTML = `<div class="spinner" style="border-top-color:var(--teal)"></div><div class="windy-loader-text">Se actualizează harta…</div>`;
      wrap.insertBefore(loader, frame);
    } else {
      loader.classList.remove('hidden');
      loader.querySelector('.windy-loader-text').textContent = 'Se actualizează harta…';
    }
    frame.onload = onRadarLoad;
    frame.src = newSrc;
  }
}

// ── Charts ──
function destroyChart(ref) { if (ref) { try { ref.destroy(); } catch(e){} } }

function getRemainingPrecipPerDay(data) {
  const { dateStr, currentHourStr } = nowLocalISO();

  return data.daily.time.map((d, i) => {
    if (i === 0) {
      let remaining = 0;
      for (let j = 0; j < data.hourly.time.length; j++) {
        const t = data.hourly.time[j];
        if (t.startsWith(dateStr) && t >= currentHourStr) {
          remaining += data.hourly.precipitation[j] || 0;
        }
      }
      return +remaining.toFixed(1);
    }
    return +(data.daily.precipitation_sum[i]||0).toFixed(1);
  });
}

    if (cw.relative_humidity_2m !== undefined) cw.humidity = cw.relative_humidity_2m;
    if (cw.pressure_msl !== undefined) cw.pressure = cw.pressure_msl;

  const todayHours = getHourlyFromNow(data);

  const humidity = cw.humidity ?? (data.hourly.relative_humidity_2m ? data.hourly.relative_humidity_2m[0] : null);
  const pressure = cw.pressure ?? 1013;
  const uv = cw.uv ?? 0;
  // Vizibilitate reală din current sau din prima valoare orară (API returnează în metri → km)
