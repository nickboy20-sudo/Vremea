<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Vremea — Prognoză Meteo Profesională</title>
<style>
:root{
  --glass-bg: rgba(255,255,255,0.14);
  --glass-bg-strong: rgba(255,255,255,0.22);
  --glass-border: rgba(255,255,255,0.28);
  --text: #ffffff;
  --text-dim: rgba(255,255,255,0.72);
  --text-faint: rgba(255,255,255,0.5);
  --shadow: 0 8px 32px rgba(0,0,0,0.25);
  --accent: #ffd166;
  --radius: 20px;
  --blur: 18px;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  font-family: 'Segoe UI', system-ui, -apple-system, Roboto, sans-serif;
  color: var(--text);
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
  transition: background 1.8s ease;
  background:#2b3a5c;
}
#bg-scene{
  position:fixed; inset:0; z-index:-2; overflow:hidden;
  transition: background 2s ease;
}
#bg-scene::after{
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse at 50% 120%, rgba(0,0,0,0.25), transparent 60%);
  pointer-events:none;
}
.celestial{
  position:absolute; border-radius:50%; pointer-events:none;
  transition: top 3s ease, left 3s ease, opacity 2s ease;
}
.sun{
  width:120px; height:120px; top:8%; left:75%;
  background: radial-gradient(circle at 35% 35%, #fff7cc, #ffd166 60%, #ff9f43 100%);
  box-shadow: 0 0 90px 40px rgba(255,209,102,0.55), 0 0 200px 100px rgba(255,159,67,0.25);
  animation: sunPulse 6s ease-in-out infinite;
}
@keyframes sunPulse{ 0%,100%{filter:brightness(1);} 50%{filter:brightness(1.08);} }
.moon{
  width:90px; height:90px; top:10%; left:78%;
  background: radial-gradient(circle at 35% 35%, #fefefe, #cfd8e3 65%, #9aa7b8 100%);
  box-shadow: 0 0 60px 20px rgba(255,255,255,0.28);
}
.moon .crater{position:absolute; border-radius:50%; background:rgba(120,130,145,0.35);}
#stars{position:absolute; inset:0; opacity:0; transition:opacity 2s ease;}
.star{position:absolute; background:#fff; border-radius:50%; animation: twinkle 3s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:0.2;} 50%{opacity:1;}}
#clouds-layer{position:absolute; inset:0; overflow:hidden;}
.cloud{
  position:absolute; background:rgba(255,255,255,0.55); border-radius:50%;
  filter: blur(2px); opacity:0.8;
}
.cloud::before, .cloud::after{content:''; position:absolute; background:inherit; border-radius:50%;}
#rays{position:absolute; inset:0; opacity:0; transition:opacity 2s ease; mix-blend-mode:overlay;}
#precip-layer{position:absolute; inset:0; overflow:hidden;}
.drop{position:absolute; width:2px; background:linear-gradient(to bottom, rgba(255,255,255,0), rgba(210,230,255,0.8)); border-radius:2px;}
.flake{position:absolute; background:#fff; border-radius:50%; opacity:0.9;}
#fog-layer{position:absolute; inset:0; opacity:0; transition:opacity 2s ease;}
.fog-band{position:absolute; width:200%; height:120px; background:linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent); filter:blur(6px);}
#lightning{position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none;}
#golden-overlay{position:absolute; inset:0; opacity:0; transition:opacity 3s ease; background:linear-gradient(180deg, rgba(255,150,90,0.35), rgba(255,90,60,0.12) 40%, transparent 70%); pointer-events:none;}
.app{position:relative; z-index:1; max-width:960px; margin:0 auto; padding:20px 16px 60px;}
.topbar{display:flex; gap:10px; align-items:center; margin-bottom:18px; flex-wrap:wrap;}
.search-wrap{position:relative; flex:1; min-width:220px;}
#search{
  width:100%; padding:13px 44px 13px 18px; border-radius:16px; border:1px solid var(--glass-border);
  background:var(--glass-bg); backdrop-filter:blur(var(--blur)); -webkit-backdrop-filter:blur(var(--blur));
  color:var(--text); font-size:15px; outline:none;
}
#search::placeholder{color:var(--text-faint);}
.icon-btn{
  width:46px; height:46px; border-radius:16px; border:1px solid var(--glass-border);
  background:var(--glass-bg); backdrop-filter:blur(var(--blur)); -webkit-backdrop-filter:blur(var(--blur));
  color:var(--text); font-size:19px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition: transform .15s ease, background .2s ease; flex-shrink:0;
}
.icon-btn:hover{background:var(--glass-bg-strong); transform:translateY(-2px);}
.icon-btn:active{transform:translateY(0);}
#suggestions{
  position:absolute; top:calc(100% + 6px); left:0; right:0; z-index:10;
  background:rgba(30,32,44,0.85); backdrop-filter:blur(20px); border-radius:14px; overflow:hidden;
  border:1px solid var(--glass-border); box-shadow:var(--shadow); display:none;
}
#suggestions div{padding:11px 16px; cursor:pointer; font-size:14px; border-bottom:1px solid rgba(255,255,255,0.06);}
#suggestions div:last-child{border-bottom:none;}
#suggestions div:hover{background:rgba(255,255,255,0.1);}
.card{
  background:var(--glass-bg); backdrop-filter:blur(var(--blur)); -webkit-backdrop-filter:blur(var(--blur));
  border:1px solid var(--glass-border); border-radius:var(--radius); box-shadow:var(--shadow);
}
.hero{padding:28px 24px; margin-bottom:16px; text-align:center; position:relative; overflow:hidden;}
.hero .place{font-size:20px; font-weight:600; letter-spacing:.3px;}
.hero .subplace{font-size:13px; color:var(--text-dim); margin-top:2px;}
.hero .temp-row{display:flex; align-items:center; justify-content:center; gap:18px; margin:14px 0 6px;}
.hero .temp{font-size:76px; font-weight:200; line-height:1;}
.hero .emoji{font-size:64px; filter:drop-shadow(0 6px 14px rgba(0,0,0,0.25));}
.hero .desc{font-size:17px; color:var(--text-dim); text-transform:capitalize;}
.hero .feels{font-size:13px; color:var(--text-faint); margin-top:2px;}
.hero .minmax{font-size:14px; color:var(--text-dim); margin-top:10px;}
.metrics{display:grid; grid-template-columns:repeat(auto-fit, minmax(100px,1fr)); gap:10px; margin-top:18px;}
.metric{padding:12px 8px; border-radius:14px; background:rgba(255,255,255,0.08); text-align:center;}
.metric .m-icon{font-size:20px;}
.metric .m-val{font-size:16px; font-weight:600; margin-top:4px;}
.metric .m-lbl{font-size:11px; color:var(--text-dim); margin-top:2px;}
.advice{
  padding:14px 18px; margin-bottom:16px; display:flex; gap:12px; align-items:center; font-size:14px;
}
.advice .a-icon{font-size:24px; flex-shrink:0;}
.section-title{font-size:15px; font-weight:600; margin:22px 4px 10px; opacity:.9; display:flex; align-items:center; gap:8px;}
.hourly-scroll{display:flex; gap:10px; overflow-x:auto; padding:16px 12px; scrollbar-width:thin;}
.hourly-scroll::-webkit-scrollbar{height:6px;}
.hourly-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.25); border-radius:10px;}
.hour-item{flex:0 0 auto; width:78px; text-align:center; padding:10px 6px; border-radius:14px; background:rgba(255,255,255,0.07); position:relative; transition:background .2s, border .2s;}
.hour-item.now{background:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.3);}
.hour-item.has-rain{background:rgba(142,205,255,0.18); border:1px solid rgba(142,205,255,0.32);}
.hour-item .h-time{font-size:12px; color:var(--text-dim);}
.hour-item .h-icon{font-size:24px; margin:6px 0;}
.hour-item .h-temp{font-size:14px; font-weight:600;}
.hour-item .h-precip{font-size:10.5px; color:#8ecdff; margin-top:3px; line-height:1.25; min-height:26px; display:flex; flex-direction:column; align-items:center; gap:1px;}
.hour-item .h-mm{font-size:11px; font-weight:700; color:#a8d8ff; background:rgba(142,205,255,0.18); padding:1px 5px; border-radius:8px; margin-top:1px;}
.hour-item .h-pop{font-size:10px; opacity:.9;}
.rain-chart-card{height:260px; margin-top:12px;}
.rain-chart-card .chart-wrap{height:200px;}
.wind-chart-card{height:300px; margin-top:12px;}
.wind-chart-card .chart-wrap{height:240px;}
@media (max-width:520px){
  .rain-chart-card{height:230px;}
  .wind-chart-card{height:270px;}
}
/* ── Radar Ventusky din index.html — embed.ventusky.com ── */
.windy-section{margin-top:18px; margin-bottom:12px;}
.windy-card{
  background: var(--glass-bg);
  border:1px solid var(--glass-border);
  backdrop-filter: blur(18px) saturate(1.3);
  -webkit-backdrop-filter: blur(18px) saturate(1.3);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow:hidden;
  position:relative;
}
.windy-card-header{
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px;
  border-bottom:1px solid rgba(255,255,255,0.12);
  background: rgba(0,0,0,0.12);
}
.windy-card-title{
  font-size:12px; letter-spacing:1.6px; text-transform:uppercase; color:var(--text-dim);
  display:flex; align-items:center; gap:8px; font-weight:600;
}
.windy-dot{
  width:7px; height:7px; border-radius:50%;
  background:#38d9c4;
  box-shadow:0 0 8px #38d9c4;
  animation:pulse-dot 2s ease infinite;
}
@keyframes pulse-dot{
  0%,100%{opacity:1; transform:scale(1);}
  50%{opacity:0.55; transform:scale(0.82);}
}
.windy-frame-wrap{
  position:relative;
  width:100%; height:500px;
  background:#0a0e1e;
}
.windy-frame-wrap iframe{
  width:100%; height:100%;
  border:none; display:block;
}
.windy-loader{
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background: rgba(10,14,30,0.92);
  gap:14px;
  transition:opacity 0.4s;
  z-index:2;
}
.windy-loader.hidden{opacity:0; pointer-events:none;}
.windy-loader .spinner{width:32px; height:32px; border:2px solid rgba(255,255,255,0.15); border-top-color:#38d9c4; border-radius:50%; animation:spin 0.8s linear infinite;}
.windy-loader-text{font-size:13px; color:var(--text-dim); letter-spacing:0.5px;}
.radar-actions{padding:10px 14px; display:flex; justify-content:space-between; align-items:center; font-size:12px; gap:8px; background:rgba(0,0,0,0.18); flex-wrap:wrap;}
.radar-actions a{color:#8ecdff; text-decoration:none; padding:6px 12px; border-radius:10px; background:rgba(142,205,255,0.12); border:1px solid rgba(142,205,255,0.2); transition:background .2s;}
.radar-actions a:hover{background:rgba(142,205,255,0.22);}
@media (max-width:520px){
  .windy-frame-wrap{height:380px;}
  .windy-card-header{padding:12px 14px;}
}
.daily-list{display:flex; flex-direction:column; gap:8px; padding:6px 10px 16px;}
.day-item{display:grid; grid-template-columns: 84px 30px 1fr 104px 46px; align-items:center; gap:20px; padding:12px 14px; border-radius:14px; background:rgba(255,255,255,0.07); font-size:14px;}
.day-item.today{background:rgba(255,255,255,0.16);}
.day-item .d-name{font-weight:600;}
.day-item .d-icon{font-size:22px; text-align:center;}
.day-item .d-bar-wrap{display:flex; align-items:center; gap:10px; flex:1; min-width:0;}
.day-item .d-min{color:var(--text-dim); width:32px; text-align:right; font-size:12.5px; flex-shrink:0;}
.day-item .d-bar{flex:1; height:4px; min-width:70px; border-radius:10px; background:rgba(255,255,255,0.16); position:relative; overflow:hidden;}
.day-item .d-bar-fill{position:absolute; height:100%; border-radius:10px; background:linear-gradient(90deg,#8ecdff,#ffd166,#ff8a5c); min-width:10px;}
.day-item .d-max{width:38px; font-size:12.5px; font-weight:600; flex-shrink:0; margin-right:8px;}
.day-item .d-rain{font-size:12px; color:#8ecdff; text-align:left; padding-left:24px; white-space:nowrap; min-width:88px; font-weight:500;}
.day-item .d-pop{font-size:11px; color:var(--text-faint); text-align:right; white-space:nowrap;}
.summary-grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr)); gap:12px; margin-top:16px;}
.summary-card{padding:16px; text-align:center;}
.summary-card .s-icon{font-size:26px;}
.summary-card .s-val{font-size:22px; font-weight:700; margin-top:6px;}
.summary-card .s-lbl{font-size:12px; color:var(--text-dim); margin-top:2px;}
.week-summary-card{padding:18px 20px; margin-top:16px;}
.week-summary-head{
  font-size:12px; font-weight:700; letter-spacing:1.6px; color:var(--text-dim);
  display:flex; align-items:center; gap:10px; margin-bottom:16px; text-transform:uppercase;
}
.week-summary-head::after{content:''; flex:1; height:1px; background:rgba(255,255,255,0.14);}
.ws-grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(120px,1fr)); gap:12px;}
.ws-item{background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:14px 14px;}
.ws-item .ws-lbl{font-size:10.5px; font-weight:700; letter-spacing:.8px; color:var(--text-dim); text-transform:uppercase; display:flex; align-items:center; gap:6px;}
.ws-item .ws-val{font-size:22px; font-weight:700; margin-top:10px; font-variant-numeric:tabular-nums;}
.ws-item .ws-day{font-size:11.5px; color:var(--text-faint); margin-top:4px; text-transform:capitalize;}
.ws-hot .ws-val{color:#ffb648;}
.ws-cold .ws-val{color:#7fc3ff;}
.ws-rain .ws-val{color:#8ecdff;}
.ws-pop .ws-val{color:#5fe0c0;}
#dailyChart{cursor:pointer;}
.day-tooltip{
  position:absolute; pointer-events:none; background:rgba(20,24,38,0.96); color:#fff;
  border:1px solid rgba(255,255,255,0.15); border-radius:10px; padding:8px 12px; font-size:12px;
  line-height:1.4; transform:translate(-50%,-110%); opacity:0; transition:opacity .12s; z-index:3;
  white-space:nowrap; box-shadow:0 8px 20px rgba(0,0,0,0.35);
}
.day-tooltip.show{opacity:1;}
.chart-card{
  padding:18px 16px 16px;
  margin-top:16px;
  height:380px;
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}
.chart-card .chart-head{
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:12px; font-size:13px; color:var(--text-dim);
}
.chart-card .chart-wrap{
  flex:1;
  position:relative;
  min-height:0;
}
.chart-card canvas{
  width:100% !important;
  height:100% !important;
  display:block;
}
footer{text-align:center; margin-top:26px; font-size:12px; color:var(--text-faint);}
.loading, .error-msg{text-align:center; padding:40px 20px; font-size:15px; color:var(--text-dim); line-height:1.5;}
.error-msg button{margin-top:14px; padding:10px 18px; border-radius:12px; border:1px solid var(--glass-border); background:var(--glass-bg-strong); color:white; cursor:pointer;}
.spinner{width:34px; height:34px; border-radius:50%; border:3px solid rgba(255,255,255,0.25); border-top-color:#fff; margin:0 auto 14px; animation:spin 0.9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@media (max-width:520px){
  .hero .temp{font-size:58px;}
  .hero .emoji{font-size:48px;}
  .day-item{grid-template-columns: 48px 24px 1fr 88px 36px; font-size:12.5px; gap:16px; padding:10px 8px 10px 10px;}
  .day-item .d-bar, .day-item .d-bar-fill{display:none !important;}
  .day-item .d-bar-wrap{gap:6px;}
  .day-item .d-max{width:32px; margin-right:6px;}
  .day-item .d-rain{padding-left:22px; min-width:74px; font-size:11.5px; text-align:left; font-weight:500;}
  .day-item .d-pop{font-size:10.5px;}
  .sun,.moon{width:80px; height:80px;}
  .chart-card{height:340px;}
}
</style>
</head>
<body>

<div id="bg-scene">
  <div id="stars"></div>
  <div class="celestial sun" id="sunEl" style="display:none;"></div>
  <div class="celestial moon" id="moonEl" style="display:none;"></div>
  <div id="rays"></div>
  <div id="clouds-layer"></div>
  <div id="fog-layer"></div>
  <div id="precip-layer"></div>
  <div id="golden-overlay"></div>
  <div id="lightning"></div>
</div>

<div class="app">
  <div class="topbar">
    <div class="search-wrap">
      <input id="search" type="text" placeholder="Caută un oraș..." autocomplete="off">
      <div id="suggestions"></div>
    </div>
    <button class="icon-btn" id="gpsBtn" title="Locația mea">📍</button>
    <button class="icon-btn" id="refreshBtn" title="Reîmprospătează">🔄</button>
  </div>

  <div id="content">
    <div class="loading"><div class="spinner"></div>Se încarcă datele meteo...</div>
  </div>

  <footer>Date furnizate de Open-Meteo · Funcționează și local (file://)</footer>
</div>

<script>
'use strict';

/* ---------- Safe storage (FIX pentru file://) ---------- */
function safeGet(key){
  try{ return localStorage.getItem(key); }catch(e){ console.warn('localStorage blocked', e); return null; }
}
function safeSet(key,val){
  try{ localStorage.setItem(key,val); }catch(e){ console.warn('localStorage blocked', e); }
}
function safeFetch(url, opts={}){
  const controller = new AbortController();
  const timeout = setTimeout(()=> controller.abort(), opts.timeout || 12000);
  return fetch(url, { ...opts, signal: controller.signal, mode:'cors' })
    .finally(()=> clearTimeout(timeout));
}

/* ---------- Helpers ---------- */
function escapeHTML(str){
  const div = document.createElement('div');
  div.textContent = str == null ? '' : String(str);
  return div.innerHTML;
}
const RO_DAYS = ['Duminică','Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă'];
const RO_DAYS_SHORT = ['Dum','Lun','Mar','Mie','Joi','Vin','Sâm'];
const RO_DAYS_ABBR_LC = ['dum.','lun.','mar.','mie.','joi','vin.','sâm.'];
const RO_MONTHS = ['ian','feb','mar','apr','mai','iun','iul','aug','sep','oct','nov','dec'];

const WMO = {
  0:{d:'Cer senin', e:'☀️', grp:'clear'},
  1:{d:'Predominant senin', e:'🌤️', grp:'partly'},
  2:{d:'Parțial noros', e:'⛅', grp:'partly'},
  3:{d:'Noros', e:'☁️', grp:'cloudy'},
  45:{d:'Ceață', e:'🌫️', grp:'fog'},
  48:{d:'Ceață cu chiciură', e:'🌫️', grp:'fog'},
  51:{d:'Burniță ușoară', e:'🌦️', grp:'rain'},
  53:{d:'Burniță moderată', e:'🌦️', grp:'rain'},
  55:{d:'Burniță densă', e:'🌧️', grp:'rain'},
  56:{d:'Burniță înghețată', e:'🌧️', grp:'rain'},
  57:{d:'Burniță înghețată densă', e:'🌧️', grp:'rain'},
  61:{d:'Ploaie ușoară', e:'🌦️', grp:'rain'},
  63:{d:'Ploaie moderată', e:'🌧️', grp:'rain'},
  65:{d:'Ploaie puternică', e:'🌧️', grp:'rain'},
  66:{d:'Ploaie înghețată', e:'🌧️', grp:'rain'},
  67:{d:'Ploaie înghețată puternică', e:'🌧️', grp:'rain'},
  71:{d:'Ninsoare ușoară', e:'🌨️', grp:'snow'},
  73:{d:'Ninsoare moderată', e:'❄️', grp:'snow'},
  75:{d:'Ninsoare puternică', e:'❄️', grp:'snow'},
  77:{d:'Grăunțe de zăpadă', e:'🌨️', grp:'snow'},
  80:{d:'Averse ușoare', e:'🌦️', grp:'rain'},
  81:{d:'Averse moderate', e:'🌧️', grp:'rain'},
  82:{d:'Averse puternice', e:'⛈️', grp:'rain'},
  85:{d:'Averse de zăpadă', e:'🌨️', grp:'snow'},
  86:{d:'Averse puternice de zăpadă', e:'❄️', grp:'snow'},
  95:{d:'Furtună', e:'⛈️', grp:'storm'},
  96:{d:'Furtună cu grindină', e:'⛈️', grp:'storm'},
  99:{d:'Furtună puternică cu grindină', e:'⛈️', grp:'storm'}
};
function wmoInfo(code){ return WMO[code] || {d:'Necunoscut', e:'❓', grp:'cloudy'}; }

/* ---------- Performance scaling ---------- */
const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || window.innerWidth < 640;
const PERF = {
  clouds: isMobile ? 3 : 6,
  drops: isMobile ? 40 : 90,
  flakes: isMobile ? 30 : 60,
  stars: isMobile ? 45 : 90,
  blur: isMobile ? '10px' : '18px'
};
document.documentElement.style.setProperty('--blur', PERF.blur);

/* ---------- Backgrounds ---------- */
const BG_THEMES = {
  'clear-day':    'linear-gradient(160deg,#3a8bd8 0%,#63b3ed 45%,#a8dcf0 100%)',
  'clear-night':  'linear-gradient(160deg,#020617 0%,#0f1c3f 55%,#1e2a52 100%)',
  'partly-day':   'linear-gradient(160deg,#4f93d1 0%,#7fb8e0 50%,#c3d9e6 100%)',
  'partly-night': 'linear-gradient(160deg,#0b1226 0%,#1b2946 55%,#2b3a5c 100%)',
  'cloudy-day':   'linear-gradient(160deg,#6b7c8f 0%,#8fa0ae 50%,#b8c4cc 100%)',

let precipInterval = null, lightningInterval = null;
const bgScene = document.getElementById('bg-scene');

function buildStars(){
  const el = document.getElementById('stars');
  el.innerHTML = '';
  for(let i=0;i<PERF.stars;i++){
    const s = document.createElement('div');
    s.className='star';
    const size = Math.random()*2+1;
    s.style.width = size+'px'; s.style.height = size+'px';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*70+'%';
    s.style.animationDelay = (Math.random()*3)+'s';
    el.appendChild(s);
  }
}
function buildClouds(density){
  const el = document.getElementById('clouds-layer');
  el.innerHTML = '';
  const count = Math.max(1, Math.round(PERF.clouds * density));
  for(let i=0;i<count;i++){
    const c = document.createElement('div');
    c.className='cloud';
    const w = 90 + Math.random()*140;
    const h = w*0.4;
    c.style.width = w+'px'; c.style.height = h+'px';
    c.style.top = (5 + Math.random()*45)+'%';
    c.style.left = (Math.random()*100)+'%';
    c.style.opacity = 0.4 + Math.random()*0.4;
    const dur = 40 + Math.random()*60;
    c.style.animation = `driftCloud ${dur}s linear infinite`;
    c.style.animationDelay = (-Math.random()*dur)+'s';
    el.appendChild(c);
  }
  if(!document.getElementById('cloud-kf')){
    const style = document.createElement('style');
    style.id='cloud-kf';
    style.textContent = `@keyframes driftCloud{ from{transform:translateX(-40vw);} to{transform:translateX(140vw);} }`;
    document.head.appendChild(style);
  }
}
function clearPrecip(){
  document.getElementById('precip-layer').innerHTML='';
  if(precipInterval){ clearInterval(precipInterval); precipInterval=null; }
}
function buildRain(){
  clearPrecip();
  const el = document.getElementById('precip-layer');
  for(let i=0;i<PERF.drops;i++){
    const d = document.createElement('div');
    d.className='drop';
    const len = 14+Math.random()*18;
    d.style.height = len+'px';
    d.style.left = Math.random()*100+'%';
    d.style.top = (-20 - Math.random()*100)+'%';
    const dur = 0.5 + Math.random()*0.5;
    d.style.animation = `fallDrop ${dur}s linear infinite`;
    d.style.animationDelay = (-Math.random()*dur)+'s';
    el.appendChild(d);
  }
  ensureKeyframe('fallDrop', `@keyframes fallDrop{ from{transform:translateY(0);} to{transform:translateY(130vh);} }`);
}
function buildSnow(){
  clearPrecip();
  const el = document.getElementById('precip-layer');
  for(let i=0;i<PERF.flakes;i++){
    const f = document.createElement('div');
    f.className='flake';
    const size = 2+Math.random()*4;
    f.style.width=size+'px'; f.style.height=size+'px';
    f.style.left = Math.random()*100+'%';
    f.style.top = (-20-Math.random()*100)+'%';
    const dur = 6+Math.random()*8;
    f.style.animation = `fallFlake ${dur}s linear infinite`;
    f.style.animationDelay = (-Math.random()*dur)+'s';
    el.appendChild(f);
  }
  ensureKeyframe('fallFlake', `@keyframes fallFlake{ 0%{transform:translateY(0) translateX(0);} 50%{transform:translateY(65vh) translateX(20px);} 100%{transform:translateY(130vh) translateX(-10px);} }`);
}
function ensureKeyframe(id, css){
  if(!document.getElementById('kf-'+id)){
    const style = document.createElement('style');
    style.id='kf-'+id;
    style.textContent = css;
    document.head.appendChild(style);
  }
}
function startLightning(){
  stopLightning();
  const flash = document.getElementById('lightning');
  lightningInterval = setInterval(()=>{
    if(Math.random() < 0.35){
      flash.style.transition='none';
      flash.style.opacity = 0.55;
      setTimeout(()=>{ flash.style.transition='opacity .4s ease'; flash.style.opacity=0; }, 90);
    }
  }, 3500);
}
function stopLightning(){
  if(lightningInterval){ clearInterval(lightningInterval); lightningInterval=null; }
  document.getElementById('lightning').style.opacity = 0;
}
function setFog(active){
  const el = document.getElementById('fog-layer');
  if(active && el.children.length===0){
    for(let i=0;i<4;i++){
      const b = document.createElement('div');
      b.className='fog-band';
      b.style.top = (15+i*22)+'%';
      b.style.left = '-50%';
      const dur = 25+i*8;
      b.style.animation = `driftFog ${dur}s linear infinite`;
      el.appendChild(b);
    }
    ensureKeyframe('driftFog', `@keyframes driftFog{ from{transform:translateX(0);} to{transform:translateX(30%);} }`);
  }
  el.style.opacity = active ? 1 : 0;
}
function applyBackground(grp, isDay, sunriseMs, sunsetMs, nowMs){
  const key = grp + (isDay ? '-day' : '-night');
  bgScene.style.background = BG_THEMES[key] || BG_THEMES['cloudy-day'];
  document.getElementById('sunEl').style.display = isDay ? 'block' : 'none';
  document.getElementById('moonEl').style.display = isDay ? 'none' : 'block';
  document.getElementById('stars').style.opacity = isDay ? 0 : (grp==='clear'||grp==='partly' ? 1 : 0.3);
  document.getElementById('rays').style.opacity = (isDay && (grp==='clear')) ? 0.5 : 0;
  if(isDay && (grp==='clear')) buildStars();
  const cloudDensity = grp==='clear' ? 0 : grp==='partly' ? 0.5 : 1;
  buildClouds(cloudDensity);
  if(grp==='rain'){ buildRain(); } else if(grp==='snow'){ buildSnow(); } else { clearPrecip(); }
  if(grp==='storm'){ buildRain(); startLightning(); } else { stopLightning(); }
  setFog(grp==='fog');
  const goldenEl = document.getElementById('golden-overlay');
  if(sunriseMs && sunsetMs && nowMs){
    const nearSunrise = Math.abs(nowMs - sunriseMs) < 45*60*1000;
    const nearSunset = Math.abs(nowMs - sunsetMs) < 45*60*1000;
    goldenEl.style.opacity = (nearSunrise || nearSunset) ? 1 : 0;
  } else {
    goldenEl.style.opacity = 0;
  }
}

const searchInput = document.getElementById('search');
const suggestionsEl = document.getElementById('suggestions');
let searchTimeout = null;
let currentLoc = null;

searchInput.addEventListener('input', ()=>{
  clearTimeout(searchTimeout);
  const q = searchInput.value.trim();
  if(q.length < 2){ suggestionsEl.style.display='none'; return; }
  searchTimeout = setTimeout(()=> doGeocodeSearch(q), 350);
});
document.addEventListener('click', (e)=>{
  if(!e.target.closest('.search-wrap')) suggestionsEl.style.display='none';
});

async function doGeocodeSearch(q){
  try{
    const res = await safeFetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=7&language=ro&format=json`, {timeout:8000});
    if(!res.ok) throw new Error('geocode fail');
    const data = await res.json();
    if(!data.results || !data.results.length){ suggestionsEl.style.display='none'; return; }
    suggestionsEl.innerHTML = data.results.map(r=>{
      const parts = [r.name, r.admin1, r.country].filter(Boolean);
      const label = parts.join(', ');
      // stocam JSON in atribut pentru a evita probleme cu escape
      const payload = encodeURIComponent(JSON.stringify({name:r.name, admin1:r.admin1||'', country:r.country||'', lat:r.latitude, lon:r.longitude}));
      return `<div data-payload="${payload}">${escapeHTML(label)}</div>`;
    }).join('');
    suggestionsEl.style.display='block';
    suggestionsEl.querySelectorAll('div').forEach(div=>{
      div.addEventListener('click', ()=>{
        try{
          const obj = JSON.parse(decodeURIComponent(div.dataset.payload));
          currentLoc = obj;
          searchInput.value='';
          suggestionsEl.style.display='none';
          safeSet('vremea_loc', JSON.stringify(currentLoc));
          loadWeather();
        }catch(e){ console.error(e); }
      });
    });
  }catch(e){ console.warn('geocode error', e); suggestionsEl.style.display='none'; }
}

document.getElementById('gpsBtn').addEventListener('click', ()=>{
  if(!navigator.geolocation){ alert('Geolocația nu este suportată.'); return; }
  const btn = document.getElementById('gpsBtn');
  btn.textContent='⏳';
  navigator.geolocation.getCurrentPosition(async (pos)=>{
    const lat = pos.coords.latitude, lon = pos.coords.longitude;
    let name='Locația mea', admin1='', country='';
    try{
      const res = await safeFetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=ro`, {timeout:8000});
      if(res.ok){
        const data = await res.json();
        const a = data.address || {};
        name = a.city || a.town || a.village || a.municipality || a.county || 'Locația mea';
        admin1 = a.county || a.state || '';
        country = a.country || '';
      }
    }catch(e){ console.warn('reverse geocode fail', e); }
    currentLoc = {name, admin1, country, lat, lon};
    safeSet('vremea_loc', JSON.stringify(currentLoc));
    btn.textContent='📍';
    loadWeather();
  }, (err)=>{ btn.textContent='📍'; alert('Nu s-a putut obține locația. Verifică permisiunile.'); console.warn(err); }, {timeout:10000});
});

const contentEl = document.getElementById('content');

async function loadWeather(){
  if(!currentLoc){
    contentEl.innerHTML = `<div class="error-msg">⚠️ Locație necunoscută.<br>Caută un oraș mai sus.</div>`;
    return;
  }
  contentEl.innerHTML = '<div class="loading"><div class="spinner"></div>Se încarcă datele meteo...</div>';
  try{
    const {lat, lon} = currentLoc;
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`+
      `&current=temperature_2m,relative_humidity_2m,apparent_temperature,is_day,precipitation,weather_code,wind_speed_10m,wind_direction_10m,surface_pressure,uv_index`+
      `&hourly=temperature_2m,precipitation_probability,precipitation,weather_code,wind_speed_10m`+
      `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,sunrise,sunset,wind_speed_10m_max,uv_index_max`+
      `&timezone=auto&forecast_days=10`;
    const res = await safeFetch(url, {timeout:15000});
    if(!res.ok) throw new Error('API error '+res.status);
    const data = await res.json();
    if(!data.current || !data.daily) throw new Error('Date incomplete');
    render(data);
  }catch(err){
    console.error('loadWeather error', err);
    const isAbort = err.name === 'AbortError';
    contentEl.innerHTML = `<div class="error-msg">
      ⚠️ Nu am putut încărca datele meteo.<br>
      ${isAbort ? 'Cererea a expirat (timeout).' : escapeHTML(err.message || 'Eroare de rețea.')}<br>
      <small style="opacity:.7">Dacă deschizi fișierul direct (file://), asigură-te că ai internet și încearcă din nou. Chrome poate bloca uneori cererile din file://.</small><br>
      <button onclick="loadWeather()">🔄 Încearcă din nou</button>
    </div>`;
  }
}

function fmtTime(iso){
  try{
    const d = new Date(iso);
    return d.toLocaleTimeString('ro-RO', {hour:'2-digit', minute:'2-digit'});
  }catch(e){ return '--:--'; }
}
function fmtDayShort(iso){
  const d = new Date(iso);
  return RO_DAYS_SHORT[d.getDay()];
}
function fmtDayAbbrLC(iso){
  const d = new Date(iso);
  return RO_DAYS_ABBR_LC[d.getDay()];
}
function fmtDayFull(iso, idx){
  const d = new Date(iso);
  if(idx===0) return 'Astăzi';
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(d); target.setHours(0,0,0,0);
  const diffDays = Math.round((target-today)/86400000);
  if(diffDays===1) return 'Mâine';
  return `${RO_DAYS[d.getDay()]}, ${d.getDate()} ${RO_MONTHS[d.getMonth()]}`;
}
function windDir(deg){
  const dirs=['N','NE','E','SE','S','SV','V','NV'];
  return dirs[Math.round(deg/45)%8];
}
function adviceFor(grp, temp, precipProb, uv, isDay){
  if(grp==='storm') return {icon:'⚡', txt:'Furtună în zonă — evită spațiile deschise și echipamentele electrice.'};
  if(grp==='rain') return {icon:'☂️', txt:'Ia umbrela cu tine — sunt șanse mari de ploaie astăzi.'};
  if(grp==='snow') return {icon:'🧣', txt:'Ninge — îmbracă-te gros și ai grijă la carosabilul alunecos.'};
  if(grp==='fog') return {icon:'🌫️', txt:'Vizibilitate redusă din cauza ceții — condu cu atenție sporită.'};
  if(temp>=30) return {icon:'🥵', txt:'Caniculă — hidratează-te bine și evită efortul în orele de vârf.'};
  if(temp<=0) return {icon:'🥶', txt:'Ger — îmbracă-te în straturi și ai grijă la gheață.'};
  if(uv>=7 && isDay) return {icon:'🧴', txt:'Index UV ridicat — folosește protecție solară dacă stai afară.'};
  if(grp==='clear' && temp>=18 && temp<=27) return {icon:'😎', txt:'Vreme perfectă pentru activități în aer liber!'};
  return {icon:'🙂', txt:'O zi obișnuită — nimic ieșit din comun la orizont.'};
}

function render(data){
  const cur = data.current;
  const hourly = data.hourly;
  const daily = data.daily;
  const info = wmoInfo(cur.weather_code);
  const isDay = cur.is_day === 1;
  const nowMs = Date.now();

  const sunriseToday = daily.sunrise && daily.sunrise[0] ? new Date(daily.sunrise[0]).getTime() : null;
  const sunsetToday = daily.sunset && daily.sunset[0] ? new Date(daily.sunset[0]).getTime() : null;
  applyBackground(info.grp, isDay, sunriseToday, sunsetToday, nowMs);

  const placeStr = [currentLoc.name].filter(Boolean).join('');
  const subStr = [currentLoc.admin1, currentLoc.country].filter(Boolean).join(', ');

  const totalRain = daily.precipitation_sum.reduce((a,b)=> a + (b||0), 0);
  const rainyDays = daily.precipitation_sum.filter(v=>v>0.1).length;
  const avgMax = (daily.temperature_2m_max.reduce((a,b)=>a+b,0) / daily.temperature_2m_max.length);
  const maxWind = Math.max(...daily.wind_speed_10m_max);

  const idxHot = daily.temperature_2m_max.reduce((best,v,i)=> v>daily.temperature_2m_max[best]?i:best, 0);
  const idxCold = daily.temperature_2m_min.reduce((best,v,i)=> v<daily.temperature_2m_min[best]?i:best, 0);
  const idxRainiest = daily.precipitation_sum.reduce((best,v,i)=> v>daily.precipitation_sum[best]?i:best, 0);
  const idxPop = daily.precipitation_probability_max.reduce((best,v,i)=> (v||0)>(daily.precipitation_probability_max[best]||0)?i:best, 0);

  const adv = adviceFor(info.grp, cur.temperature_2m, daily.precipitation_probability_max[0], cur.uv_index, isDay);

  // FIX: cautare orara bazata pe timp local, nu UTC
  let startIdx = 0;
  try{
    const now = new Date(); now.setMinutes(0,0,0,0);
    const found = hourly.time.findIndex(t => new Date(t) >= now);
    startIdx = found >=0 ? found : 0;
  }catch(e){ startIdx = 0; }

  const hourlyHTML = [];
  const next6Data = []; // pentru graficul de ploaie
  const next24Data = []; // pentru graficul de vant
  for(let i=startIdx; i<startIdx+24 && i<hourly.time.length; i++){
    const h = {
      time: hourly.time[i],
      temp: hourly.temperature_2m[i],
      pop: hourly.precipitation_probability[i],
      precip: hourly.precipitation[i],
      wind: hourly.wind_speed_10m[i],
      code: hourly.weather_code[i]
    };
    if(i < startIdx + 6) next6Data.push(h);
    next24Data.push(h);
    const hi = wmoInfo(h.code);
    const hasRain = (h.precip!=null && h.precip>0.05) || (hi.grp==='rain' || hi.grp==='storm' || hi.grp==='snow');
    const mmText = h.precip!=null && h.precip>=0.05 ? (h.precip>=1 ? h.precip.toFixed(1) : h.precip.toFixed(2)) + ' mm' : '';
    const popText = h.pop!=null && h.pop>0 ? h.pop + '%' : '';
    const classes = ['hour-item', i===startIdx?'now':'', hasRain?'has-rain':''].filter(Boolean).join(' ');
    hourlyHTML.push(`<div class="${classes}">
      <div class="h-time">${i===startIdx?'Acum':fmtTime(h.time)}</div>

        <div class="metric"><div class="m-icon">🔆</div><div class="m-val">${cur.uv_index!=null?cur.uv_index.toFixed(1):'—'}</div><div class="m-lbl">Index UV</div></div>

// Tooltip nativ
let chartTooltip = null;
function getChartTooltip(){
  if(chartTooltip) return chartTooltip;
  const wrap = document.querySelector('.chart-wrap');
  if(!wrap) return null;
  chartTooltip = document.createElement('div');
  chartTooltip.style.cssText = 'position:absolute;pointer-events:none;background:rgba(20,24,38,0.94);color:#fff;border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:8px 10px;font-size:11px;line-height:1.4;transform:translate(-50%,-110%);opacity:0;transition:opacity .12s;z-index:2;white-space:nowrap;box-shadow:0 8px 20px rgba(0,0,0,0.35);';
  wrap.style.position='relative';

function drawRainChart(hourData){
  _lastRain = hourData;
  const canvas = document.getElementById('rainChart');
  if(!canvas) return;
  const wrap = canvas.parentElement;
  if(!wrap) return;

  const dpr = window.devicePixelRatio || 1;
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;
  if(W < 10 || H < 10){ setTimeout(()=>drawRainChart(hourData), 80); return; }

  canvas.width = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  if(!ctx) return;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);

  const precip = hourData.map(h=> h.precip||0);
  const maxP = Math.max(1, ...precip, 0.6);
  const n = hourData.length;
  const pad = {l:38, r:18, t:20, b:36};
  const chartW = W - pad.l - pad.r;
  const chartH = H - pad.t - pad.b;
  const xFor = i => pad.l + (n>1 ? (i/(n-1))*chartW : chartW/2);
  const yFor = v => pad.t + chartH - (v/maxP)*chartH;

  // grid
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 1;
  for(let g=0; g<=3; g++){
    const y = pad.t + (g/3)*chartH;
    ctx.beginPath(); ctx.moveTo(pad.l, Math.round(y)+0.5); ctx.lineTo(pad.l+chartW, Math.round(y)+0.5); ctx.stroke();
    if(g===0 || g===3){
      const val = (maxP * (1 - g/3)).toFixed(g===0?1:1);
      ctx.fillStyle = 'rgba(142,205,255,0.75)';
      ctx.font = '11px Segoe UI';
      ctx.textAlign = 'right';
      ctx.fillText(val+' mm', pad.l-6, y+3);
    }
  }

  // bare
  const barW = Math.max(14, Math.min(38, chartW/n*0.55));
  hourData.forEach((h,i)=>{
    const v = h.precip||0;
    if(v<=0.001) return;
    const x = xFor(i);
    const y = yFor(v);
    const hh = pad.t + chartH - y;
    const grad = ctx.createLinearGradient(0,y,0,y+hh);
    grad.addColorStop(0,'rgba(142,205,255,0.95)');
    grad.addColorStop(1,'rgba(90,160,230,0.35)');
    ctx.fillStyle = grad;
    const r = 7;
    ctx.beginPath();
    ctx.moveTo(x - barW/2, y + r);
    ctx.quadraticCurveTo(x - barW/2, y, x - barW/2 + r, y);
    ctx.lineTo(x + barW/2 - r, y);
    ctx.quadraticCurveTo(x + barW/2, y, x + barW/2, y + r);
    ctx.lineTo(x + barW/2, y + hh);
    ctx.lineTo(x - barW/2, y + hh);
    ctx.closePath();
    ctx.fill();

    // valoare deasupra barei
    ctx.fillStyle = '#a8d8ff';
    ctx.font = '700 11px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(v>=1? v.toFixed(1)+'mm' : v.toFixed(2)+'mm', x, y-6);
  });

  // linie trend subtire
  ctx.strokeStyle = 'rgba(142,205,255,0.45)';
  ctx.lineWidth = 1.8;
  ctx.beginPath();
  hourData.forEach((h,i)=>{
    const x = xFor(i), y = yFor(h.precip||0);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.stroke();

  // puncte
  hourData.forEach((h,i)=>{
    const v = h.precip||0;
    if(v<=0.001) return;
    const x = xFor(i), y = yFor(v);
    ctx.beginPath();
    ctx.fillStyle = '#e6f4ff';
    ctx.arc(x,y,3.5,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#5aa0e6';
    ctx.lineWidth = 1.2;
    ctx.stroke();
  });

  // labels ore
  ctx.fillStyle = 'rgba(255,255,255,0.72)';
  ctx.font = '600 11px Segoe UI';
  ctx.textAlign = 'center';
  hourData.forEach((h,i)=>{
    const x = xFor(i);
    const label = i===0 ? 'Acum' : fmtTime(h.time);
    ctx.fillText(label, x, H - 8);
    if(h.pop>0){
      ctx.fillStyle = 'rgba(142,205,255,0.9)';
      ctx.font = '10px Segoe UI';
      ctx.fillText(h.pop+'%', x, H - 20);
      ctx.fillStyle = 'rgba(255,255,255,0.72)';
      ctx.font = '600 11px Segoe UI';
    }
  });
}

function drawWindChart(hourData){
  _lastWind = hourData;
  const canvas = document.getElementById('windChart');
  if(!canvas) return;
  const wrap = canvas.parentElement;
  if(!wrap) return;
  const dpr = window.devicePixelRatio || 1;
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;
  if(W < 10 || H < 10){ setTimeout(()=>drawWindChart(hourData), 80); return; }
  canvas.width = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  if(!ctx) return;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  const winds = hourData.map(h=> h.wind||0);
  const maxW = Math.max(8, ...winds, 5);
  const minW = 0;
  const n = hourData.length;
  const pad = {l:42, r:16, t:24, b:36};
  const chartW = W - pad.l - pad.r;
  const chartH = H - pad.t - pad.b;
  const xFor = i => pad.l + (n>1 ? (i/(n-1))*chartW : chartW/2);
  const yFor = v => pad.t + chartH - ((v-minW)/(maxW-minW))*chartH;
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 1;
  for(let g=0; g<=3; g++){
    const y = pad.t + (g/3)*chartH;
    ctx.beginPath(); ctx.moveTo(pad.l, Math.round(y)+0.5); ctx.lineTo(pad.l+chartW, Math.round(y)+0.5); ctx.stroke();
    const val = Math.round(maxW - (g/3)*(maxW-minW));
    ctx.fillStyle = 'rgba(180,210,255,0.65)';
    ctx.font = '11px Segoe UI';
    ctx.textAlign = 'right';
    ctx.fillText(val+' km/h', pad.l-6, y+3);
  }
  const gradFill = ctx.createLinearGradient(0, pad.t, 0, pad.t+chartH);
  gradFill.addColorStop(0,'rgba(120,200,255,0.32)');
  gradFill.addColorStop(1,'rgba(120,200,255,0)');
  ctx.fillStyle = gradFill;
  ctx.beginPath();
  ctx.moveTo(xFor(0), pad.t+chartH);
  winds.forEach((v,i)=>{
    const x = xFor(i), y = yFor(v);
    if(i===0) ctx.lineTo(x,y);
    else {
      const prevX = xFor(i-1), prevY = yFor(winds[i-1]);
      const cpx = (prevX + x)/2;
      ctx.quadraticCurveTo(cpx, prevY, x, y);
    }
  });
  ctx.lineTo(xFor(n-1), pad.t+chartH);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#7ec8ff';
  ctx.lineWidth = 2.4;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  winds.forEach((v,i)=>{
    const x = xFor(i), y = yFor(v);
    if(i===0) ctx.moveTo(x,y);
    else {
      const prevX = xFor(i-1), prevY = yFor(winds[i-1]);
      const cpx = (prevX + x)/2;
      ctx.quadraticCurveTo(cpx, prevY, x, y);
    }
  });
  ctx.stroke();
  hourData.forEach((h,i)=>{
    const x = xFor(i), y = yFor(h.wind||0);
    if(i%3===0 || h.wind === Math.max(...winds)){
      ctx.beginPath();
      ctx.fillStyle = '#e6f4ff';
      ctx.arc(x,y,3.2,0,Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = '#7ec8ff';
      ctx.lineWidth = 1.1;
      ctx.stroke();
      ctx.fillStyle = '#a8d8ff';
      ctx.font = '700 10px Segoe UI';
      ctx.textAlign = 'center';
      if(h.wind>=2) ctx.fillText(Math.round(h.wind)+' km/h', x, y-9);
    }
  });
  ctx.fillStyle = 'rgba(255,255,255,0.72)';
  ctx.font = '600 10px Segoe UI';
  ctx.textAlign = 'center';
  hourData.forEach((h,i)=>{
    if(i%2!==0 && n>12) return;
    const x = xFor(i);
    let label;
    if(i===0){ label = 'Acum'; }
    else {
      try{
        const d = new Date(h.time);
        label = String(d.getHours());
      }catch(_){
        const t = fmtTime(h.time);
        label = t.includes(':') ? t.split(':')[0] : t;
      }
    }
    ctx.fillText(label, x, H - 8);
  });
}

function drawChart(daily){
  _lastDaily = daily;
  const canvas = document.getElementById('dailyChart');
  if(!canvas) return;
  const wrap = canvas.parentElement;
  if(!wrap) return;

  const dpr = window.devicePixelRatio || 1;
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;
  if(W < 10 || H < 10){ setTimeout(()=>drawChart(daily), 80); return; }

  canvas.width = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  if(!ctx) return;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);

  // --- date ---
  const labels = daily.time.map(t=>{
    try{
      const p = t.split('-');
      const d = new Date(Number(p[0]), Number(p[1])-1, Number(p[2]));
      return {top: RO_DAYS_SHORT[d.getDay()], bottom: String(d.getDate())};
    }catch(e){ return {top: t.slice(5), bottom: ''}; }
  });
  const maxData = daily.temperature_2m_max.map(v=> v==null?0:Number(v));
  const minData = daily.temperature_2m_min.map(v=> v==null?0:Number(v));
  const precipData = daily.precipitation_sum.map(v=> v==null?0:Number(v));

  const n = labels.length;
  if(n===0) return;

  const minTemp = Math.min(...minData);
  const maxTemp = Math.max(...maxData);
  const tempPad = Math.max(2, (maxTemp - minTemp) * 0.15);
  const yMin = Math.floor(minTemp - tempPad);
  const yMax = Math.ceil(maxTemp + tempPad);
  const yRange = Math.max(1, yMax - yMin);

  const precipMax = Math.max(1, ...precipData);
  const precipH = H * 0.28; // zona pentru bare jos

  // layout
  const pad = {l:36, r:36, t:14, b:42};
  const chartW = W - pad.l - pad.r;
  const chartH = H - pad.t - pad.b - precipH - 10;
  const precipY0 = pad.t + chartH + 10;
  const precipTop = precipY0;

  const xStep = n>1 ? chartW / (n-1) : chartW;
  const xFor = i => pad.l + (n>1 ? (i/(n-1))*chartW : chartW/2);

  const yForTemp = temp => pad.t + (1 - (temp - yMin)/yRange) * chartH;
  const yForPrec = v => precipTop + precipH - (v/precipMax)*precipH;

  // grid
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 1;
  for(let g=0; g<=4; g++){
    const y = pad.t + (g/4)*chartH;
    ctx.beginPath(); ctx.moveTo(pad.l, Math.round(y)+0.5); ctx.lineTo(pad.l+chartW, Math.round(y)+0.5); ctx.stroke();
    const tempLabel = Math.round(yMax - (g/4)*(yRange));
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.font = '11px Segoe UI, system-ui';
    ctx.textAlign = 'right';
    ctx.fillText(tempLabel+'°', pad.l-6, y+3);
  }
  // grid precip
  ctx.fillStyle = 'rgba(142,205,255,0.55)';
  ctx.textAlign = 'left';
  ctx.fillText(Math.round(precipMax)+' mm', pad.r+6, precipTop+10);

  // axe x labels
  ctx.fillStyle = 'rgba(255,255,255,0.72)';
  ctx.font = '600 11px Segoe UI, system-ui';
  ctx.textAlign = 'center';
  labels.forEach((lb,i)=>{
    const x = xFor(i);
    ctx.fillText(lb.top, x, H - 20);
    ctx.fillText(lb.bottom, x, H - 6);
  });

  // bare precip
  const barW = Math.max(6, Math.min(18, chartW/n*0.45));
  precipData.forEach((v,i)=>{
    if(v<=0.05) return;
    const x = xFor(i);
    const y = yForPrec(v);
    const h = precipTop + precipH - y;
    ctx.fillStyle = 'rgba(142,205,255,0.58)';
    // rounded top
    const r = 5;
    ctx.beginPath();
    ctx.moveTo(x - barW/2, y + r);
    ctx.quadraticCurveTo(x - barW/2, y, x - barW/2 + r, y);
    ctx.lineTo(x + barW/2 - r, y);
    ctx.quadraticCurveTo(x + barW/2, y, x + barW/2, y + r);
    ctx.lineTo(x + barW/2, y + h);
    ctx.lineTo(x - barW/2, y + h);
    ctx.closePath();
    ctx.fill();
  });

  // helpers pentru linie smooth
  function smoothPath(data, yMapper){
    const pts = data.map((v,i)=> ({x:xFor(i), y:yMapper(v)}));
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for(let i=0;i<pts.length-1;i++){
      const p0 = pts[i-1] || pts[i];
      const p1 = pts[i];
      const p2 = pts[i+1];
      const p3 = pts[i+2] || p2;
      const cp1x = p1.x + (p2.x - p0.x)/6;
      const cp1y = p1.y + (p2.y - p0.y)/6;
      const cp2x = p2.x - (p3.x - p1.x)/6;
      const cp2y = p2.y - (p3.y - p1.y)/6;
      ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
    }
    return pts;
  }

  // fill max
  const gradMax = ctx.createLinearGradient(0, pad.t, 0, pad.t+chartH);
  gradMax.addColorStop(0,'rgba(255,209,102,0.38)');
  gradMax.addColorStop(1,'rgba(255,209,102,0)');
  ctx.fillStyle = gradMax;
  ctx.beginPath();
  {
    const pts = maxData.map((v,i)=> ({x:xFor(i), y:yForTemp(v)}));
    ctx.moveTo(pts[0].x, pts[0].y);
    for(let i=0;i<pts.length-1;i++){
      const p0 = pts[i-1] || pts[i];
      const p1 = pts[i];
      const p2 = pts[i+1];
      const p3 = pts[i+2] || p2;
      ctx.bezierCurveTo(p1.x + (p2.x - p0.x)/6, p1.y + (p2.y - p0.y)/6, p2.x - (p3.x - p1.x)/6, p2.y - (p3.y - p1.y)/6, p2.x, p2.y);
    }
    ctx.lineTo(pts[pts.length-1].x, pad.t+chartH);
    ctx.lineTo(pts[0].x, pad.t+chartH);
    ctx.closePath();
    ctx.fill();
  }

  // fill min
  const gradMin = ctx.createLinearGradient(0, pad.t, 0, pad.t+chartH);
  gradMin.addColorStop(0,'rgba(142,205,255,0.30)');
  gradMin.addColorStop(1,'rgba(142,205,255,0)');
  ctx.fillStyle = gradMin;
  ctx.beginPath();
  {
    const pts = minData.map((v,i)=> ({x:xFor(i), y:yForTemp(v)}));
    ctx.moveTo(pts[0].x, pts[0].y);
    for(let i=0;i<pts.length-1;i++){
      const p0 = pts[i-1] || pts[i];
      const p1 = pts[i];
      const p2 = pts[i+1];
      const p3 = pts[i+2] || p2;
      ctx.bezierCurveTo(p1.x + (p2.x - p0.x)/6, p1.y + (p2.y - p0.y)/6, p2.x - (p3.x - p1.x)/6, p2.y - (p3.y - p1.y)/6, p2.x, p2.y);
    }
    ctx.lineTo(pts[pts.length-1].x, pad.t+chartH);
    ctx.lineTo(pts[0].x, pad.t+chartH);
    ctx.closePath();
    ctx.fill();
  }

  // linii
  function strokeLine(data, color, width){
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    smoothPath(data, yForTemp);
    ctx.stroke();
  }
  strokeLine(maxData, '#ffd166', 2.6);
  strokeLine(minData, '#8ecdff', 2.6);

  // puncte
  function drawDots(data, color){
    data.forEach((v,i)=>{
      const x = xFor(i), y = yForTemp(v);
      ctx.beginPath();
      ctx.fillStyle = color;
      ctx.arc(x, y, 4, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.4;
      ctx.stroke();
    });
  }
  drawDots(maxData, '#ffd166');
  drawDots(minData, '#8ecdff');

  // legenda mica
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.font = '500 11px Segoe UI';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#ffd166'; ctx.fillRect(pad.l, pad.t-2, 12, 4);
  ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.fillText('Max', pad.l+16, pad.t+4);
  ctx.fillStyle = '#8ecdff'; ctx.fillRect(pad.l+52, pad.t-2, 12, 4);
  ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.fillText('Min', pad.l+68, pad.t+4);
  ctx.fillStyle = 'rgba(142,205,255,0.58)'; ctx.fillRect(pad.l+98, pad.t-2, 12, 4);
  ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.fillText('Ploaie', pad.l+114, pad.t+4);

  // interactivitate
  if(!canvas._hasHover){
    canvas._hasHover = true;
    canvas.addEventListener('mousemove', (e)=>{
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      // gaseste cel mai apropiat i
      let bestI = 0, bestDist = Infinity;
      for(let i=0;i<n;i++){
        const d = Math.abs(mx - (xFor(i)/ (W) * rect.width));
        // xFor e in CSS px, rect.width similar cu W
        const cssX = xFor(i);
        const dist = Math.abs(mx - cssX);
        if(dist < bestDist){ bestDist = dist; bestI = i; }
      }
      if(bestDist > 28){
        const tip = getChartTooltip();
        if(tip) tip.style.opacity='0';
        return;
      }
      const tip = getChartTooltip();
      if(!tip) return;
      const dateStr = daily.time[bestI];
      const d = (()=>{ try{ const p=dateStr.split('-'); return new Date(+p[0],+p[1]-1,+p[2]).toLocaleDateString('ro-RO',{weekday:'short', day:'numeric', month:'short'});}catch(_){return dateStr;}})();
      tip.innerHTML = `<div style="font-weight:600;margin-bottom:4px">${d}</div><div>🔺 Max ${Math.round(maxData[bestI])}° · 🔻 Min ${Math.round(minData[bestI])}°</div><div>🌧️ ${precipData[bestI].toFixed(1)} mm ploaie</div>`;
      tip.style.left = xFor(bestI) + 'px';
      tip.style.top = (yForTemp(maxData[bestI]) - 8) + 'px';
      tip.style.opacity = '1';
    });
    canvas.addEventListener('mouseleave', ()=>{
      const tip = getChartTooltip();
      if(tip) tip.style.opacity='0';
    });
    canvas.addEventListener('touchstart', (e)=>{
      if(e.touches && e.touches[0]){
        const fake = {clientX:e.touches[0].clientX, clientY:e.touches[0].clientY};
        canvas.dispatchEvent(new MouseEvent('mousemove', fake));
      }
    }, {passive:true});

    // click pe o zi -> arata mm de ploaie pentru ziua respectiva
    canvas.addEventListener('click', (e)=>{
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      let bestI = 0, bestDist = Infinity;
      for(let i=0;i<n;i++){
        const dist = Math.abs(mx - xFor(i));
        if(dist < bestDist){ bestDist = dist; bestI = i; }
      }
      const tip = getChartTooltip();
      if(!tip) return;
      const dateStr = daily.time[bestI];
      const dLabel = (()=>{ try{ const p=dateStr.split('-'); return new Date(+p[0],+p[1]-1,+p[2]).toLocaleDateString('ro-RO',{weekday:'long', day:'numeric', month:'short'});}catch(_){return dateStr;}})();
      const mm = precipData[bestI];
      tip.innerHTML = `<div style="font-weight:600;margin-bottom:4px;text-transform:capitalize">${dLabel}</div><div style="font-size:13px">💧 <b>${mm.toFixed(1)} mm</b> ploaie</div>`;
      tip.style.left = xFor(bestI) + 'px';
      tip.style.top = (yForPrec(mm) - 12) + 'px';
      tip.style.opacity = '1';
      tip.classList.add('pinned');
      e.stopPropagation();
    });
    if(!canvas._hasDocClose){
      canvas._hasDocClose = true;
      document.addEventListener('click', ()=>{
        const tip = chartTooltip;
        if(tip && tip.classList.contains('pinned')){
          tip.style.opacity = '0';
          tip.classList.remove('pinned');
        }
      });
    }
  }
}

/* ---------- Init - FIX file:// freeze ---------- */
(function init(){
  try{
    buildStars(); // fundal initial
    bgScene.style.background = BG_THEMES['cloudy-day'];

    const saved = safeGet('vremea_loc');
    if(saved){
      try{ currentLoc = JSON.parse(saved); }catch(e){ currentLoc = null; }
    }
    if(!currentLoc){
      currentLoc = {name:'București', admin1:'București', country:'România', lat:44.4268, lon:26.1025};
    }
    // delay mic ca sa se randeze UI-ul inainte de fetch
    setTimeout(()=> loadWeather(), 100);
    setInterval(loadWeather, 15*60*1000);
  }catch(e){
    console.error('init crash', e);
    // fallback garantat sa nu freeze
    currentLoc = {name:'București', admin1:'București', country:'România', lat:44.4268, lon:26.1025};
    contentEl.innerHTML = `<div class="error-msg">Eroare la inițializare: ${escapeHTML(e.message)}<br><button onclick="loadWeather()">Încearcă din nou</button></div>`;
  }
})();
</script>
