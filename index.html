<!DOCTYPE html>
<html lang="ro">
<head>
 <link rel="icon" type="image/png" href="cloudy.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vremea</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Mono:wght@300;400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #07091a;
    --bg2: #0d1028;
    --bg3: #131630;
    --card: rgba(255,255,255,0.04);
    --card-hover: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8eaf6;
    --text2: rgba(232,234,246,0.55);
    --text3: rgba(232,234,246,0.35);
    --gold: #f5c842;
    --gold2: #e8a820;
    --teal: #38d9c4;
    --teal2: #20b8a6;
    --blue: #5b9cf6;
    --rain: #7eb8f7;
    --accent: #c084fc;
    --font-display: 'Cormorant Garamond', serif;
    --font-data: 'Outfit', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --r: 14px;
    --r2: 20px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-data);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .noise {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 256px;
  }

  .glow-orb {
    position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0;
  }
  .glow-orb.a { width: 500px; height: 500px; top: -200px; left: -100px; background: rgba(91,156,246,0.08); }
  .glow-orb.b { width: 400px; height: 400px; bottom: 100px; right: -100px; background: rgba(56,217,196,0.06); }
  .glow-orb.c { width: 300px; height: 300px; top: 40%; left: 40%; background: rgba(245,200,66,0.05); }

  .app {
    position: relative; z-index: 1;
    max-width: 1100px; margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── Search Bar ── */
  .search-wrap {
    position: relative;
    margin-bottom: 32px;
    animation: fadeUp 0.5s ease both;
    isolation: isolate;
    z-index: 200;
  }
  .search-inner {
    position: relative;
    display: flex; align-items: center;
  }
  .search-icon {
    position: absolute; left: 16px;
    color: var(--text3); font-size: 16px;
    pointer-events: none; z-index: 1;
  }
  .search-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 13px 20px 13px 46px;
    color: var(--text);
    font-family: var(--font-data);
    font-size: 15px;
    font-weight: 400;
    outline: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    letter-spacing: 0.3px;
  }
  .search-input::placeholder { color: var(--text3); }
  .search-input:focus {
    border-color: rgba(91,156,246,0.5);
    background: rgba(91,156,246,0.06);
    box-shadow: 0 0 0 3px rgba(91,156,246,0.1);
  }
  .search-clear {
    position: absolute; right: 16px;
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 18px; line-height: 1;
    padding: 4px; border-radius: 50%;
    transition: color 0.15s;
    display: none;
  }
  .search-clear:hover { color: var(--text); }
  .search-suggestions {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  right: 0;
  /* Fundal închis și complet opac pentru a bloca textul din spate */
  background: #0a0c1f;
  border: 1px solid rgba(91, 156, 246, 0.3);
  border-radius: 16px;
  overflow: hidden;
  /* Z-index mare pentru a fi peste orice element din aplicație */
  z-index: 9999;
  /* Umbră mai densă pentru a crea separare de fundal */
  box-shadow:
    0 15px 35px rgba(0,0,0,0.8),
    0 5px 15px rgba(0,0,0,0.5);
  display: none;
  animation: suggFadeIn 0.2s ease-out both;
}

/* Stil pentru elementele din listă pentru contrast mai bun */
.suggestion-item {
  padding: 14px 16px;
  background: #0a0c1f; /* Fundal solid și aici */
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.suggestion-item:last-child {
  border-bottom: none;
}

.suggestion-item:hover, .suggestion-item.focused {
  background: #161b3d; /* O nuanță ușor mai deschisă la hover */
}
  @keyframes suggFadeIn {
    from { opacity: 0; transform: translateY(-6px) scale(0.99); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .search-suggestions.open { display: contents; }

  .suggestion-item {
    padding: 11px 16px;
    cursor: pointer;
    display: flex; align-items: center; gap: 12px;
    transition: background 0.12s;
    position: relative;
  }
  .suggestion-item + .suggestion-item::before {
    content: '';
    position: absolute; top: 0; left: 16px; right: 16px;
    height: 1px;
    background: rgba(255,255,255,0.07);
  }
  .suggestion-item:hover, .suggestion-item.focused {
    background: rgba(91,156,246,0.15);
  }
  .suggestion-item:hover .suggestion-pin-wrap,
  .suggestion-item.focused .suggestion-pin-wrap { background: rgba(91,156,246,0.25); }
  .suggestion-item:hover .suggestion-pin,
  .suggestion-item.focused .suggestion-pin { color: var(--blue); }

  .suggestion-pin-wrap {
    width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
    background: rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s;
  }
  .suggestion-pin { color: var(--text2); font-size: 14px; line-height: 1; }

  .suggestion-text { flex: 1; min-width: 0; }
  .suggestion-name {
    font-size: 14px; font-weight: 500; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .suggestion-region {
    font-size: 11px; color: var(--text3); margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .suggestion-meta {
    font-size: 11px; color: rgba(91,156,246,0.6);
    background: rgba(91,156,246,0.1);
    border: 1px solid rgba(91,156,246,0.15);
    border-radius: 20px;
    padding: 2px 9px;
    flex-shrink: 0; white-space: nowrap;
    font-family: var(--font-mono);
  }

  .search-loading {
    padding: 16px 20px; color: var(--text3); font-size: 13px;
    display: flex; align-items: center; gap: 10px;
    letter-spacing: 0.3px;
  }
  .search-loading .mini-spin {
    width: 14px; height: 14px; border: 1.5px solid rgba(91,156,246,0.2);
    border-top-color: var(--blue); border-radius: 50%;
    animation: spin 0.7s linear infinite; flex-shrink: 0;
  }
  .search-no-results {
    padding: 16px 20px; color: var(--text3); font-size: 13px;
    display: flex; align-items: center; gap: 10px;
  }
  .search-no-results::before { content: '🔍'; font-size: 15px; }

  /* ── Header ── */
  .header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 40px;
    animation: fadeUp 0.6s ease both;
  }
  .location-name {
    font-family: var(--font-display);
    font-size: 52px; font-weight: 300; letter-spacing: -1px;
    line-height: 1; color: var(--text);
  }
  .location-sub {
    font-size: 13px; color: var(--text2); margin-top: 6px;
    font-weight: 300; letter-spacing: 2px; text-transform: uppercase;
  }
  .now-temp { text-align: right; }
  .current-temp {
    font-family: var(--font-display);
    font-size: 80px; font-weight: 300; line-height: 1;
    background: linear-gradient(135deg, #f5f7ff, var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .current-cond { font-size: 14px; color: var(--text2); text-align: right; margin-top: 4px; }

  /* ── Sun arc ── */
  .sun-section {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r2); padding: 28px 32px;
    margin-bottom: 24px;
    animation: fadeUp 0.6s 0.1s ease both;
    display: grid; grid-template-columns: 1fr auto 1fr; gap: 20px; align-items: center;
  }
  .sun-info { display: flex; flex-direction: column; }
  .sun-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; }
  .sun-time { font-family: var(--font-mono); font-size: 28px; font-weight: 300; color: var(--gold); }
  .sun-duration { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .sun-arc-wrap { display: flex; justify-content: center; }
  svg.arc-svg { overflow: visible; }

  /* ── Hourly ── */
  .section-label {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--text3); margin-bottom: 12px; padding-left: 2px;
  }
  .hourly-scroll {
    display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 24px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    animation: fadeUp 0.6s 0.15s ease both;
  }
  .hour-card {
    flex-shrink: 0;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r); padding: 12px 10px;
    text-align: center; min-width: 60px;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    cursor: default;
  }
  .hour-card.active { background: rgba(91,156,246,0.15); border-color: rgba(91,156,246,0.4); }
  .hour-card:hover { background: var(--card-hover); transform: translateY(-2px); }
  .hour-time { font-size: 11px; color: var(--text3); margin-bottom: 8px; font-family: var(--font-mono); }
  .hour-icon { font-size: 18px; margin-bottom: 6px; line-height: 1; }
  .hour-temp { font-size: 15px; font-weight: 500; }
  .hour-prec { font-size: 10px; color: var(--rain); margin-top: 4px; }

  /* ── 10-day ── */
  .days-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
    margin-bottom: 20px;
    animation: fadeUp 0.6s 0.2s ease both;
  }
  @media (max-width: 700px) { .days-grid { grid-template-columns: repeat(2, 1fr); } }
  .day-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r); padding: 16px 12px;
    cursor: pointer; transition: background 0.2s, border-color 0.2s, transform 0.15s;
    display: flex; flex-direction: column; gap: 6px;
  }
  .day-card:hover { background: var(--card-hover); transform: translateY(-3px); border-color: var(--border2); }
  .day-card.active { background: rgba(91,156,246,0.12); border-color: rgba(91,156,246,0.35); }
  .day-name { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); }
  .day-date { font-size: 11px; color: var(--text3); }
  .day-icon { font-size: 26px; line-height: 1.2; }
  .day-temps { display: flex; gap: 6px; align-items: baseline; margin-top: 2px; }
  .day-high { font-size: 18px; font-weight: 500; }
  .day-low { font-size: 13px; color: var(--text2); }
  .day-prec { font-size: 11px; color: var(--rain); }

  /* ── Total Precipitation Card ── */
  .precip-total-card {
    background: linear-gradient(135deg, rgba(126,184,247,0.08) 0%, rgba(91,156,246,0.05) 100%);
    border: 1px solid rgba(126,184,247,0.2);
    border-radius: var(--r2);
    padding: 20px 28px;
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 24px;
    animation: fadeUp 0.6s 0.22s ease both;
    position: relative; overflow: hidden;
  }
  .precip-total-card::before {
    content: '';
    position: absolute; top: -30px; right: -30px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(126,184,247,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .precip-total-icon {
    font-size: 42px; line-height: 1; flex-shrink: 0;
    filter: drop-shadow(0 0 12px rgba(126,184,247,0.5));
  }
  .precip-total-info { flex: 1; }
  .precip-total-label {
    font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase;
    color: rgba(126,184,247,0.6); margin-bottom: 4px;
  }
  .precip-total-value {
    font-family: var(--font-display);
    font-size: 48px; font-weight: 300; line-height: 1;
    color: #a8d4fc;
  }
  .precip-total-value span { font-size: 22px; color: rgba(168,212,252,0.6); margin-left: 4px; }
  .precip-total-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .precip-total-breakdown {
    display: flex; flex-direction: column; gap: 4px; flex-shrink: 0;
    align-items: flex-end;
  }
  .precip-rainy-days {
    font-size: 13px; color: var(--rain);
    display: flex; align-items: center; gap: 6px;
  }
  .precip-rainy-days strong { font-size: 22px; font-weight: 500; font-family: var(--font-mono); }
  .precip-bar-wrap {
    width: 160px; height: 6px; background: rgba(255,255,255,0.06);
    border-radius: 3px; overflow: hidden; margin-top: 6px;
  }
  .precip-bar-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, #5b9cf6, #7eb8f7);
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }
  .precip-bar-label { font-size: 10px; color: var(--text3); margin-top: 3px; }
  @media (max-width: 600px) {
    .precip-total-card { flex-wrap: wrap; gap: 16px; }
    .precip-total-breakdown { align-items: flex-start; }
    .precip-bar-wrap { width: 100%; }
  }

  /* ── Charts ── */
  .charts-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;
    animation: fadeUp 0.6s 0.25s ease both;
  }
  @media (max-width: 700px) { .charts-row { grid-template-columns: 1fr; } }
  .chart-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r2); padding: 20px 20px 14px;
  }
  .chart-title {
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text3); margin-bottom: 16px;
  }
  .chart-wrap { position: relative; width: 100%; height: 180px; }

  /* ── Hourly detail chart ── */
  .hourly-chart-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r2); padding: 20px 20px 14px;
    margin-bottom: 24px;
    animation: fadeUp 0.6s 0.3s ease both;
  }
  .hourly-chart-wrap { position: relative; width: 100%; height: 160px; }

  /* ── Windy Radar Map ── */
  .windy-section {
    margin-bottom: 24px;
    animation: fadeUp 0.6s 0.35s ease both;
  }
  .windy-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    overflow: hidden;
    position: relative;
  }
  .windy-card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .windy-card-title {
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--text3);
    display: flex; align-items: center; gap: 8px;
  }
  .windy-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 8px var(--teal);
    animation: pulse-dot 2s ease infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  .windy-overlay-btns {
    display: flex; gap: 6px;
  }
  .windy-layer-btn {
    padding: 5px 12px; border-radius: 20px;
    font-size: 11px; font-family: var(--font-data); letter-spacing: 0.5px;
    cursor: pointer; border: 1px solid var(--border);
    background: var(--card); color: var(--text2);
    transition: all 0.18s;
  }
  .windy-layer-btn:hover { background: var(--card-hover); color: var(--text); }
  .windy-layer-btn.active {
    background: rgba(56,217,196,0.15); border-color: rgba(56,217,196,0.4);
    color: var(--teal);
  }
  .windy-frame-wrap {
    position: relative;
    width: 100%; height: 480px;
  }
  .windy-frame-wrap iframe {
    width: 100%; height: 100%;
    border: none; display: block;
    border-radius: 0 0 var(--r2) var(--r2);
  }
  .windy-loader {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--bg2); gap: 14px;
    border-radius: 0 0 var(--r2) var(--r2);
    transition: opacity 0.4s;
    pointer-events: none;
  }
  .windy-loader.hidden { opacity: 0; }
  .windy-loader .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite; }
  .windy-loader-text { font-size: 13px; color: var(--text2); letter-spacing: 1px; }

  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 300px; flex-direction: column; gap: 16px;
  }
  .spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
  .loading-text { font-size: 13px; color: var(--text2); letter-spacing: 1px; }
  .error-msg { color: #f87171; font-size: 14px; padding: 24px; text-align: center; }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    .app { padding: 20px 14px 60px; }
    .header { flex-direction: column; gap: 12px; margin-bottom: 24px; }
    .location-name { font-size: 38px; }
    .now-temp { text-align: left; display: flex; align-items: baseline; gap: 12px; }
    .current-temp { font-size: 56px; }
    .current-cond { text-align: left; margin-top: 0; }
    .sun-section {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      padding: 20px 18px;
      gap: 12px;
    }
    .sun-arc-wrap {
      grid-column: 1 / -1;
      order: -1;
    }
    .sun-arc-wrap svg { width: 100% !important; height: auto !important; }
    .sun-info:first-child { align-items: flex-start !important; }
    .sun-info:last-child { align-items: flex-end !important; }
    .sun-time { font-size: 22px; }
    .hourly-scroll { gap: 6px; }
    .hour-card { min-width: 52px; padding: 10px 7px; }
    .days-grid { grid-template-columns: repeat(2, 1fr); }
    .precip-total-card { flex-direction: column; gap: 14px; padding: 18px; }
    .precip-total-icon { font-size: 34px; }
    .precip-total-value { font-size: 38px; }
    .precip-total-breakdown { align-items: flex-start; width: 100%; }
    .precip-bar-wrap { width: 100%; }
    .charts-row { grid-template-columns: 1fr; }
    .windy-frame-wrap { height: 320px; }
    .windy-card-header { flex-direction: column; align-items: flex-start; gap: 10px; padding: 14px 16px; }
    .windy-overlay-btns { flex-wrap: wrap; gap: 6px; }
    .windy-layer-btn { padding: 6px 12px; font-size: 12px; }
    .search-input { font-size: 16px; } /* prevent iOS zoom */
  }
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="noise"></div>
<div class="glow-orb a"></div>
<div class="glow-orb b"></div>
<div class="glow-orb c"></div>

<!-- Search bar lives outside #app so it persists across re-renders -->
<div class="app" style="padding-bottom: 0;">
  <div class="search-wrap" id="searchWrap">
    <div class="search-inner">
      <span class="search-icon">🔍</span>
      <input
        class="search-input"
        id="searchInput"
        type="text"
        placeholder="Caută un oraș sau localitate…"
        autocomplete="off"
        spellcheck="false"
      >
      <button class="search-clear" id="searchClear" title="Șterge">✕</button>
    </div>
    <div class="search-suggestions" id="searchSuggestions"></div>
  </div>
</div>

<div class="app" id="app" style="padding-top: 0;">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text">Se încarcă datele meteo…</div>
  </div>
</div>

<script>
// ── State ──
let LAT = 44.4268, LON = 26.1025;
let TZ = 'Europe/Bucharest';
let CITY = 'București';
let COUNTRY = 'Romania';

let allData = null;
let selectedDay = 0;
let precipChart = null, tempChart = null, hourlyChart = null;
let currentWindyLayer = 'rain';
let searchTimeout = null;
let focusedSuggestion = -1;

// ── WMO Codes ──
const WMO = {
  0:'Cer senin',1:'Predominant senin',2:'Parțial noros',3:'Acoperit',

// ── Search / Geocoding ──
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
const searchSugg  = document.getElementById('searchSuggestions');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  searchClear.style.display = q ? 'block' : 'none';
  clearTimeout(searchTimeout);
  if (q.length < 2) { closeSuggestions(); return; }
  showSuggestionsLoading();
  searchTimeout = setTimeout(() => geocode(q), 300);
});

searchInput.addEventListener('keydown', e => {
  const items = searchSugg.querySelectorAll('.suggestion-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    focusedSuggestion = Math.min(focusedSuggestion + 1, items.length - 1);
    updateSuggestionFocus(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    focusedSuggestion = Math.max(focusedSuggestion - 1, 0);
    updateSuggestionFocus(items);
  } else if (e.key === 'Enter') {
    if (focusedSuggestion >= 0 && items[focusedSuggestion]) {
      items[focusedSuggestion].click();
    }
  } else if (e.key === 'Escape') {
    closeSuggestions();
    searchInput.blur();
  }
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.style.display = 'none';
  closeSuggestions();
  searchInput.focus();
});

document.addEventListener('click', e => {
  if (!document.getElementById('searchWrap').contains(e.target)) closeSuggestions();
});

function updateSuggestionFocus(items) {
  items.forEach((el, i) => el.classList.toggle('focused', i === focusedSuggestion));
}

function showSuggestionsLoading() {
  searchSugg.innerHTML = `<div class="search-loading"><div class="mini-spin"></div> Se caută…</div>`;
  searchSugg.classList.add('open');
}

function closeSuggestions() {
  searchSugg.classList.remove('open');
  searchSugg.innerHTML = '';
  focusedSuggestion = -1;
}

async function geocode(query) {
  try {
    const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=6&language=ro&format=json`);
    const data = await r.json();
    renderSuggestions(data.results || []);
  } catch(e) {
    searchSugg.innerHTML = `<div class="search-no-results">Serviciul de geocodare nu este disponibil.</div>`;
  }
}

function renderSuggestions(results) {
  if (!results.length) {
    searchSugg.innerHTML = `<div class="search-no-results">Nicio locație găsită.</div>`;
    searchSugg.classList.add('open');
    return;
  }
  focusedSuggestion = -1;
  searchSugg.innerHTML = results.map((r, i) => {
    const region = [r.admin1, r.country].filter(Boolean).join(', ');
    const pop = r.population ? `${r.population >= 1000000 ? (r.population/1000000).toFixed(1)+'M' : Math.round(r.population/1000)+'k'}` : '';
    return `<div class="suggestion-item" data-idx="${i}"
      data-lat="${r.latitude}" data-lon="${r.longitude}"
      data-city="${r.name}" data-country="${r.country||''}"
      data-tz="${r.timezone||'UTC'}">
      <div class="suggestion-pin-wrap"><span class="suggestion-pin">📍</span></div>
      <div class="suggestion-text">
        <div class="suggestion-name">${r.name}</div>
        ${region ? `<div class="suggestion-region">${region}</div>` : ''}
      </div>
      ${pop ? `<span class="suggestion-meta">${pop}</span>` : ''}
    </div>`;
  }).join('');
  searchSugg.classList.add('open');

  searchSugg.querySelectorAll('.suggestion-item').forEach(el => {
    el.addEventListener('click', () => {
      LAT = parseFloat(el.dataset.lat);
      LON = parseFloat(el.dataset.lon);
      CITY = el.dataset.city;
      COUNTRY = el.dataset.country;
      TZ = el.dataset.tz;
      searchInput.value = CITY + (COUNTRY ? `, ${COUNTRY}` : '');
      searchClear.style.display = 'block';
      closeSuggestions();
      loadWeather();
    });
  });
}

// ── Weather API ──
async function fetchWeather() {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}` +
    `&hourly=temperature_2m,precipitation,weathercode,apparent_temperature` +
    `&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,sunrise,sunset,precipitation_hours` +
    `&timezone=${encodeURIComponent(TZ)}&forecast_days=10&current_weather=true`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('API error');
  return r.json();
}

function loadWeather() {
  selectedDay = 0;
  document.getElementById('app').innerHTML = `
    <div class="loading"><div class="spinner"></div><div class="loading-text">Se încarcă datele meteo…</div></div>`;
  fetchWeather()
    .then(render)
    .catch(err => {
      document.getElementById('app').innerHTML =
        `<div class="error-msg">Nu s-au putut încărca datele meteo.<br><small>${err.message}</small></div>`;
    });
}

// ── Helpers ──
function formatTime(iso) {
  return new Date(iso).toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
}
function daylight(rise, set) {
  const diff = (new Date(set) - new Date(rise)) / 60000;
  const h = Math.floor(diff/60), m = Math.round(diff%60);
  return `${h}h ${m}m lumină naturală`;
}
function shortDay(iso) {
  return new Date(iso).toLocaleDateString('ro-RO', {weekday:'short'});
}
function shortDate(iso) {
  return new Date(iso).toLocaleDateString('ro-RO', {day:'numeric', month:'short'});
}

function drawSunArc(riseIso, setIso) {
  const rise = new Date(riseIso), set = new Date(setIso), now = new Date();
  let prog = Math.max(0, Math.min(1, (now - rise) / (set - rise)));
  const W = 260, H = 110, cx = W/2, cy = H+10, R = 110;
  const a = Math.PI + prog * Math.PI;
  const sunX = cx + R * Math.cos(a), sunY = cy + R * Math.sin(a);
  const arcPath = `M ${cx-R} ${cy} A ${R} ${R} 0 0 1 ${cx+R} ${cy}`;
  return `
    <svg class="arc-svg" width="${W}" height="${H+8}" viewBox="0 0 ${W} ${H+8}">
      <defs>
        <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#f5c842" stop-opacity="0.2"/>
          <stop offset="50%" stop-color="#f5c842" stop-opacity="0.8"/>
          <stop offset="100%" stop-color="#f87c3a" stop-opacity="0.2"/>
        </linearGradient>
        <filter id="sunGlow">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <path d="${arcPath}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
      <path d="${arcPath}" fill="none" stroke="url(#arcGrad)" stroke-width="2" stroke-linecap="round"
        stroke-dasharray="${Math.PI*R}" stroke-dashoffset="${Math.PI*R*(1-prog)}"/>
      ${prog>0&&prog<1 ? `
        <circle cx="${sunX}" cy="${sunY}" r="8" fill="#f5c842" filter="url(#sunGlow)" opacity="0.9"/>
        <circle cx="${sunX}" cy="${sunY}" r="4" fill="#fff8e0"/>
      ` : ''}
      <line x1="${cx-R-8}" y1="${cy}" x2="${cx+R+8}" y2="${cy}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </svg>`;
}

function getHourlyForDay(data, dayIndex) {
  const dateStr = data.daily.time[dayIndex];
  return data.hourly.time
    .map((t, i) => ({ t, i }))
    .filter(({t}) => t.startsWith(dateStr))
    .map(({i}) => ({
      hour: data.hourly.time[i].slice(11,16),
      temp: Math.round(data.hourly.temperature_2m[i]),
      prec: +(data.hourly.precipitation[i]).toFixed(1),
      code: data.hourly.weathercode[i],
      feel: Math.round(data.hourly.apparent_temperature[i])
    }));
}

function buildHourlyRow(hours) {
  return hours.map((h, i) => `
    <div class="hour-card ${i===12?'active':''}">
      <div class="hour-time">${h.hour}</div>
      <div class="hour-icon">${icon(h.code)}</div>
      <div class="hour-temp">${h.temp}°</div>
      ${h.prec>0 ? `<div class="hour-prec">${h.prec}mm</div>` : '<div class="hour-prec"> </div>'}
    </div>`).join('');
}

function buildDayCards(data) {
  return data.daily.time.map((d, i) => {
    const prec = +(data.daily.precipitation_sum[i]||0).toFixed(1);
    return `
      <div class="day-card ${i===selectedDay?'active':''}" onclick="selectDay(${i})">
        <div class="day-name">${i===0?'Azi':shortDay(d)}</div>
        <div class="day-date">${shortDate(d)}</div>
        <div class="day-icon">${icon(data.daily.weathercode[i])}</div>
        <div class="day-temps">
          <span class="day-high">${Math.round(data.daily.temperature_2m_max[i])}°</span>
          <span class="day-low">${Math.round(data.daily.temperature_2m_min[i])}°</span>
        </div>
        ${prec>0 ? `<div class="day-prec">💧 ${prec} mm</div>` : '<div class="day-prec"> </div>'}
      </div>`;
  }).join('');
}

function buildPrecipTotalCard(data) {
  const sums = data.daily.precipitation_sum.map(v => +(v||0));
  const total = +sums.reduce((a,b)=>a+b,0).toFixed(1);
  const rainyDays = sums.filter(v => v >= 0.1).length;
  // context: 50mm/10d = moderate, 100mm = heavy
  const pct = Math.min(100, Math.round(total / 100 * 100));
  let context = total === 0 ? 'Perioadă secetoasă — nicio ploaie așteptată'
    : total < 10 ? 'Precipitații foarte reduse așteptate'
    : total < 30 ? 'Precipitații ușoare în această perioadă'
    : total < 60 ? 'Precipitații moderate — ia umbrela cu tine'
    : total < 100 ? 'Precipitații abundente așteptate'
    : 'Precipitații foarte abundente — fii pregătit';
  let emoji = total === 0 ? '🏜️' : total < 15 ? '🌂' : total < 50 ? '☔' : '🌊';

  return `
    <div class="precip-total-card">
      <div class="precip-total-icon">${emoji}</div>
      <div class="precip-total-info">
        <div class="precip-total-label">Precipitații totale · 10 zile</div>
        <div class="precip-total-value">${total}<span>mm</span></div>
        <div class="precip-total-sub">${context}</div>
      </div>
      <div class="precip-total-breakdown">
        <div class="precip-rainy-days">
          <strong>${rainyDays}</strong> zi${rainyDays !== 1 ? 'le' : ''} ${rainyDays !== 1 ? 'ploioase' : 'ploioasă'}
        </div>
        <div class="precip-bar-wrap">
          <div class="precip-bar-fill" id="precipBarFill" style="width:0%"></div>
        </div>
        <div class="precip-bar-label">${pct}% dintr-o perioadă ploioasă intensă (100mm)</div>
      </div>
    </div>`;
}

function buildWindySection() {
  const layers = [
    { key: 'rain', label: '🌧 Ploaie' },
    { key: 'wind', label: '💨 Vânt' },
    { key: 'temp', label: '🌡 Temp' },
    { key: 'clouds', label: '☁️ Nori' },
  ];
  const btns = layers.map(l =>
    `<button class="windy-layer-btn ${l.key===currentWindyLayer?'active':''}" onclick="setWindyLayer('${l.key}')">${l.label}</button>`
  ).join('');
  return `
    <div class="windy-section">
      <div class="section-label">Hartă radar &amp; prognoză</div>
      <div class="windy-card">
        <div class="windy-card-header">
          <div class="windy-card-title">
            <div class="windy-dot"></div>
            Hartă Windy Live
          </div>
          <div class="windy-overlay-btns">${btns}</div>
        </div>
        <div class="windy-frame-wrap">
          <div class="windy-loader" id="windyLoader">
            <div class="spinner" style="border-top-color:var(--teal)"></div>
            <div class="windy-loader-text">Se încarcă harta radar…</div>
          </div>
          ${buildWindyIframe()}
        </div>
      </div>
    </div>`;
}

function buildWindyIframe() {
  const src = `https://embed.windy.com/embed2.html?lat=${LAT}&lon=${LON}` +
    `&detailLat=${LAT}&detailLon=${LON}&width=650&height=480&zoom=7` +
    `&level=surface&overlay=${currentWindyLayer}&product=ecmwf` +
    `&menu=&message=true&marker=true&calendar=now&pressure=` +
    `&type=map&location=coordinates&detail=&metricWind=km/h&metricTemp=%C2%B0C&radarRange=-1`;
  return `<iframe id="windyFrame" src="${src}" allowfullscreen onload="onWindyLoad()"></iframe>`;
}

function onWindyLoad() {
  const loader = document.getElementById('windyLoader');
  if (loader) {
    loader.classList.add('hidden');
    setTimeout(() => loader.remove(), 400);
  }
}

function setWindyLayer(layer) {
  currentWindyLayer = layer;
  document.querySelectorAll('.windy-layer-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase().includes(layer.substring(0,4)));
  });
  const wrap = document.querySelector('.windy-frame-wrap');
  if (wrap) {
    // Re-inject iframe + loader
    wrap.innerHTML = `
      <div class="windy-loader" id="windyLoader">
        <div class="spinner" style="border-top-color:var(--teal)"></div>
        <div class="windy-loader-text">Se schimbă stratul…</div>
      </div>
      ${buildWindyIframe()}`;
  }
}

// ── Charts ──
function destroyChart(ref) { if (ref) { try { ref.destroy(); } catch(e){} } }

function drawPrecipChart(data) {
  destroyChart(precipChart);
  const ctx = document.getElementById('precipChart').getContext('2d');
  const labels = data.daily.time.map((d,i) => i===0?'Azi':shortDay(d));
  const vals = data.daily.precipitation_sum.map(v => +(v||0).toFixed(1));
  precipChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: vals,
        backgroundColor: vals.map(v => v>10?'rgba(120,180,250,0.8)':v>3?'rgba(120,180,250,0.55)':'rgba(120,180,250,0.3)'),
        borderColor: 'rgba(120,180,250,0.6)',
        borderWidth: 1, borderRadius: 5, borderSkipped: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        backgroundColor: 'rgba(10,12,30,0.92)',
        titleColor: '#e8eaf6', bodyColor: '#7eb8f7',
        callbacks: { label: ctx => `${ctx.parsed.y} mm` }
      }},
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: 'rgba(232,234,246,0.45)', font: { family: 'Outfit', size: 11 } } },
        y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: 'rgba(232,234,246,0.45)', font: { family: 'Outfit', size: 11 }, callback: v => v+'mm' }, beginAtZero: true }
      }
    }
  });
}

function drawTempChart(data) {
  destroyChart(tempChart);
  const ctx = document.getElementById('tempChart').getContext('2d');
  const labels = data.daily.time.map((d,i) => i===0?'Azi':shortDay(d));
  tempChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Max', data: data.daily.temperature_2m_max.map(v => Math.round(v)),
          borderColor: '#f5c842', backgroundColor: 'rgba(245,200,66,0.08)',
          pointBackgroundColor: '#f5c842', pointRadius: 3, borderWidth: 2, tension: 0.4, fill: false },
        { label: 'Min', data: data.daily.temperature_2m_min.map(v => Math.round(v)),
          borderColor: '#5b9cf6', backgroundColor: 'rgba(91,156,246,0.08)',
          pointBackgroundColor: '#5b9cf6', pointRadius: 3, borderWidth: 2, tension: 0.4, fill: false,
          borderDash: [4,3] }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(10,12,30,0.92)', titleColor: '#e8eaf6', bodyColor: '#c6d4f0',
          callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y}°C` }
        }
      },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: 'rgba(232,234,246,0.45)', font: { family: 'Outfit', size: 11 } } },
        y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: 'rgba(232,234,246,0.45)', font: { family: 'Outfit', size: 11 }, callback: v => v+'°' } }
      }
    }
  });
}

function drawHourlyChart(hours) {
  destroyChart(hourlyChart);
  const ctx = document.getElementById('hourlyChart').getContext('2d');
  hourlyChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: hours.map(h => h.hour),
      datasets: [
        { label: 'Temp', data: hours.map(h => h.temp),
          borderColor: '#f5c842', pointBackgroundColor: '#f5c842',
          pointRadius: 2, borderWidth: 2, tension: 0.4, fill: false, yAxisID: 'y' },
        { label: 'Precip.', data: hours.map(h => h.prec), type: 'bar',
          backgroundColor: 'rgba(120,180,250,0.4)', borderColor: 'rgba(120,180,250,0.5)',
          borderWidth: 1, borderRadius: 3, yAxisID: 'y2' }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { backgroundColor: 'rgba(10,12,30,0.92)', titleColor: '#e8eaf6', bodyColor: '#c6d4f0' }
      },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: 'rgba(232,234,246,0.4)', font: { family: 'DM Mono', size: 10 }, maxTicksLimit: 12 } },
        y: { position: 'left', grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#f5c842', font: { family: 'Outfit', size: 11 }, callback: v => v+'°' } },
        y2: { position: 'right', grid: { display: false }, ticks: { color: '#7eb8f7', font: { family: 'Outfit', size: 11 }, callback: v => v+'mm' }, beginAtZero: true, min: 0 }
      }
    }
  });
}

function selectDay(i) {
  selectedDay = i;
  if (!allData) return;
  document.querySelectorAll('.day-card').forEach((el, idx) => el.classList.toggle('active', idx===i));
  const sunData = allData.daily;
  document.querySelector('.sun-rise-time').textContent = formatTime(sunData.sunrise[i]);
  document.querySelector('.sun-set-time').textContent = formatTime(sunData.sunset[i]);
  document.querySelector('.sun-duration').textContent = daylight(sunData.sunrise[i], sunData.sunset[i]);
  document.querySelector('.sun-arc-wrap').innerHTML = drawSunArc(sunData.sunrise[i], sunData.sunset[i]);
  const hours = getHourlyForDay(allData, i);
  document.querySelector('.hourly-scroll').innerHTML = buildHourlyRow(hours);
  document.querySelector('.hourly-chart-title').textContent =
    `Orar — ${i===0?'Azi':shortDate(allData.daily.time[i])}`;
  drawHourlyChart(hours);
}

  allData = data;
  const d = data.daily;
  const cw = data.current_weather;
  const todayHours = getHourlyForDay(data, 0);

  const html = `
    <div class="header">
      <div>
        <div class="location-name">${CITY}</div>
        <div class="location-sub">${COUNTRY} · ${new Date().toLocaleDateString('ro-RO',{weekday:'long',day:'numeric',month:'long'})}</div>
      </div>
      <div class="now-temp">
        <div class="current-temp">${Math.round(cw.temperature)}°</div>
        <div class="current-cond">${desc(cw.weathercode||d.weathercode[0])}</div>
      </div>
    </div>

    <div class="section-label">Prognoză orară</div>
    <div class="hourly-scroll">${buildHourlyRow(todayHours)}</div>

    <div class="section-label">Prognoză 10 zile</div>
    <div class="days-grid">${buildDayCards(data)}</div>

    ${buildPrecipTotalCard(data)}

    <div class="hourly-chart-card">
      <div class="chart-title hourly-chart-title">Orar — Azi</div>
      <div class="hourly-chart-wrap"><canvas id="hourlyChart"></canvas></div>
    </div>

    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">Precipitații · 10 zile (mm)</div>
        <div class="chart-wrap"><canvas id="precipChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Interval temperaturi · 10 zile</div>
        <div class="chart-wrap"><canvas id="tempChart"></canvas></div>
      </div>
    </div>

    <div class="sun-section">
      <div class="sun-info" style="align-items:flex-start">
        <div class="sun-label">Răsărit</div>
        <div class="sun-time sun-rise-time">${formatTime(d.sunrise[0])}</div>
      </div>
      <div class="sun-arc-wrap">${drawSunArc(d.sunrise[0], d.sunset[0])}</div>
      <div class="sun-info" style="align-items:flex-end">
        <div class="sun-label">Apus</div>
        <div class="sun-time sun-set-time">${formatTime(d.sunset[0])}</div>
        <div class="sun-duration">${daylight(d.sunrise[0], d.sunset[0])}</div>
      </div>
    </div>

    ${buildWindySection()}
  `;

  document.getElementById('app').innerHTML = html;

  // Animate the precipitation bar fill
  setTimeout(() => {
    const fill = document.getElementById('precipBarFill');
    if (fill) {
      const pct = fill.parentElement.nextElementSibling?.textContent?.match(/(\d+)%/)?.[1] || '0';
      const sums = data.daily.precipitation_sum.map(v => +(v||0));
      const total = sums.reduce((a,b)=>a+b,0);
      fill.style.width = Math.min(100, Math.round(total / 100 * 100)) + '%';
    }
    drawPrecipChart(data);
    drawTempChart(data);
    drawHourlyChart(todayHours);
  }, 80);
}

// ── Boot ──
loadWeather();
</script>
